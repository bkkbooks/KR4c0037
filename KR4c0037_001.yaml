front:
  text: 錢考功集卷第一
  hash: sha256:9bee3d9e93a1897547e5a44054e851e4acff3bc38cd2daf24acc29776d5f8b54
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0037_SBCK_001-1a}
body:
  text: 五言古詩東陽郡齋中詣南山招韋十霽來海畔山隱映城上起中峰落照時殘雪翠微裏同心乆爲别孤興那對此良會何遲遲清陽瞻則爾青泥驛迎獻王侍御候館掃清晝使車出明光森森入郭樹一道引飛霜仰視􅍡花白多慙綬色黃鷦鷯無羽翼願假憲烏翔沐陽古渡作日落問津處雲霞殘碧空牧牛避田焼退鷁隨潮風回首故鄕逺臨流北路窮翩翩青冥去羡彼髙飛鴻卧疾荅劉道士白露蛩已急空林日淒清寥寥晝扉掩獨卧愁窓明寶字比仙藥羽人寄柴荆長吟想風馭怳若升蓬瀛夢尋西山凖上人别處秋泉聲至今猶在耳何嘗夢魂去不見雪山子新月隔林時千燈翠微裏言忘心更寂跡㓕雲自起覺來纓上塵如洗功德水長安旅宿九秋旅夜長萬感何時歇蕙花漸寒暮心事猶楚越直躬邅世道咫尺隔天闕每聞長樂鍾載泣靈䑓月明旦北門外歸途堪白髪過桐栢山秋風過楚山山靜秋聲晚賞心無定極僊歩亦清逺反照雲竇空寒流石苔淺羽人昔巳去靈跡欣方踐投策謝歸途世縁從此遣李士曹廳對雨春雨暗重城訟庭深更寂終朝人吏少滿院煙雲積濕鳥厭花枝新苔宜砌石掾曹冨文吏清興對詞客愛爾蕙蘭叢芳香飽時澤登勝果寺南樓雨中望嚴恊律微雨侵晚陽連山半藏碧林端陟香樹雲外遲來客孤村凝片煙去水生逺白但佳川原趣不覺城池夕更喜眼中人清光漸咫尺冬夜題旅館退飛憶林藪樂業羡黎庻四海盡窮途一枝無宿處嚴冬北風急中夜哀鴻去孤燭思何深寒窓坐難曙勞歌待明發惆悵盈百慮自終南山晚歸采苓日徃還得性非樵隱白水到初闊青山辭尚近絶境勝無倪歸途興不盡沮溺時反顧牛羊自相引逍遥不外求塵慮從兹泯早渡伊川見舊作鵾鷄鳴曙霜秋水寒旅渉漁人昔隣舎相見具舟檝出浦興未盡向山心更愜村落通白雲茅茨隱紅葉東皋滿時稼歸客欣復業夕發箭塲巖下作行役不遑安在幽機轉發山谷無明晦溪霞自興没朝櫛杉下風夕飲石上月懿爾青雲士垂纓朝鳯闕寜知採竹人每食慙薇蕨同李五夕次香山精舎訪憲上人彼岸聞山鍾仙舟過苔水松門入幽映石逕趨迤邐𥘉月開草堂逺公方覯止忘言在閑夜凝念得微理泠泠功德池相與滌心耳雨中望海上懷鬰林觀中道侶山觀海頭雨懸森動煙樹只疑蒼茫裏鬰鳥欲飛去大塊怒天呉驚潮蕩雲路群真儼盈想一葦不可渡惆悵赤城期願假輕鴻馭廣德𥘉鑾駕出關後登高愁望二首長安不可望望處邊愁起輦轂混戎夷山河空表裏黃雲壓城闕斜照移烽壘漢幟逺成霞胡馬來如蟻不知涿鹿戰早晚蚩尤死渴日候河清沉憂催暮齒愁看秦川色慘慘雲景晦乾坤暫運行品物遺覆載黄塵漲戎馬紫氣隨龍斾掩泣指關東日月祅氛外臣心寄逺水朝海去如帶周德更休明天衢佇開泰過曹釣隱者荃蕙有其性馨香道爲人不居衆芳下寜老空林春之子秉髙節攻文還守真素書寸隂盡流水怨情新濟濟振纓客煙霄各致身誰當舉玄晏不使作良臣獨住覆釜寄郎士元賞心無逺近芳月好登望勝事引幽人山下復山上將尋洞中藥復愛湖外嶂古壁苔入雲隂溪樹穿浪誰言世縁絶更惜知音曠鶯啼緑蘿春廻首還惆悵送王季友赴洪州幕下列郡皆周武南征所從誰諸侯重才略見子如瓊枝撫劒感知巳出門方逺辭煙波帶幕府海日生紅旗問我何功德負恩留玉墀銷魂把别袂愧爾酬明時客舎贈鄭賁結交意不薄匪席言莫違世義隨波久人生知巳稀先鳴誓相逹未遇還相依一望金門詔三看黄鳥飛暝投同旅食朝出易儒衣嵇向林廬接携手行將歸山中春仲寄汝上王恒頴川沈冲隱者守恬泊春山日深靜誰知蟠木材得性無人境座隅泉出洞竹上雲起嶺飢狖入山厨飲虹過藥井前溪堪放逸仲月好風景逰目來逺思摘芳寄汝頴南中春思入仕無知言逰方隨世道平生願開濟遇物干懷抱巳阻青雲期甘同散樗老客逰南海秋思永疲痾苦昬墊日夕開軒屏草木森已悲衾幬清且冷如何逰宦客江海隨泛梗延首長相思憂襟孰能整寄任山人天階崇黼黻世路有趨競獨抱中孚爻誰知苦寒詠行潦難朝海散材空遇聖豈無鳴鳯時其如問津命所思青山郭再夢緑蘿逕林泉春可逰羡爾得眞性登秦嶺半巖遇雨屏翳忽騰氣浮陽慘無暉千峰掛飛雨百尺搖翠微震電閃雲逕奔流翻石磯倚巖假松蓋臨水羡荷衣不得采苓去空思乗月歸且憐東皋上黍色侵荆扉杪秋南山西峯題隼上人蘭若向山看霽色歩歩豁幽性反照亂流明寒空千嶂净石門有餘好霞殘月欲映上詣逺公廬孤峰懸一徑雲裏隔窓火松間下山磬客到兩忘言猿心與禪定田園雨後贈鄰人安排常任性偃卧晚開戸樵客荷簑歸向來春山雨殘雲虹未落反景霞初吐時鳥鳴村墟新泉遶林圃尭年尚恬泊隣里成太古室邇人遂遥相思怨芳杜天門谷題孫逸人石壁崖口亂流處竹深斜照歸主人卧蟠石心耳滌清暉春雷近作解空谷半芳菲雲棟綵虹宿藥圃蝴蝶飛惡囂慕嘉遁㡬夜瞻少微相見竟何說忘情同息機藍溪休沐寄趙八給事蟲鳴歸舊里田野秋農閑即事敦夙尚衡門方再關夕陽入東籬爽氣高前山霜蕙後時老巢禽知暝還侍臣黃樞寵鳴玉青雲間肯想觀魚處寒泉照髪斑逰輞川至南山寄谷口王十六山色不厭逺我行隨趣深蹟幽青蘿徑思絶秋霞岑獨鶴引過浦鳴猿呼入林褰裳百泉裏一歩一清心王子在何處隔雲鷄犬音折麻定延佇乗月明招尋藍田溪與漁者宿獨逰屢忘歸况此隱淪處濯髪清泠泉月明不能去更憐垂綸叟靜若沙上鷺一論白雲心千里滄洲趣蘆中夜火盡浦口秋山曙歎惜分枝禽何時更相遇淮上别范大悲風隕涼葉送歸怨南楚窮年將别離寸晷伸宴語長淮流不息征棹忽復舉碧落半愁雲黃鶴時顧侣逰宦且未逹前途各脩阻分𬒮一相嗟良辰更何許離居夜雨奉寄李亰兆永夜不可度蛩吟秋雨滳寂寞想章臺始歎雲泥隔雷聲匪君車猶時過我廬電影非君燭猶能明我目如何瓊樹枝夢裏㸔不足望望佳期阻愁生寒草緑嘆畢少府以持法無隱見繫用法本禁邪盡心翻自極畢公在囹圄世事何糺纆翠鳯呈其瑞虞羅寄鎩翼囚中千念時窓外百花色落景閉圜扉春蟲網叢棘古人不念文紛淚莫沾臆小園招隱支離鮮兄弟形影如手足但遂飲氷節甘辭代耕禄班衣在林巷始覺無覊束交柯低戸隂閒鳥將雛宿窮通世情阻日夜苔徑緑誰言北郭貧能分晏嬰粟過温逸人舊居反眞難合道懷舊仍無弔浮俗漸澆漓斯人誰繼妙聲容在心耳寜覺阻言笑玄堂閉㡬春拱木齊雲嶠鶴傳居士舞猿得蘇門嘯酹酒片陽微空山想埋照縣内水亭晨興聽訟晨光起宿鷺池上判黎甿借問秋泉色何如拙宦情磨鉛辱利用策蹇愁前程昨夜明月滿中心如鵲驚負恩時易失多病績難成坐惜寒堂晚霜風吹杜蘅酬王維春夜竹亭贈别山月隨客來主人興不淺今宵竹林下誰覺花源逺惆悵曙鶯啼孤雲還絶巘送張少府愁雲破斜照别酌勸行子蓬驚馬首風鴈拂天邊水寸晷如三歳離心在萬里送楊著作歸東海楊桞出關色東行千里期酒酣暫輕别路逺始相思欲識離心盡斜陽到海時送李恊律還東亰芳草忽無色王孫復入關長河侵驛道匹馬傍雲山愁見離居夕螢飛秋月閑秋館言懷蟋蟀巳秋思蕙蘭仍碧滋蹉跎獻賦客歎息此良時日夕雲䑓下商歌空自悲和劉明府宴縣前山亭城隅勞心處雪後歳芳開山映千花出泉經萬井來翔鸞欲下舞上客且留杯新雨喜得王卿書問苦雨暗秋徑寒花垂紫苔愁中緑罇盡夢裏故人來果有相思字銀鈎新月開賦得巢燕送客能棲杏梁際不與黃雀群夜影寄紅燭朝飛高碧雲含情别故侣花月惜春分白石枕并序起與監察御史畢公耀交之厚矣頃於藍水得片石皎然霜明如其德也許爲枕贈之及琢磨將成炎暑已謝俗曰此猶班女之扇可退也君子曰不然此眞畢公之佳賞也故珍而賦之琢珉勝水碧所貴素且貞曽無白圭玷不作浮磬鳴捧來太陽前一片新氷清沉沉風憲地待爾秋已至璞堅難爲功誰怨晚成器比德無磷緇論交亦如此錢考功集卷第一
