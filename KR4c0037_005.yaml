front:
  text: 錢考功集卷第五
  hash: sha256:b116f2e23d222c60c24d2c239274078cb29646f4583c19adfecf7db146a63df9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0037_SBCK_005-1a}
body:
  text: 五言律詩送彈琴李長史往洪州抱琴為徹吏孤棹復南行幾渡秋江水皆添白雪聲佳期來客夢幽興緩王程佐牧無勞問心和政自平送宋徴君讓官還山至人無滯迹謁帝復思玄魏闕辭花綬春山有杏田紫霞開別酌黃鶴舞離絃今夜思君夢遙遙入洞天送陳供奉恩勑放歸覲省得意今如此清光不可攀臣心堯日下鄉思楚雲間楊柳深歸棹芙蓉棲舊山采蘭兼衣錦何似買臣還送外甥范勉赴任常州長史兼覲省憐君展驥去能解倚門愁就飬仍榮祿還鄉即晝逰橘花低客舍􅐜菜繞歸舟與報垂綸叟知吾世網留隴右送章三還亰春風起東道握手望亰關桞色從鄉至鶯聲送客還嘶驂顧近驛歸路出他山舉目情難盡羇離失志間送元評事歸山居憶家望雲路東去獨依依水宿隨漁火山行到竹扉寒花催酒熟山犬喜人歸遙羡書窗下千峰出翠微送武進韋明府理邑想無事鳴琴不下堂井田通楚越津市半漁商盧橘垂殘雨紅蓮折早霜送君催白首臨水獨思鄉送上官侍御執簡朝方下乘軺去不賖感恩輕逺道入幕比還家碣石春雲色邯鄲古樹花飛書報明主烽戌靜天涯送郭秀才制舉下第南逰失志思浪迹知君晦近名出關塵稍逺過郢興彌濃山盡溪初廣人間舟自行探幽無旅思莫畏楚猿鳴送夏侯審校書東歸楚鄉飛鳥沒獨與碧雲還破鏡催歸客殘陽見舊山詩成流水上夢盡落花間儻寄相思字愁人定解顔送衛功曹赴荆南漢家仍用武才子晚成名惆悵江陵去誰知魏闕情碧雲愁楚水春酒醉宣城定想褰帷政還聞坐嘯聲送馬使君赴鄭州東土忽無事專城復任賢喜觀班瑞禮還在偃兵年膏雨帶滎水歸人耕圃田遙知下車日萬井起新煙送郎四輔闕東歸無事共干世多時廢隱淪相看戀簪組不覺老風塵勸酒憐今别傷心倍去春徒言樹萱草何處慰離人送陸三出尉春草晚來色東門愁送君盛才仍下位明代負奇文且樂神仙道終隨鴛鷺群梅生寄黃綬不日在青雲送安都秀才北還年少工文客言離郤解顔不嗟荆寶退能喜綵衣還新月來前館髙陽出故關相思東北望燕趙隔青山送禇十二澡擢第歸吳覲省林表吳山色詩人思不忘向家流水便懷橘綵衣香滿酌留歸騎前程未夕陽愴茲江海去誰惜杜蘅芳送費秀才歸衡州南望瀟湘渚詞人逺憶家客心隨楚水歸棹宿江花不畏心期阻惟愁面會賖雲天有飛翼方寸佇瑤華送陸郎中事邊仍戀主舉酒復悲歌粉署含香别轅門載筆過鶯聲出漢苑柳色過漳河相憶情難盡離居春草多送僧歸日本上國隨緣至來途若夢行浮天滄海逺去世法船輕水月通禪觀魚龍聽梵聲惟憐一燈影萬里眼中明送楊曍擢第逰江南行人臨去水新詠復新悲萬里高秋月孤山逺别時挂帆嚴子瀨酹酒敬亭祠歲宴無芳杜如何寄所思送田倉曹歸覲竒絲絡驄馬去府望梁城節下趨庭出秋來懷橘情别筵寒日晚歸路碧雲生千里相思夜愁看新月明送張管書記邊事多勞役儒衣逐鼓鼙日寒關樹外峰盡塞雲西河廣蓬難渡天遙鴈漸低班超封定逺之子去思齊送蕭常侍北使絳節引雕戈鳴騶動玉珂戎城去日逺漢使隔年多鴈宿常連雪沙飛半度河明光朝即邇秋社早成歌送李棲桐道舉擢第還鄉省侍幾年深道要一舉過賢關名與玄珠出鄉冝晝錦還蓮舟同宿浦桞岸向家山欲見寧親孝儒衣稚子斑送桞道士去世能成道逰仙不定家歸期千歲鶴行邁五雲車海上春應盡壼中日未斜不知相憶處琪樹幾枝花送陸侍御使新羅二首衣冠周柱史才學我鄉人受命辭雲陛傾城送使臣去程滄海月歸思上林春始覺儒風逺殊方禮樂新萬里三韓國行人滿目愁辭天使星逺臨水澗霜秋雲佩迎仙島虹旌過蜃樓定知懷魏闕回首海西頭送虞説擢第南歸覲省南風起别袂心到衡湘間歸客楚天逺孤舟雲水間愛君采蘭處花島連家山得意且寧省人生能幾還送陸贄擢第還蘇州鄉路歸何早雲間喜擅名思親盧橘熟帶雨客帆輕夜火臨津驛晨鐘隔浦城華亭養仙羽計日再飛鳴送原公南逰有意兼程去飄然二翼輕故鄉多久别春草不傷情洗鉢泉初暖焚香曉更清自言難解縛何日伴師行送萬兵曹赴廣陵秋日思逺客臨流語别離楚城將坐嘯郢曲有餘悲山晚桂花老江寒蘋葉衰應須揚得意更誦長卿詞送李判官赴桂州幕欲知儒道貴縫掖見諸侯且感千金諾寧辭萬里逰鴈峰侵瘴逺桂水出雲流坐惜離居晚相思緑蕙秋賦得寒雲輕重色送子恂入亰無限寒雲色蒼茫淺更深從龍如有瑞捧日不成隂積翠全低嶺虛明半出林帝鄉遙在目鐡馬又駸駸賦得叢蘭曙後色送梁侍御入亰曙色傳芳意分明錦繡叢蘭生露後日花發夜來風不向三峰裏全勝一縣中遙知大苑內應待五花􅍡賦得餘冰送李中丞之浙西曉日餘氷上春池一鏡明多從履處薄偏向飲時清比雪光仍在因風片不成更隨舟楫去猶可助堅貞賦得浦口望斜月送皇甫判官起見西樓月依依向浦斜動搖生淺浪明滅照寒沙水渚猶疑雪梅林不辨花送君無可贈恃此代瑤華賦得綿綿思逺道送岑判官入嶺極目煙霞外孤舟一使星興中尋白雪夢裏過滄𬈑夜月松江戍秋風竹塢亭不知行逺近芳草日青青江寧春夜裴使君送蕭員外花院日扶踈江雲目卷舒主人熊軾任歸客雉門車曙月稀星裏春煙紫禁餘行看石頭戍記得是南徐送薛八謫居東水將孤客南行路幾千虹翻潮上雨鳥落瘴中天謪去寧留恨思歸豈待年銜杯且一醉别淚莫􅏰然送衡陽歸客歸客愛鳴榔南征憶舊鄉江山追宋玉雲雨憶荆王醉裏宜城近歌中郢路長憐君從此去日夕望三湘送員外侍御入朝别思亂無緒妖氛猶未清含香五夜客持賦十年兄霜拂金波樹星回玉斗城自憐江上鶴垂翅羡飛鳴送李諌議歸荆州歸舟同不繫纎草剩忘憂禁掖曽通籍江城舊列侯暮帆依夏口春雨夢荆州何日朝雲陛隨君拜冕旒送元中丞江淮轉運薄稅歸天府輕徭賴使臣歡沽賜帛老恩及卷綃人去問殊官俗來經幾劫春東南卸亭上莫問有風塵送唐别駕赴郢州少年從事好此去别愁輕滿坐詩人興隨君郢路行蒹葭侵驛樹雲水抱山城遙愛下車日江皋春草生送鄭巨及第後歸覲多才白華子𥘉擅桂枝名嘉慶送歸客新秋帶雨行離人背水去喜雀近家寧别贈難為此衰年畏後生宿逺上人蘭若香花閉一林真士此看心行道白雲近燃燈翠壁深梵筵清水月禪坐冷山隂更説東溪好明朝乘興尋酬元祕書晚出藍溪見寄野興引才子獨行幽徑遲雲留下山處鳥靜出溪時拙宦不忘隱歸休常在兹知音儻相訪炊黍掃茆茨别張起居有别時留恨銷魂况在今風濤𥘉振海鵷鷺各辭林舊國關河絶新秋草露深陸機嬰世網應負故山心郭司徒廳夜宴秋堂復夜闌舉目盡悲端霜堞鳥聲苦更樓月色寒美人深別意斗酒少留歡明發將何贈平生雙玉盤初至京口示諸弟還家百戰後訪故幾人存兄弟得相見榮枯何處論新詩添卷軸舊業見兒孫平生事焉能門月下洗藥汲井向新月分流入衆芳濕花低桂影翻葉醉泉光露下添餘潤蜂驚引暗香寄言養生客采采共提筐晚春永寧墅小園獨坐寄上王相公東閣一何靜鶯聲落日愁夔龍暫為别昏旦思兼秋蕙草出籬外花枝寄竹幽上方傳雅頌七夕讓風流歲暇題茅茨谷口逃名處歸來遂野心薄田供歲酒喬木待新禽溪路春雲重山厨夜火深桃源應漸好仙客許相尋九日登玉山霞景青山上誰知此勝逰龍沙傳往事菊酒對今秋步石隨雲起題詩向水流忘歸更有處松下片雲幽宴崔駙馬玉山别業金榜開青鎖驕奢半隱淪玉蕭惟送酒羅袖愛留賓竹館煙催暝梅園雪誤春滿朝詞賦客盡是入林人春谷幽居黃鳥鳴園桞新陽改舊隂春來此幽興宛是謝公心掃徑蘭芽出添池山影深虛名隨振鷺安得夕棲林賦得池上䨥丁香樹得地移根逺交柯繞指柔露香濃結桂池影闕蟠虬黛葉輕筠緑金花笑菊秋何如南海外雨露隔炎洲題樊川杜相公别業數畒園林好人知賢相家結茅書閣儉帶水槿籬斜古樹生春蘚新荷卷落花聖恩加玉鉉安得卧青霞酬盧十一過宿乞還方未遂日夕望雲林况復逢青草何勞問此心閉門公務散枉策故情深遙夜他鄉宿同君梁甫吟崔十四宅問候曉日早鶯啼江城旅思迷微官同寄傲移疾阻招擕逺水閭閻內青山雉堞西王孫莫久卧春草欲萋萋山路見梅感而有作莫言山路僻還被好風催行客凄涼過村籬冷落開晚溪寒水照晴日數蜂來重憶江南酒何因把一杯詠門上畫松上元王杜三相公昔聞生澗底今見起毫端衆草此時沒何人知歲寒豈能禆棟宇且欲出門闌只在丹青筆凌雲也不難早發東陽信風催過客早發梅花橋數鴈起前渚千艘爭便潮將隨浮雲去日惜故山遙惆悵煙波末佳期在碧霄舟中寄李起居南行風景好昏旦水皋間春色郢中樹晴霞湖上山去家旅帆逺回首暮潮還蕙草知何贈故人雲漢間夜雨寄冦校書秋館煙雨合重城鍾漏深佳期阻清夜孤興發離心燭影出綃幕蟲聲連素琴此時蓬閣友應念昔同衾喜李侍御拜郎官入省粉署花􅍡入丹霄紫誥垂直廬驚漏近賜被覺霜移漢主前瑤席穰侯許鳯池應憐後行鴈空羡上林枝蘇端林亭對酒喜雨小雨飛林頂浮涼入晚多能知留客處偏與好風過濯錦翻紅蘂跳珠亂碧荷芳樽深幾許此興可酣歌見上林春鴈翔青雲因寄楊起居李員外上林春更好賓鴈不知歸顧影憐青籞傳聲入紫微夜陪池露宿朝出苑花飛寧憶寒鄉侣鸞凰一見稀偶成含毫意不淺微月上簾櫳門靜吏人息心間囹圄空繁星入踈樹驚鵲倦秋風始覺牽卑劇宵眠亦在公漁潭值雨日入林島異鶴鳴風草間孤帆泊枉渚飛雨來前山客意念留滯川途忽阻艱赤亭仍數里夜待安流還題蕭丞小池鶯鳴蕙草緑朝與情人期林沼忘言處鴛鴻養翮時春泉滋藥暖晴日度花遲此會無辭酒良晨難再追錢考功集卷第五
