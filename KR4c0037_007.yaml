body:
  text: 五言排律送李九歸河北文武資人望謀猷簡聖情南州𥘉卧鼓東土復維城寄重分符去威仍出閫行斗牛移八座日月送雙旌別戀瞻天起仁風應物生佇聞收組練鏘玉㑹承明送丁著作佐台郡多年金馬客名遂動歸輪佐郡紫書下過門朱􅌧新揚舲望海嶽入境背風塵水驛偏乗月梅園别受春帶經臨府吏鱠鯉偶鄕人始見美高士逍遥在搢紳送王使君赴太原行營太白明無象皇威未戢戈諸侯持節鉞千里控山河漢驛雙旌度胡沙七騎過驚蓬連鴈起收馬入雲多不賣雲龍塞能消澣海波須傳出師頌莫奏式微歌送王使君移鎭淮南共許徐方牧能臨河内人郡移棠轉茂車至鹿還馴吏事嘉師旅鴛行惜縉紳别心傾祖席愁望盡征輪紫詔徴黄晚蒼生借冦頻願言青瑣拜早及上林春李四勸爲尉氏尉李士勉爲開封尉美政惟兄弟時人數俊賢皇枝雙玉樹吏道二梅仙自理堯唐俗唯將禮譲傳采蘭花蕚聚就日鴈行聮黄綬俄三載青雲未九遷廟堂爲宰制㡬日試龍泉春夜宴任六昆季宅際晚緑煙起入門芳樹深不才叨下客喜宴齒諸簮夜月仍携妓清風更在林彩毫揮露色銀燭動花隂自接通家好因知待士心向隅逢故識茲夕願披襟閑居酬張起居見贈在林非避世守拙自離群弱羽謝風水窮愁依典墳良知不遐棄新詠獨相聞能使幽興苦坐忘清景曛前山帶喬木暮鳥聮歸雲向夕野人思難忘騎省文奉和王相公秋日戯贈元校書才妙心仍逺名踈迹可追清秋聞禮暇新雨到山時勝事唯愁盡幽尋不厭遲弄雲憐鶴去隔水許僧期賢相敦高躅雕龍亦所思芙蓉洗清露願比謝公詩過楊駙馬亭子衣冠在漢䑓榭接天成彩鳯翻簫曲祥鱣入館名歌鍾芳月暗林瘴碧雲生亂水歸潭凈高花映竹明退朝追宴樂開閣醉簪纓長䄂留嘉客棲烏下禁城山下别杜少府把手意難盡前山日漸低情人那暫别夕鳥尚同棲寸晷戀言笑佳期欲阻睽離雲愁出岫去水咽分溪莊叟㡬虚說楊朱空自迷傷心獨歸路秋草更萋萋晚出青門望終南别業能清謝眺思暫下承明廬逺水斷山下寒皋微雨餘更憐歸鳥去宛到卧龍居笑指叢林上閑雲自卷舒寜知鳴鳯日却憶釣鱑初處貴有餘興伊周位不如送嚴士良侍奉詹事南逰䟽傳獨知止曽參善愛親江山侍行邁長㓜出囂塵握手想千古此心能㡬人風光滿長陌草色傍征輪日夕望荆楚鶯鳴芳杜新漁煙月下淺花嶼水中春點翰遥相憶含情向白蘋題祕書王迪城北池亭子喬来魏闕明主賜衣簪從宦辭人事同塵即道心還追大隱跡寄此鳯城隂昨夜新煙雨池臺清且深伏泉通粉壁迸筍出花林晚沐常多暇春醪時獨斟西南漢宫月復對緑窓琴過王舎人宅入門花柳暗知是近臣居大隱心何逺髙風物自踈翛然靜者事宛得上皇餘鷄犬偷仙藥兒童授道書清吟送客後微月上城初綵筆有新詠文星垂太虚承恩金殿宿應薦馬相如過瑞龍觀道士不知誰氏子錬魄家洞天鶴待成丹日人尋種杏田靈山含道氣物性皆自然白鹿顧瑞草驪龍蟠玉泉得茲象外趣便割區中縁石竇采雲母霞堂陪列仙主人善止客柯爛忘歸年送沈冲天璞非外假至人常晏如心期邈霄漢詞律響瓊琚舉酒常歎息無人逹子虚夜光失隋掌驥騄伏塩車考室晉山下歸田秦歲𥘉寒雲隨路合落照下城餘千里還同述無勞怨索居和韋侍御寓直對雨名貫四科首班宜二妙齊如何厭白簡未得歩金閨寓直晦秋雨吟餘聞逺鷄漏聲過栢冷雲色向窓低誰謂霄漢近翻嗟心事睽蘭滋人未握霜曉鶚還栖佇見田郎字親勞御筆題奉和聖制登朝元閣六合紆玄覧重軒啓上清石林飛棟出霞頂太階平拂曙鑾輿上晞陽瑞雪晴翠微廻日馭丹巘駐天行御氣升銀漢垂衣俯錦城山通玉苑逈河抱紫關明感物乾文動凝神道化成周王陟喬嶽列辟讓英聲奉和杜相公移長興宅奉呈元相公守貴常思儉平津此意深能卑丞相宅何謝故人心種蕙初抽帶移篁不改隂院梅朝助鼎池鳯夕歸林覺路經中得滄洲夢裏尋道高仍濟代恩重豈投簪報國誰知已推賢共作霖興來文雅振清韻擲雙金送任先生任唐山丞再命果良願㡬年勤說詩上公頻握髪才子共垂帷琢玉成良器出門偏愴離腰章佐墨綬耀錦到茆茨樹老見家日潮平歸縣時衣催蓮女織頌聽海人詞鴻鵠志應在荃蘭香未衰金門定回首雲路有佳期送外甥懷素上人歸鄕侍奉釋子吾家寶神清慧有餘能翻梵王字妙盡伯英書逺鶴無前侣孤雲寄太虚狂來輕世界醉裏得真如飛錫離郷乆寧親喜臘初故池􅋊雪滿寒桞霽煙踈夀酒還嘗藥晨餐不薦魚遥知禪誦外徤筆賦閑居送張中丞赴桂州出守求人瘼推賢動聖情紫䑓初下詔皂蓋始專城寵借飛霜簡威加却月營雲衢降五馬林水引雙旌夙仰敦詩禮嘗聞偃甲兵戍樓雲外靜訟閣竹間清化佇還珠美心將片玉貞冦恂朝望重計日謁承明送王相公赴范陽翊聖衘恩重頻年按節行安危皆報國文武不縁名受脤仍調鼎爲霖更洗兵幕開丞相閣旗緫貳師營料敵知無戰安邊自有征代雲横馬首燕鴈拂笳聲去鎮關河靜歸看日月明欲知瞻戀切遲暮一書生送蔣尚書居守東都鳯輦幸秦久周人傒帝情若非君敏德誰鎮洛陽城前席命才彦舉朝推令名綸言動北斗職事守東亰鄭履下天去􅕋輪滿路聲出關秋樹直對闕逺山明肅肅保釐處水流宫苑清長安日四笑朝夕衮衣迎送李兵曹赴河中能荷鍾鼎業不矜紈綺榮侯門王事後儒服一書生昔志學文史立身爲士英驪珠難隱耀皋鶴㑹長鳴體命且隨牒候時當振纓寒蟬思關桞匹馬向蒲城秋日黯將暮黃河如欲清黎人思坐嘯知子樹佳聲罷官後酬元校書見贈心期悵巳阻交道復何如自我辭丹闕唯君到弊廬未忘金馬詔猶負茂陵書鄰犬吠初服家人愁斗儲秋堂入閒夜雲月思離居窮巷聞砧冷荒枝映鵲踈宦名隨落葉生事感枯魚流水仍揮手知音未棄余同鄔戴關中旅寓文士皆求遇今人誰至公靈䑓一寄宿楊柳再春風更惜忘形友頻年失志同羽毛齊燕雀心事阻鴛鴻留滯慙歸飬飛鳴恨觸籠橘懷鄕夢裏書去客愁中殘雪迷歸鴈韶光棄斷蓬吞悲問唐舉何路出屯蒙新豐主人羽代少知巳夜光頻暗投迍邅終薄命動息盡窮愁自欲歸飛鷁當爲不繫舟雙垂素絲淚㡬弊皂貂裘暮鳥棲幽樹孤雲出舊丘蛩悲衣褐夕雨暗轉蓬秋客裏馮諼劒歌中寗戚牛主人能縱酒一醉且忘憂陪郭常侍令公東亭宴集盛業山河列重名劒履榮珥貂爲相子開閣引時英美景池䑓色佳期宴賞情詞人載筆至仙妓出花迎暗竹朱輪轉回塘玉珮鳴舞衫招戯蝶歌扇隔啼鶯飲德心皆醉披雲興轉清不悲懽樂盡積慶在和羔夕逰覆釜山道士觀因登玄元廟冥捜過物表洞府次溪旁巳入瀛洲逺誰言仙路長孤煙出深竹道侣正焚香鳴磬愛山靜歩虚宜夜凉仍同象帝廟更上紫霞崗霽月懸琪樹明星映碧堂傾思丹竈術願采玉芝房儻把浮丘𬒮乗雲别舊鄕栢崖老人號無名先生男削髪女黄冠自以雲泉獨樂命予賦詩古也憂婚嫁君能樂性腸長男棲月宇少女祇霓裳問爾飡霞處春山芝桂旁鶴前飛九轉壼裏駐三光與我開龍嶠披雲靜藥堂胡麻兼藻緑石髓隔花香帝力言何有椿年喜漸長窅然髙象外寧不傲羲皇贈李十六一面喜投分數年欽盛名常思夢顔色誰意訪柴荆忽聽欵扉響欣然倒屣迎蓬蒿駐騶馭鷄犬傍簪纓酌水即嘉宴新知甚故情僕夫視日色棲鳥催車聲自爾宴言後至今門館清何當更乗興林下巳苔生裴僕射東亭鳯扆任匡濟雲溪難退還致君超列辟得道在榮班朱㦸繚垣下高齋芳樹間隔花𨳩逺水廢卷愛晴山晚沐值清興知音同解顔籍蘭開賜酒留客下重關仙犬逐人靜朝車映竹閒則知眞隱逸未必謝區寰軒后三朝顧赤松何足攀中書王舎人輞川舊居㡬年家絶壑滿徑種芳蘭帶石買松貴通溪漲水寛誦經連谷響吹律减雲寒誰謂桃源裏天書問考槃一從解蕙帶三入偶蟬冠今夕復何夕歸休尋舊歡片霞隔蒼翠春雨半林湍藤長穿松蓋花繁壓藥䦨景深青眼下興接彩毫端笑向同來客登龍此地難送襄陽盧判官奏開河事千里趨魏闕一言簡聖聦河流引關外國用贍秦中有詔許其策隨山興此功連雲積石阻計日安波通飛棹轉年糓利人勝歲豐言歸漢陽路拜首蓬莱宫𬗋殿賜衣出青門酣酌同晚陽過微雨秋水見新鴻坐惜去車逺愁看離館空因思郢川守南楚滿清風奉送戸部李郎中充晉國副節度出塞德位調梅用忠輸擊虜年子房推廟畧漢主記兵權受命榮中禁分麾鎮左賢風生黒山道星下紫微天始願文經國俄看武定邊鬼方堯日逺幕府代雲連汗馬將行矣盧龍巳肅然關防驅使節花月卷離筵自忝知音遇而令感義偏淚聞橫吹落心逐去旌懸常念䕫能政時須說濟川勞還應即爾朝暮玉墀前奉和中書常舍人晚秋集賢院即事文星垂太虚辭伯綜群書彩筆下鴛掖褒衣來石渠典墳探奥㫖造化覩權輿述聖魯宣父通經漢仲舒窓明宜縹帶地肅近丹除清晝刪詩暇高秋作賦𥘉露盤侵漢聳宫柳度鵶踈靜對連雲閣晴聞過闕車舊僚云出矣晚歳復何如海嶠瞻歸路江城夢直廬含毫思兩鳯望逺寄雙魚定笑巴歌拙還參麗曲餘和范郎中宿直中書暁翫新池贈南省同僚西垣補遺青瑣留才子春池靜禁林自矜仙島勝宛在掖垣深引派􅊮庭裏含虚玉砌隂漲來知聖澤清處見天心蘭氣飄紅岸星文動碧潯鳯棲長近日虬卧欲爲霖席籠雖高位流謙乃素襟焚香春漏盡假寐曉鸎吟丹地宜清切朝陽復照臨司言兼逸趣鼓興接知音六義驚摛藻三䑓響擲金爲憐風水外落羽此漂沉錢考功集卷第七
