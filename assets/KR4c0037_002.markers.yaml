  - {type: variant, offset: 4, length: 0, content: '', WYG: 成不枉青山色念此那能不羡歸長楊諌獵事皆違他日東流一乗興知君為我掃荆扉送傅管記赴蜀軍終童之死誰繼出燕頷儒生今俊逸主將早知鸚鵡賦飛書許載蛟龍筆峨眉玉壘指霞標鳥沒天低幕府遥巴山雨色藏征斾漢水􅆐聲咽短簫賜璧腰金應可料才略縱横年且妙無人不重樂毅賢何敵能當魯連嘯日暮黄雲千里昬壯心輕别不銷魂勸君用却龍泉劍莫負平生國士恩送張少府愁雲破斜照别酌勸行子蓬驚馬首風鴈拂天邊水寸晷如三嵗離心在萬里行路難君不見明星映空月太陽朝升光盡歇君不見凋零委路蓬長風飄舉入雲中由來人事何嘗定且莫驕奢笑賤窮盧龍塞行送韋掌記雨雪紛紛黒山外行人共指盧龍塞萬里飛沙咽皷􅎏三軍殺氣凝旌斾陳琳書記本翩翩料敵張兵奪酒泉聖主好文兼好武封侯莫比漢皇年效古秋夜長秋漢飛玉霜北風掃荷香含情紡織孤燈盡拭淚相思寒漏長簷前碧雲靜如水月弔棲烏啼鳥起誰家少婦事鴛機錦幕雲屏深掩扉白玉窻中聞落葉應憐寒女獨無衣卧病李員外題扉而去僻陋病者居蒿萊行逕失誰知簮紱貴能問幽憂疾珂聲未駐門蘭氣先入室沉痾不冠帶安得候蓬蓽清揚去莫尋離念頃來侵雀栖髙忩靜日出脩桐陰枕上憶君子悄悄唯苦心詶王維春夜竹亭贈别山月隨客來主人興不淺今宵竹林下誰覺花源逺惆悵曙鶯啼孤雲逺絶巘山中寄時校書蓬萊紫氣温如玉唯予知爾陽春曲别來㡬日芳蓀緑百花酒滿不見君青山一望心斷續送李四擢第歸覲省當年貴得意文字各爭名齊唱陽春曲唯君金玉聲懸黎寳中出髙價世難掩鴻羽不低飛龍津徒自險直矜鸚鵡賦不貴芳桂枝少俊蔡邕許長鳴唐舉知梁城下熊軾朱㦸何暐耀才子欲歸寧裳花已含笑髙門知慶大子孝覺親榮獨攬還珠美寧唯問絹情離筵不盡醉撡袂一何早馬蹄西别輕樹色東看好行塵忽不見惆悵青門道哭曹鈞苦節推白首憐君負此生忠藎名空在家貧道不行朝來相憶訪蓬蓽只謂淵明猶卧疾忽見江南弔鶴來始知天下文星失嘗恨知音千古稀那堪夫子九泉歸一聲隣笛殘陽裏酹酒空堂淚滿衣錢仲文集巻一欽定四庫全書錢仲文集巻二唐錢起撰五言往體四韻五首五韻十首六韻二十四首東陽郡齋中詣南山招韋十霽來海半山隠映城上起中峰落照時殘雪翠微裏同心乆為别孤興那對此良㑹何遲遲清揚瞻則邇清泥驛迎獻王侍郎候舘掃清晝使車出明光森森入郭樹一道引飛霜仰視驄花白多慚綬色黄鷦鷯無羽翼願假憲烏翔沐陽古渡作日落問津處雲霞殘碧空牧牛避田燒退鷁隨潮風迴首故鄉逺臨流此路窮翩翩青冥去羡彼髙飛鴻卧疾答劉道士白露蠶已絲空林日凄清􅋁􅋁晝扉掩獨卧秋忩明寳字比仙藥羽人寄柴荆長吟想風馭怳若升蓬瀛夢尋西山凖上人别處秋泉聲至今猶在耳何嘗夢魂去不見雪山子新月隔林時千峰翠微裏言念心更寂跡滅雲自起長安旅宿九秋旅夜長萬感何時歇蕙花漸寒暮心事猶楚越直躬邅世道咫步隔天闕每聞長樂鐘載泣靈臺月明旦北門外歸途堪白􅄠過桐栢山秋風過楚山山靜秋聲晚賞心無定極仙步亦清逺返照雲竇空寒流石苔淺羽人昔已去靈跡欣方踐投策謝歸途世縁從此遣李士曹㕔對雨春雨暗重城訟庭深更寂終朝人吏少滿院煙雲集濕鳥壓花枝新苔冝砌石掾曹冨文史清興對詞客愛爾蕙蘭叢芳香飽時澤登勝果寺南樓雨中望嚴協律微雨侵晚陽連山半藏碧林端陟香榭雲外遲來客孤村凝片烟去水生逺白但佳川原趣不覺城池夕更喜眼中人清光漸咫尺冬夜題旅舘退飛憶林藪樂業羡黎庶四海盡窮途一枝無宿處嚴冬北風急中夜哀鴻去孤燭思何深寒窓坐難曙勞歌待明發惆悵盈百慮自終南山晚歸采苓日往還得性非樵隠白水到初濶青山辭尚近絶境勝無倪歸途興不盡沮溺時返顧牛羊自相引逍遥不外求塵慮從兹泯早渡伊川見舊作鵾鷄鳴早霜秋水寒旅涉漁人昔隣舍相見具舟楫出浦興未盡向山心更愜村落通白雲茅茨隠紅葉東臯滿時稼歸客欣復業夕發箭塲巖下作行役不遑安在幽機轉發山谷無明晦溪霞自興沒朝櫛杉下風夕飲石上月懿爾青雲士垂纓朝鳯闕寧知採竹人每食慚薇蕨同李五夕次香山精舍訪憲上人彼岸聞山鐘仙舟過苔水松門入幽映石逕趨迤􅆔初月開草堂逺公方覯止忘言在閑夜凝念得微理泠泠功徳池相與滌心耳雨中望海上懷欎林觀中道侣山觀海頭雨懸森動烟樹只疑蒼茫裏欎鳥欲飛去大塊怒天吳驚潮蕩雲路羣真儼盈想一葦不可渡惆悵赤城期願假輕鴻馭廣徳初鑾駕出闕後登髙愁望二首長安不可望望處愁邊起輦轂混戎夷山河空表裏黄雲壓城闕斜照移烽壘漢幟逺成霞胡馬來如蟻不知涿鹿戰早晚蚩尤死渴日候河清沉憂催暮齒二愁看秦川色慘慘雲景晦乾坤暫運行品物遺覆載黄塵漲戎馬紫氣隨龍斾掩泣指闗東日月妖氛外臣心寄逺水朝海去如帶周徳更休明天衢佇開泰過曹鈞隠居荃蕙有奇性馨香道為人不居衆芳下寧老空林春之子秉髙節攻文還守真素書寸陰盡流水怨情一作聲新濟濟振纓客煙霄各致身誰當舉𤣥宴不使作良臣獨往覆釡山寄郎士元賞心無逺近芳月好登望勝事引幽人山下復山上將尋洞中藥復愛湖外嶂古壁苔入雲陰溪樹穿浪誰言世縁絶更惜知音曠鶯啼緑蘿春迴首還惆悵送王季友赴洪州幕下列郡皆用武南征所從誰諸侯重才略見子如瓊枝撫劍感知已出門方逺辭煙汲帶幕府海日生紅旗問我何功徳負恩留玉墀銷魂把别袂愧爾酬明時客舍贈鄭賁結交意不薄匪席言莫違世義隨波乆人生知已稀先鳴誓相逹未遇還相依一望金門詔三看黄鳥飛暝投同旅食朝出易儒衣嵇向林廬接携手行將歸山中春仲寄汝上王恒潁川沈冲隠者守恬泊春山日深凈誰知蟠木材得性無人境座隅泉出洞竹上雲起嶺飢狖入山厨飲虹過藥井前溪堪放逸仲月好風景遊目來逺思摘芳寄汝潁南中春意入仕無知言遊方隨世道平生願開濟遇物干懷抱已阻青雲期甘同㪚樗老客遊南海曲坐見韶陽蚤舊國别佳人他鄉思芳草惜無鴻鵠翅安得凌蒼昊東陵藥堂寄張道士木落蒼山空當軒秋水色清旦振衣坐永吟意何極願言金丹夀一假鸞鳯翼日夕開真經言忘心更默𤣥都有仙子採草早相識煙露難再期焚香空歎息苦雨憶皇甫冉涼雨門巷深窮居成習靜獨吟愁霖雨更使秋思永疲疴苦昏墊日夕開軒屏草木森已悲衾幬清且冷如何遊宦客江海隨泛梗延首長相思憂襟孰能整寄任山人天階崇黼黻世路有趨競獨抱中孚爻誰知苦寒詠行潦難朝海㪚材空遇聖豈無鳴鳯時其如問津命所思青山郭再夢緑蘿逕林泉春可遊羡爾得其性登秦嶺半巖遇雨屏翳忽騰氣浮陽慘無暉千峰挂飛雨百尺揺翠微震電閃雲逕奔流翻石磯倚巖假松葢臨水羡荷衣不得采苓去空思乗月歸且憐東臯上水色侵荆扉水色一作黍色杪秋南山西峰題凖上人蘭若向山看霽色步步豁幽性返照亂流明寒空千嶂淨石門有餘好霞殘月欲映上詣逺公廬孤峰懸一逕雲裏隔忩火松下聞山磬客到兩忘言猿心與禪定田園雨後贈隣人安排常任性偃卧晚開户樵客荷蓑歸向來春山雨殘雲虹未落返景霞初吐時鳥鳴村墟新泉遶林圃堯年尚恬泊隣里成太古室爾人遂遥相思怨芳杜天門谷題孫逸人石壁崖石亂流處竹深斜照歸主人卧磻石心耳滌清暉春雷近作解空谷半芳菲雲棟綵虹宿藥圃蝴蝶飛惡嚻慕嘉遁㡬夜瞻少微相見竟何説忘情同息機藍溪休沐寄趙八給事蟲鳴歸舊里田野秋農閑即事敦風尚衡門方再闗夕陽入東籬爽氣髙前山霜蕙後時老巢禽知暝還侍臣黄樞寵鳴玉青雲間肯想觀魚處寒泉照髪斑送輞川至南山寄谷口王十六山色不厭逺我行隨處深蹟幽青蘿逕思絶孤霞岑獨鶴引過浦鳴猿呼入林褰裳百泉裏一步一清心王子在何處隔雲雞犬音折麻定延佇乗月期招尋藍田溪與漁者宿獨遊屢忘歸况此隠淪處濯􅄠清泠泉月明不能去更憐垂綸叟靜若沙上鷺一論白雲心千里蒼洲趣蘆中夜火盡浦口秋山曙歎息分枝禽何時更相遇淮上别范大悲風隕涼葉送歸怨南楚窮年將别離寸晷申宴語長淮流不盡征棹忽復舉碧落半愁雲黄鶴時顧侣遊宦且未逹前途各脩阻分􅃑一相嗟良辰更何許雜居夜雨奉寄李京兆永夜不可度蛩吟秋雨滴寂寞想章臺始歎雲泥隔雷聲匪君車猶時過我廬電影非君燭猶能明我目如何瓊樹枝夢裡看不足望望佳期阻愁生寒草緑歎畢少府以持法無隠見繫用法本禁邪盡心翻自極畢公在囹圄世事何糺纆翠鳯呈其瑞虞羅寄殺翼囚中千念時窓外百花色落景閉圎扉春蟲網叢棘古人不念文紛淚莫沾臆小園招隠支離鮮兄弟形影如手足但遂飲氷節甘辭代耕禄斑衣在林巷始覺無羈束交柯低户陰閑鳥將雛宿窮通世情阻日夜苔徑緑誰言北郭貧能分晏嬰粟過温逸人舊居返真難合道懷舊仍無弔浮俗漸澆漓斯人誰繼妙聲容在心耳寧覺阻言笑𤣥堂閉㡬春拱木齊雲嶠鶴傳居士舞猿得蘇門嘯酹酒片陽微空山想埋照縣内水亭晨興聴訟晨光起宿露池上判黎甿借問秋泉色如何拙宦情磨鉛辱利用策蹇愁前程昨夜明月滿中心如鵲驚負恩時易失多病績難成坐惜寒塘晚霜風吹杜蘅錢仲文集巻二欽定四庫全書錢仲文集巻三唐錢起撰五言七韻往體九首八韻十一首長韻十二首}
