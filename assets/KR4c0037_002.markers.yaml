  - {type: variant, offset: 3, length: 0, content: '', WYG: 遲窮途此别不堪悲荷衣垂釣且安命金馬招賢㑹有時送馬明府赴江陵陶令南行心自永江天極目澄秋景萬室遥方犬不鳴雙鳬下處人皆靜清風髙興得湖山門栁蕭條雙翟閑黄花滿把應相憶落日登樓北望還送畢侍御謫居崇蘭香死玉簮折志士吞聲甘徇節忠藎不為明主知悲來莫向時人説滄浪之水見心清楚客辭天淚滿纓百鳥喧喧噪一鶚上林髙枝亦難托寧嗟人世棄虞翻且喜江山得康樂自憐黄綬老嬰身妻子朝來勸隠淪桃花洞裏舉家去此别相思復㡬春送禇大落第東歸離琴彈苦調美人􅃤向隅頃來荷䇿干明主還復扁舟歸五湖漢家側席明揚乆豈意遺賢在林藪玉堂金馬隔青雲墨客儒生皆白首昨夢芳洲采白蘋歸期且喜故園春稚子只思陶令至文君不厭馬卿貧剡中風月乆相憶池上舊遊應再得酒熟寧孤芳杜春}
