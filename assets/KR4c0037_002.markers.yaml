  - {type: variant, offset: 2, length: 0, content: '', WYG: 七韻往體九首八韻十一首長韻十二首送崔校書從軍鴈門太守能愛賢麟閣書生亦投筆寧唯玉劍報知已更有龍韜佐師律别馬連嘶出御溝家人㡬夜望刀頭燕南春草傷心色薊北黄雲滿眼愁聞道輕生能擊虜何嗟少壯不封侯送張將軍征西長安少年唯好武金殿承恩爭破虜沙塲烽火隔天山鐵騎征西㡬嵗還戰處黒雲霾瀚海愁中明月度陽闗玉笛聲悲離酌晚金方路極行人逺計日霜戈盡敵歸囘首戎城空落暉始笑子卿心計失徒看海上節旄稀送脩武元少府寸禄榮色養此行寧歎惜自今黄綬采蘭時不厭丹墀芳草色百戰荒城復井田㡬家春樹帶人烟黎甿乆厭蓬飄苦遲爾西南惠月傳送崔十三東遊千里有同心十年一㑹面當杯緩筝柱倐忽催離宴丹鳯城頭噪晚鴉行人馬首夕陽斜㶚上春風留别袂闗東新月宿誰家官栁依依兩鄉色誰能此别不相憶送鄔三落第還鄉郢客文章絶世稀常嗟時命與心違十年失路誰知已千里思親獨逺歸雲帆春水將何適日愛東南暮山碧闗中新月對離樽江上殘花待歸客名宦無媒自}
  - {type: page-break, offset: 2, content: '', id: KR4c0037_WYG_001-6a, image: WYG1072/WYG1072-0445a.png}
