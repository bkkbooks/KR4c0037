  - {type: variant, offset: 816, length: 488, content: 懷萬里天旅吟還有伴沙柳數枝蟬九日自佳節扁舟無一杯曹園舊尊酒戲馬憶髙臺兵火有餘燼貧村纔數家無人爭曉渡􅋊月下寒沙渚禽菱茨足不向稻梁争靜宿涼灣月應無失侣聲輕雲未撲霜樹杪橘𥘉黃行是知名物微風過水香土曠深耕少江平逺釣多生平皆弃本金革竟如何海月非常物不可尋披沙應有地淺處定無金風晚冷颼颼蘆花巳白頭舊來紅葉寺堪憶玉亰秋渺渺望天涯清漣浸赤霞難逢星漢使烏鵲日乗查風好來無陣雲閑去有宗釣歌無逺近應喜罷艨艟吳彊連楚甸楚俗異吳郷謾把罇中物無人喙蟹筐岸緑野煙逺江紅斜照微撑開小魚艇應到月明歸雨餘江始漲漾漾見流薪曽歎溝中木斯言憶古人墜露晚猶濃秋風不易逢渉江雖巳晚高樹攀芙蓉葉舟維夏口煙野獨行時不見頭陀寺空懷㓜婦碑晚泊武昌岸津亭踈柳風數株曽手植好事憶陶公舟航依浦定星斗滿江寒若比隂霾日何妨夜未䦨近戍離金落孤岑望火門唯將知命意瀟灑向乾坤叢菊生隄上此花長後時有人還採掇何必有春期夕景殘霞落秋寒細雨晴短纓何用濯舟在月中行堤壞漏江水地㘭成野塘晚荷人不折留取作秋香失宦終何路攄懷亦自寛襞牋嘲白鷺無意喻梟鸞樓空人不歸雲似去時衣黄鶴無心下長應笑令威白帝朝驚浪陽䑓暮映雲等閒生險易世路秪如君櫓慢生輕浪㠶虚帶白雲客船雖狹小容, WYG: 賦}
