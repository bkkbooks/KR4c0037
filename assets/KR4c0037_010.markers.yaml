  - {type: variant, offset: 1386, length: 2, content: 考功, WYG: 願贖龜其七去指龍沙路徒懸象闕心夜凉無逺夢不為偶聞砧其八霽雲踈有葉雨浪細無花穩放扁舟去江天自有涯其九好日長秋半層波動旅腸已行千里外誰與共秋光其十潤色非東里官曹更建章宦遊難自定來喚擢船郎其十一夜江清未曉徒惜月光沉不是因行樂堪傷老大心其十二翳日多喬木維舟取束薪静聴江叟語盡是厭兵人其十三箭漏日初短汀烟草未衰雨微雖更緑不是採蘋時其十四山水夜來漲喜魚跳滿江岸沙平欲盡垂蓼入船窓其十五渚邉新鴈下舟上獨凄凉俱是南來客怜君垂一行其十六雲宻連江暗風斜著物鳴一杯真戰將笑爾作愁兵其十七栁拂斜陽路籬邉數户村可能還有意不掩向江門其十八不識相如渴徒吟子美詩江清惟獨看心外更誰知其十九牽路沿江狹沙崩岸不平盡知行處險誰肯載時輕其二十憔悴異靈均非讒作逐臣如逢漁父問未是獨醒人其二十一水含秋色静雲帶夕陽高詩癖非吾病何妨吮短毫其二十二帶舟維古岸還似阻西陵箕伯無多少囬頭詎不能其二十三秋雲乆無雨江燕社猶飛却笑舟中客今年未得歸其二十四帆翅初張處雲鵬怒翼同莫愁千里路自有到來風其二十五佳節雖逢菊浮生正似萍故山何處望荒岸小長亭其二十六月下江流静村荒人語稀鷺鴛雖有伴仍共影雙飛其二十七斗轉月未落舟行夜已深有村知不逺風便數聲砧其二十八棹驚沙鳥迅飛濺夕陽波不顧魚多處應防一目羅其二十九行到楚江岸蒼茫人正迷秪如秦塞逺格磔鷓鴣啼其三十漸覺江天逺難逢故國書可能無往事空食鼎中魚其三十一岸草連荒色村聲樂稔年晚晴貪穫稻閑却採菱船其三十二灘淺多遊鷺江清易見魚恠來吟未足秋物欠紅蕖其三十三蛩響依沙草螢飛透水煙夜凉誰詠史空泊運租船睡穩葉舟輕風微浪不驚人居蘆葦岸終夜動秋聲其三十五自念平生意曾期一郡符可知因謫宦斑鬢入江湖其三十六水天凉夜月不是少清光好景隨人物秦淮憶建康其三十七古來多思客揺落恨江潭今日秋風至蕭踈過沔南其三十八映竹疑村好穿蘆覺渚幽漸安無曠土薑芋當農収其三十九煙渚復煙渚畫屏休畫屏引愁天末去數㸃暮山青其四十秋風動客心寂寂不成吟飛上危檣立啼鳥不知音其四十一見底高秋水開懐萬里天旅吟還有伴沙栁數枝蟬其四十二九日自佳節扁舟無一杯曹園舊罇酒戯馬憶高臺其四十三兵火有餘燼貧村纔數家無人争曉渡殘月下寒沙其四十四渚禽菱芡足不向稻粱争静宿凉灣月應無失侣聲其四十五輕雲未撲霜樹杪橘初黄信是知名物微風過水香其四十六土曠深耕少江平逺釣多平生皆棄本金革竟如何其四十七海月非常物等閑不可尋披沙應有地淺處定無金其四十八風晚冷颼颼蘆花已白頭舊來紅葉寺堪憶玉京秋其四十九渺渺望天涯清漣浸赤霞難逢星漢使烏鵲日乘槎其五十風好來無陣雲開去有踪釣歌無逺近應喜罷艨艟其五十一吳疆連楚甸楚俗異吳鄉謾把罇中物無人啄􅈉黄其五十二岸綠野烟逺江紅斜照微撑開小魚艇應到月明歸其五十三雨餘江始漲漾漾見流薪曾嘆溝中木斯言憶故人其五十四垂露曉猶濃清風不易逢渉江雖已晚高樹攀芙蓉其五十五乘舟維夏口煙野獨行時不見頭陀寺空懐㓜婦碑其五十六晚泊武昌岸津亭踈栁風數株曾手植好事憶陶公其五十七舟航依浦定星斗滿江寒若比隂霾日何方夜未闌其五十八近戍離金落孤岑望火門唯將知命意瀟洒向乾坤其五十九叢菊生隄上此花長後時有人還採掇何必有春期其六十景夕殘霞落秋寒細雨晴短纓何用濯舟在月中行其六十一堤壊漏江水地坳成野塘晚荷人不折留取作秋香其六十二失宦終何路攄懐亦自寛襞牋嘲白鷺無意喻梟鸞其六十三樓空人不歸雲似去時衣黄鶴無心下長應笑令威其六十四白帝朝驚浪陽臺暮應雲等閑生險易世路祗如君其六十五櫓一作蘆慢生輕浪帆虚帶白雲客船雖狹小容得庾將軍其六十六静看秋江水風微浪漸平人間馳競處塵土自波成其六十七風借帆方疾風囬棹却遲較量人世事不校一毫􅁵其六十八咫尺愁風雨匡廬不可登秪疑香霧窟猶有六朝僧其六十九江草何多思冬青尚滿洲誰能驚鵩鳥作賦為沙鷗其七十幸有煙波興寧辭筆硯勞縁情無怨刺却似反離騷其七十一沙上獨行時吟高到楚詞難得垂岸蓼盈把當江蘺其七十二秋寒鷹隼徤逐雀下雲空知是江湖客無心擊塞鴻其七十三幽懐念煙水長恨隔龍沙今日滕王閣分明見落霞其七十四江流何渺渺懐古獨依依漁父非賢者蘆中但有磯其七十五逺謫嵗時晏暮江風雨寒仍愁繫舟處驚夢近長灘錢仲文}
