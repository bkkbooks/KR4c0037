front:
  text: 錢考功集卷第九
  hash: sha256:144f7054facc1cc162b64adcbb96fbf71746e25277f6b4b8b05c7c34dfd128d5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0037_SBCK_009-1a}
body:
  text: 五言絶句江行無題一百首傾酒向漣漪乗流欲去時寸心同尺璧投此報馮夷江曲全縈楚雲飛半自秦峴山廻首望如别故關人浦煙含夜色冷日轉秋旻自有沉碑在清光不照人楚岸雲空合楚城人不來秪今誰善舞莫恨廢章臺行背青山郭吟當白露秋風流無屈宋空詠古荆州晚來漁父喜􅊻重欲收遲恐有長江使金錢願贖龜去指龍沙路徒懸象魏心夜涼無逺夢不為偶聞砧霽雲踈有葉雨浪細無花穏放扁舟去江天自有涯好日當秋半層波動旅膓巳行千里外誰與共秋光潤色非東里官曹吏建章宦逰難自定來喚櫂船郎夜江清未曉徒惜月光沉不是因行樂堪傷老大心翳日多喬木維舟取束薪靜聽江叟語俱是厭兵人箭漏日初短汀煙草木衰雨餘雖更緑不是采蘋時山雨夜來漲喜魚跳滿江岸沙平欲盡垂蓼入船窓渚邊新鴈下舟上獨妻凉俱是南來客憐君綴一行雲宻連江暗風斜着物鳴一杯眞戰將笑爾作愁兵桞拂斜開路籬邊數戸村可能還有意不掩向江門不識相如渴徒吟子美詩江清唯獨看心外更誰知牽路沿江狹沙崩岸不平盡知行處險誰肯載時輕憔悴異靈均非䜛作逐臣如逢漁父問未是獨醒人水涵秋色靜雲帶夕陽高詩癖非吾病何妨吮短毫帶舟維古岸還似阻西陵箕無多少廻頭詎不能秋雲乆無雨江燕社猶飛却笑舟中客今年未得歸㠶翅初張處雲鵬怒翼同莫愁千里路自有到來風佳節雖逢菊浮生正似萍故山何處望荒岸小長亭月下江流靜村荒人語稀鷺鴛雖有伴仍共影雙飛斗轉月未落舟行夜已深有村知不逺風便數聲砧棹驚沙鳥迅飛濺夕陽波不顧魚多處應防一目羅行到楚江岸蒼茫人正迷秪如秦塞逺格磔鷓鴣啼漸覺江天逺難逢故國書可能無徃事空食鼎中魚岸草連荒色村聲樂稔年晚晴貪獲稻閒却採菱船灘淺多㳺鷺江清易見魚怪來吟未足秋物欠江渠蛩響依沙草螢飛透水煙夜涼誰詠史空泊運租船睡穏葉舟輕風微浪不驚任君蘆葦岸終夜動秋聲自念平生意曾期一郡符可知因謫宦班鬢入江湖水天涼夜月不是少清光好景隨人物秦淮憶建康古來多思客揺落恨江潭今日秋風至蕭踈過沔南映竹疑村好穿蘆覺渚幽漸安無曠土薑芋當農收煙渚復煙渚畫屏休畫屏引愁天末去數點暮山青秋風動客心寂寂不成吟飛上危檣立啼烏報好音見底高秋水開懷萬里天旅吟還有伴沙柳數枝蟬九日自佳節扁舟無一杯曹園舊尊酒戲馬憶髙臺兵火有餘燼貧村纔數家無人爭曉渡􅋊月下寒沙渚禽菱茨足不向稻梁争靜宿涼灣月應無失侣聲輕雲未撲霜樹杪橘𥘉黃行是知名物微風過水香土曠深耕少江平逺釣多生平皆弃本金革竟如何海月非常物不可尋披沙應有地淺處定無金風晚冷颼颼蘆花巳白頭舊來紅葉寺堪憶玉亰秋渺渺望天涯清漣浸赤霞難逢星漢使烏鵲日乗查風好來無陣雲閑去有宗釣歌無逺近應喜罷艨艟吳彊連楚甸楚俗異吳郷謾把罇中物無人喙蟹筐岸緑野煙逺江紅斜照微撑開小魚艇應到月明歸雨餘江始漲漾漾見流薪曽歎溝中木斯言憶古人墜露晚猶濃秋風不易逢渉江雖巳晚高樹攀芙蓉葉舟維夏口煙野獨行時不見頭陀寺空懷㓜婦碑晚泊武昌岸津亭踈柳風數株曽手植好事憶陶公舟航依浦定星斗滿江寒若比隂霾日何妨夜未䦨近戍離金落孤岑望火門唯將知命意瀟灑向乾坤叢菊生隄上此花長後時有人還採掇何必有春期夕景殘霞落秋寒細雨晴短纓何用濯舟在月中行堤壞漏江水地㘭成野塘晚荷人不折留取作秋香失宦終何路攄懷亦自寛襞牋嘲白鷺無意喻梟鸞樓空人不歸雲似去時衣黄鶴無心下長應笑令威白帝朝驚浪陽䑓暮映雲等閒生險易世路秪如君櫓慢生輕浪㠶虚帶白雲客船雖狹小容得瘦將軍靜看秋江水風微浪漸平人間馳競處塵土自波成風借帆方疾風囘棹却遲較量人世事不校一毫釐咫尺愁風雨匡盧不可登秪疑香霧窟猶有六朝僧風雨正甘寢雲霓忽晚晴放歌須自遣一歳又峥嶸幽思正遲遲沙邊濯弄時目憐非博物猶未識鳬葵曾有煙波客能歌西塞山落㠶唯待月一釣紫菱灣千頃水紋細一拳嵐影孤君山寒樹緑曽過洞庭湖光闊重湖水低斜逺鴈行未曽無興詠多謝沈東陽日洛長亭晚山門歩障青可能無酒分更祝有旗星晚菊遶江壘忽如開古屏莫言時節過白日有餘馨秋寒鷹隼徤逐雀下雲空知是江湖客無心擊塞鴻逺岸無行樹經霜有伴紅停船搜好句題葉贈江楓江草何多思冬青尚滿洲誰能驚鵩鳥作賦爲沙鷗身世比行舟無風亦暫休敢言終破浪唯願穏乗流數畒蒼苔石煙濛鶴卵洲定因詞客過名字始風流幽懷念煙水長恨隔龍沙今日滕王閣分明見落霞興閑停桂楫路好過松門不負佳山水還開酒一尊短檝休𫾣桂孤根自駐萍自憐非劒氣空向斗牛星江流何淼淼懷古獨依依漁父非賢者蘆中但終奇高浪如銀屋江風一發時筆端降太白才大語有磯細竹漁家路晴陽看結􅊻喜來邀客坐分與折腰菱幸有煙波興寜辭筆硯勞緣情無怨刺却似反離驕平湖五百里江水想通波不奈扁舟去其如决計何數峯雲斷處去岸映西山身到章江日猶應未得閒一彎斜照水三板順風船未敢相邀約勞生秪自憐江雨正霏微江村晚渡稀何曽妨釣艇更待得魚歸沙上獨行時吟高到楚祠難將垂㟁蓼盈把當江籬新野舊樓名潯陽勝賞情照人長一色江月共淒清潯陽江畔菊應似古来秋爲問幽棲客吟時得酒不願飲西江水那吟北渚愁莫教留滯跡逺比蔡昭侯湖口分江水東流獨有情當時好風物誰爲伴宣城高峰有佳號千尺倚寒風若使鑪煙在猶應爲上公萬木巳清霜江邊村事忙故谿黃稻熟一夜甕中香楚水苦縈廻征㠶落又開可縁非直路却有好風來逺謪歲時晏暮江風雨寒仍愁繫舟處驚夢近長灘錢考功集卷第九
