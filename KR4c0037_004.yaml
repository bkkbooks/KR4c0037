  text: 錢考功集卷第四
  hash: sha256:d085f69c9833cb58639b28f1b30c899b6d6c393f37d1231aaca1bd57647db915
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0037_SBCK_004-1a}
body:
  text: 五言律詩奉和聖製登會昌山應制睿想入希夷真逰到具茨玉鑾登嶂逺雲輅出花遲泉壑凝神處陽和布澤時六龍多順動四海正雍熙省中對雪寄元判官拾遺昆季萬點瑤臺雪飛來錦帳前瓊枝應比淨鶴髮敢爭先散影成花月流光透竹煙今朝謝家興幾處郢歌傳山齋獨坐喜玄上人夕至舍下虎溪徑煙霞入暝開柴門兼竹靜山月與僧來心瑩紅蓮水言忘緑茗杯前峯曙更好斜漢欲西回秋夜寄張韋二主簿涼夜褰簾好輕雲過月初碧空河色淺松葉雨聲虛道阻天難問機忘世易踈不知雙翠鳯棲棘復何如歸故山路逢鄰居隱者握手雲棲路濳然恨幾重誰知緑林盜長占綵霞峰心死池塘草聲悲石徑松無因芳杜月琴酒更相逢落第劉拾遺相送東歸不醉百花酒傷心千里歸獨收和氏玉還採舊山薇出處離心盡榮枯會面稀預愁芳草色一徑入衡闈和劉七讀書夜雨深館靜苦心黃卷前雲隂留墨沼螢影傍華編夢鳥冨青藻通經仍妙年何愁丹穴鳯不飲玉池泉早下江寧暮天微雨散涼吹片帆輕雲物髙秋節山川孤客情霜蘋留楚水寒燕别吳城宿浦有歸夢愁猿莫夜鳴登復州南樓孤樹延春日他山卷曙霞客心湖上鴈歸思日邊花行李迷方久歸期涉歲賖故人雲路隔何處寄瑤華江陵晦日陪諸官泛舟節物堪為樂江湖有主人舟行深更好山趣久彌新樽酒平生意煙花異國春城南無夜月長袖莫留賓縣城秋夕山城日易夕愁坐先掩扉俸薄不酤酒家貧忘授衣露重蕙花落月冷莎雞飛效拙慙無補雲林歎再歸秋夜梁七兵曹同宿二首一笑不可得同心相見稀摘菱頻貰酒待月未扄扉星影低驚鵲蟲聲傍旅衣卑棲歲巳晚共羡鴈南飛好欲棄吾道今宵又遇君老夫相勸酒稚子待題文月下誰家笛城頭幾片雲如何此幽興明日重離群和萬年成少府寓直赤縣新秋夜文人藻思催鐘聲自仙掖月色近霜臺一葉兼螢度孤雲帶鴈來明朝紫書下應問長卿才春夜過長孫繹别業佳期難再得清夜此雲林帶竹新泉冷穿花片月深含毫凝逸思酌水話幽心不覺星河轉山枝驚曙禽題溫處士山居誰知白雲外别有緑蘿春苔繞溪邊徑花深洞裏人逸妻看種藥稚子伴垂綸頴上逃堯者如何此飬真題陳季壁郢人何苦調飲水仍布衾煙火晝不起蓬蒿春欲深前庭少喬木鄰舍聞新禽雖有徴賢詔終傷不遇心贈鄰居齊六司倉沉冥衆所遺咫尺絶佳期始覺衡門下翛然太古時雞聲共林巷燭影隔茅茨坐惜牛羊徑芳蓀白露滋送征鴈秋空萬里淨嘹唳獨南征風急翻霜冷雲開見月驚塞長怯去翼影滅有餘聲悵望遙天外鄉愁滿目生宴鬱林觀張道士房滅迹人間世忘歸象外情竹壇秋月冷山殿夜鍾清仙侣披雲集霞杯逹曙傾同歡不可再朝暮赤龍迎秋夕與梁鍠文宴客到衡門下林香蕙草時好風能自至明月不須期秋月翻荷影晴霜脆柳枝留歡美清夜寧覺曉鍾遲哭空寂寺玄上人悽然雙樹下垂淚逺公房燈續生前火爐添沒後香隂階明片雪寒竹響空廊寂滅應為樂塵心徒自傷題精舍寺勝景不易遇入門神頓清房房占山色處處分泉聲詩思竹間得道心松下生何時來此地擺落世間情開元觀遇張侍御碧落忘歸處佳期不厭逢晚涼生玉井新暑避煙松欲醉流霞酌還醒度竹鍾更憐琪樹下歷歷見遙峰和人秋歸終南山别業舊居三顧後晚節重幽尋野徑到門盡山窗連竹隂昔年鶯出谷今日鳯歸林物外凌雲操誰能繼此心故相國苗公挽歌霸陵誰寵葬漢主念蕭何盛業留青史浮榮逐逝波隴雲仍作雨薤露巳成歌悽愴平津閣秋風弔客過酬劉員外雨中見寄苦雨滳蘭砌凄風生葛衣潢汙三徑絶砧杵四鄰稀分與玄豹隱不為湘燕飛慙君角巾折猶肯問衡闈賦得歸雲送李山人歸華山秀色橫千里歸雲積幾重欲依毛女岫初卷少夷峯蓋影隨征馬衣香拂卧龍秪應函谷上真氣日溶溶過裴長官新亭茅屋多新意芳林昨試移野人知石路戲鳥認花枝慢水縈蓬戶間雲挂竹籬到家成一醉歸馬不能騎寄郢州郎士元使君龍節知無事江城不掩扉詩傳過客逺書到故人稀坐嘯看潮起行春送鴈歸望舒三五夜思盡謝玄暉過長孫宅與朗上人茶會偶與息心侶忘歸才子家玄談兼藻思緑茗代榴花岸幘看雲卷含毫任景斜松喬若逢此不復醉流霞下第題長安客舍不遂青雲望愁看黃鳥飛梨花度寒食客子未春衣世事隨時變交情與我違空餘主人桞相見却依依陪考功王員外城東池亭宴無雙錦帳郎絶境有林塘鶴靜踈群羽蓮開失衆芳晴山看不厭流水趣何長日晚催歸騎鐘聲下夕陽過孫員外藍田山居不知香署客謝病翠微間去幄蘭將老辭車雉亦間近窗雲出洞當戶竹連山對酒溪霞晚家人採蕨還秋園晚沐黃卷在窮巷歸來生道心五株衰桞下三徑小園深倒薤翻成字寒花不假林龎眉謝群彥獨酌且間吟窮秋對雨晦日連苦雨動息更邅回生事萍無定愁心雲不間翟門悲暝雀墨竈上寒苔始信宣城守乘流畏曝腮裴迪南門秋夜對月夜來詩酒興月滿謝公樓影閉重門靜寒生獨樹秋鶴驚隨葉散螢逺入煙流今夕遙天末清光幾處愁和蜀縣假明府秋城望歸期製錦蜀江靜飛鳬漢闕遙一茲風靡草再視露盈條旅望多愁思秋天更泬寥河陽傳麗藻清韻入歌謡晚歸藍田酬王維給事贈别卑棲却得性每與白雲歸徇祿仍懷橘看山免採薇暮禽先去馬新月待開扉霄漢時回首知音青鎖闈再得畢侍御書聞巴中卧疾芳信來相續同心逺更親數重雲外樹不隔眼中人夢寐花􅍡色相思黃鳥春更聞公幹病一夜二毛新宿新里館愁人待曉雞秋雨暗淒淒度燭螢時滅傳書鴈漸低客來知計誤夢裏泣津迷無以逃悲思寒螿處處啼谷口書齋寄楊輔闕泉壑帶茅茨雲霞生薜帷竹憐新雨後山愛夕陽時間鷺棲常早秋花落更遲家童掃蘿徑昨與故人期衡門春後不厭晴林下微風度葛巾寧唯北窗月自為上皇人叢篠輕新署孤花占晚春寄言莊叟蝶與爾得天真題吳通微主人食貧無盡日有願幾時諧長嘯秋光晚誰知志士懷朝煙不起竈寒葉欲連階飲水仍留我孤燈點夜齋晚次宿預館鄉心不可問秋氣又相逢飄泊方千里離悲復幾重回雲隨去鴈寒露滳鳴蛩延頸遙天末如聞故國鍾藍上茆茨期王維輔闕山中人不見雲去夕陽過淺瀨寒魚少叢蘭秋蝶多老年踈世事幽性樂天和酒熟思才子溪頭望玉珂春夜寓直養性慣雲卧為郎如鳥棲不知仙閣峻惟覺玉繩低帳喜香煙暖詩慙賜筆題未央春漏促殘夢謝晨雞新昌里言懷性拙偶從宦心間多掩扉雖看北堂草不忘舊山薇花月霽來好雲泉堪夢歸如何建章漏催著早朝衣秋夜寄袁中丞王貟外一夕盈千念方知別者勞衰榮難會靣魂夢暫同𫀆片月臨階早晴河度鴈高應憐蔣生徑秋露滿蓬蒿九日間居寄登髙數子初服棲窮巷重陽憶舊逰門間謝病日心醉授衣秋酒盡寒花笑庭空暝雀愁今朝落帽客幾處管絃留晚入宣城界斜日片帆隂春風孤客心山來指樵路岸去惜花林海氣蒸雲黑潮聲隔雨深鄉愁不可道浦宿聽猿吟靜夜酬通上人問疾東林生早涼髙枕逺公房大士看心後中宵清漏長驚蟬出暗柳微月隱回廊何事沉痾久含毫問藥王奉陪使君十四叔晚憩大雲門寺野寺千家外間行晚暫過炎氛臨水盡夕照傍林多境對知心妄人安覺政和繩牀搖麈尾佳趣滿滄波省中春暮酬嵩陽焦道士見招朝花飛暝林對酒傷春心流年催素髮不覺映華簪垂老遇知巳酬恩看寸隂如何紫芝客相憶白雲深酬苗發員外宿龍池寺見寄寧知待漏客清夜此從容暫别迎車雉還隨護法龍香煙輕上月林嶺靜聞鍾郢曲傳甘露塵心洗幾重貞懿皇后挽詞淑麗詩傳美徽章禮飾哀有恩加象服無日祀高禖曉月孤秋殿寒山出夜臺通靈深眷想青鳥獨飛來歲初歸舊山酬寄皇甫侍御欲知愚谷好久别與春還鶯暖初歸樹雲晴郤戀山石田耕種少野客性情間求仲應難見􅋊陽且掩關鑾駕避狄歲别韓雲卿白髮壯心死愁看國步移關山慘無色親愛忽驚離影絶龍分劒聲哀鳥戀枝茫茫雲海外相憶不相知詠白油帽送客薄質慙加首愁隂幸庇身卷舒無定日行止必依人巳沐脂膏惠寧辭雨露頻雖同客衣色不染洛陽塵藍上采石芥寄前李明府淵明遺愛處山芥緑芳𥘉玩此春隂色猶滋夜雨餘隔溪煙葉小覆石雪花舒采采還相贈瑤華信不如送贇法師往上都逺近化人天王城指日邊宰君迎説法童子伴隨緣到處花為雨行時杖出泉今宵松月下門閉想安禪送沈少府還江寧逺宦碧雲外此行佳興牽湖山入閭井鷗鳥傍神仙斜日背鄉樹春潮迎客船江樓新興發應與政聲傳送虞説擢第東逰湖山不可厭東望有餘情片玉登科後孤舟任興行月中嚴子瀨花際楚王城歲暮雲皋鶴聞天更一鳴送少微師西行隨緣忽西去何日返東林世路寧嗟别空門久息心人煙一飯少山雪獨行深天外猿啼處誰聞清梵音送崑山孫少府徇祿近滄海乘流看碧霄誰知仙吏去宛與世塵遙逺帆背歸鳥孤舟低上潮懸知訟庭靜窗竹日蕭蕭送屈突司馬充安西書記制勝三軍徑澄清萬里餘星飛龐統驥箭發魯連書海月低雲斾江霞入錦車遙知太阿劍計日斬鯨魚送時暹避難適荆南三嘆把離𬒮七哀深我情雲天愁逺别豺虎擁前程駐馬戀携手隔河聞哭聲相思昏若夢淚眼幾時明送邊輔闕省覲東去有餘意春風生賜衣鳯凰銜詔下才子采蘭歸斗酒百花裏情人一笑稀别離須計日相望在􅊮闈錢考功集卷第四
