  text: 錢考功集卷第三
  hash: sha256:6e3dd63b755eab7af56df7ece5ec9937b4dbd65cc256d30caffe557b4cdfa31d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0037_SBCK_003-1a}
body:
  text: 七言古詩紫參歌并序紫參幽芳也五菂連蕚狀飛禽羽舉俗名之五鳥花起故山道人蘭若尤豐此藥校書劉公詠歌之俾豫繼組逺公林下滿青苔春藥偏冝間石開往往幽人尋水見時時仙蝶隔雲來隂陽雕刻花如鳥對鳯連雞一何小春風宛轉虎溪傍紫翼紅翹翻霽光貝葉經前無住色蓮花㑹裏暫留香蓬山才子憐幽性白雪陽春動新詠應知仙卉老雲霞莫賞夭桃滿蹊徑瑪瑙杯歌瑤溪碧岸生奇寶剖質披心出文藻良工雕飾明且鮮得成珍器入芳筵含華炳麗金樽倒翠斚瓊觴忽無色繁絃急管催獻酬倐若飛空生羽翼湛湛蘭英照豹斑滿堂詞客盡朱顔花光來去傳香䄂霞影高低傍玉山王孫彩筆題新詠碎錦連珠復輝映世情貴耳不貴奇謾說海底珊瑚枝寧及琢磨當妙用燕歌楚舞長相隨鋤藥詠蒔藥穿林復在巘濃香秀色深能淺雲氣垂來裛露偏松隂古處知春晚拂曙殘鶯百轉催縈泉帶石幾花開不隨飛鳥緣枝去如笑幽人出谷來對之不覺忘踈懶廢卷荷鋤嫌日短豈無萱草樹階墀惜爾幽芳世所遺但使芝蘭出蕭艾不辭手足皆胼胝寧學陶濳空嗜酒頽齡捨此事東菑病鶴篇獨鶴聲哀羽摧折沙頭一點留􅋊雪三山仙侣能逺翔五里徘徊忍為别驚群各畏野人機誰肯相將霞外飛不及洲鳬長比翼隨波雙泛復雙歸碧海滄江深且廣目盡天倪安得往雲山隔路不隔心宛頸和鳴長在想何時白霧卷青天接影追飛太液前片玉篇至寶未為代所奇韞靈示璞荆山垂獨使虹光天子識不將清韻世人知世人所貴惟燕石美玉對之成瓦礫空山埋照凡幾年古色蒼㾗宛自然重溪羃羃暗雲樹一片熒熒光石泉美人之鑒明且徹玉指提擕歎竒絶試勞香䄂拂莓苔不覺清心皎氷雪連城美價幸逢時命代良工豈見遺試作圭璋禮天地何如瓀在階墀畫鶴篇點素凝姿任畫工霜毛玉羽照簾櫳借問飛鳴華表上何如粉繢彩屏中文昌官近芙蓉闕蘭室氤氲香且結爐氣朝成緱嶺雲銀燈夜作華亭月日暖花明梁燕歸應驚片雪在仙闈主人顧盻千金重誰肯徘徊五里飛秋霖曲君不見聖主旰食憂元元秋風苦雨暗九門鳯凰池裏沸泉騰蒼龍闕下生雲根隂精離畢太淹度倦鳥將歸不知樹愁隂慘淡時殷雷生靈墊溺若寒灰公卿紅粒爨丹桂黔首白骨封青苔貂裘玉食張公子炮炙熏天㦸門裏且如歌笑日揮金應笑禹湯能罪巳鶴鳴蛙躍正其時豹隱蘭凋亦可悲焉得太阿决屏翳還令率土見朝曦賦得青城山歌送楊杜二郎中赴蜀軍蜀山西南千萬重仙經最說青城峯青城嶔岑倚空碧逺壓峨眉吞劒壁錦屏雲起易成霞玉洞花明不知夕星臺二妙逐王師阮瑀軍書王粲詩日落猿聲連玉笛晴來山翠傍旌旗緑蘿春月營門近知君對酒遙相思送崔校書從軍鴈門太守能愛賢麟閣書生亦投筆寧惟玉劒報知巳更有龍韜佐師律别馬連嘶出御溝家人幾夜望刀頭燕南春草傷心色薊北黃雲滿眼愁聞道輕生能擊虜何嗟少壯不封侯送張將軍西征長安少年唯好武金殿承恩爭破虜沙場烽火隔天山鐡騎西征幾歲還戰處黑雲霾浣海愁中明月度陽關玉笛聲悲離酌晚金方路極行人逺計日霜戈盡敵歸回首戎城空落暉始笑子卿心計失徒看海上節髦稀送修武元少府寸祿牽色飬此行寧嘆息自矜黃綬采蘭時不厭丹墀芳草色百戰荒城復井田幾家春樹帶人煙黎氓久厭蓬飄苦遲爾西南惠月傳送崔十三東逰千里有同心十年一會靣當杯緩箏柱倐忽催離宴丹鳯城頭噪晚鴉行人馬首夕陽斜灞上春風留别𬒮關東新月宿誰家官桞依依兩鄉色誰能此别不相憶送塢三落第還鄉郢客文章絶世稀常嗟時命與心違十年失路誰知已千思思親獨逺歸雲帆春水將何適日愛東南暮山碧關中新月對離樽江上殘花待歸客名宦無媒自古遲窮途此别不堪悲荷衣垂釣且安命金馬招賢㑹有時送馬明府赴江陵陶令南行心自永江天極目澄秋景萬室遙方犬不鳴雙鳬下處人皆靜清風高興得湖山門柳蕭條雙翟間黃花滿把應相憶落日登樓北望還送畢侍御謪居崇蘭香死玉簮折志士吞聲甘徇節忠藎不為明主知悲來莫向時人說滄浪之水見心清楚客辭天淚滿纓百鳥喧喧噪一鶚上林高枝亦難託寧嗟人世棄虞翻且喜江山得康樂自憐黃綬老嬰身妻子朝來勸隱淪桃花洞裏舉家去此别相思復幾春送禇大落第東歸離琴彈苦調美人慘向隅頃來荷䇿干明主還復扁舟歸五湖漢家側席明敡久豈意遺賢在林藪玉堂金馬隔青雲墨客儒生皆白首昨夢芳洲採白蘋歸期且喜故園春稚子只思陶令至文君不猒馬卿貧剡中風月久相憶池上舊遊應再得酒熟寧孤芳杜春詩成不枉晴山色念此那能不羡歸上陽諫獵事皆違他日東流一乘興知君為我掃荆扉送傳管記赴蜀軍終童之死誰繼出燕頷儒生今俊逸主將早知鸚鵡賦飛書許載蛟龍筆峨眉玉壘指霞標鳥沒天低幕府遙巴山雨色藏征斾漢水猿聲咽短簫賜璧腰金應可料才略縱橫年且妙無人不重樂毅賢何敵能當魯連嘯日暮黃雲千里昏壯心輕别不銷魂勸君用却龍泉劒莫負平生國士恩行路難君不見明星映空月太陽朝升光盡歇君不見凋零委路蓬長風飄舉入雲中由來人事何常定且莫驕奢笑賤窮盧龍塞行送韋掌記雨雪紛紛黑山外行人共指盧龍塞萬里飛砂咽鼓􅎏三軍殺氣凝旌斾陳琳書記本翩翩料敵張兵奪酒泉聖主好文兼好武封侯莫比漢皇年效古秋夜長秋漢飛玉霜北風掃荷香含情紡織孤燈盡拭淚相思寒漏長簷前碧雲靜如水月弔栖烏啼鳥起誰家少婦事鴛機錦幕雲屏深掩扉白玉窗中聞落葉應憐寒女獨無衣山中寄時校書蓬萊紫氣溫如玉唯豫知爾陽春曲别來幾日芳蓀緑百花酒滿不見君青山一望心斷續哭曹鈞苦節推白首憐君負此生忠藎名空立家貧道不行朝來相憶訪蓬蓽只謂淵明猶卧疾忽見江南弔鶴來始知天上文星失常恨知音千古稀那堪夫子九泉歸一聲鄰笛殘陽裏酹酒空堂淚滿衣錢考功集卷第三
