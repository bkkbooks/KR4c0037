  text: 錢考功集卷第二
  hash: sha256:a8ce9c453aa6cd3ba830608892ff6ac0900462db5368f2d414ebe2edf3b1fdab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0037_SBCK_002-1a}
body:
  text: 五言古詩海畔秋思匡濟難道合去留隨興牽偶為謝客事不顧平子田魏闕賁翹楚此身長棄捐箕裘空在念拙詘誰推賢無用即明代飬痾仍壯年日夕望佳期帝鄉路幾千秋風晨夜起零落愁芳筌太子李舍人城東别業南山轉群木昏曉擁山翠小澤近龍居青蒼常雨氣君家北原上千金買勝事丹闕退朝回白雲迎賞至新晴村落外處處煙景異片水明新崖餘霞入古寺東皋指歸翼月盡有餘意谷口新居寄同省朋故種黍傍煙溪榛荒兼沮洳亦知生計薄所貴隱身處橡栗石上林莓苔水中路蕭然授衣日得此還山趣汲井愛秋泉結茆因古樹間雲與幽鳥對我不能去寄謝鴛鴦群狎鷗拙所慕亰兆尹廳前甘棠樹降甘露內史用堯意理亰宣惠慈氣和祥則降孰謂天難知濟旱露為兆有如塤應箎豈無夭桃樹灑此甘棠枝玉色與人净珠光臨筆垂協風與之俱物性皆熙熙何必鳯池上方看作霖時秋夜作萬計各無成寸心日悠漫浮生竟何窮巧曆不能算流落四海間辛勤百年半商歌向秋月哀韻兼浩嘆窹寐怨佳期美人隔霄漢寒雲度窮水别業繞垂幔窗中問談雞長夜何時旦觀村人牧山由六府且未盈三農爭務作貧民乏井稅瘠土皆墾鑿禾黍入寒雲茫茫半山郭秋來積霖雨霜降方銍獲中田聚黎氓反景空村落顧慙不耕者微祿同衛鶴庶追周任言敢負謝生諾裴侍郎湘川回以青竹筒相遺因而贈之楚竹青玉潤從來湘水隂緘書取直節君子知虛心入用隨憲簡積文不受金體將丹鳯直色映清霜深寧肯假伶倫謬為龍鳯吟唯將翰苑客昔祕瑤華音長跪捧嘉貺歲寒慙所欽東城初陷與薛員外王𥙷闕暝投南山佛寺日􅉴石門裏松聲山寺寒香雲空靜影定水無驚湍洗足解塵纓忽覺天形寬清鍾揚虛谷微月深重巒噫我朝露世翻浮與波瀾行運遘憂患何緣親盤桓庶將鏡中象盡作無生觀奉和張荆州巡農晚望太清霽雲雷陽春陶物象明牧行春令仁風助升長時和俗勤業播殖農厥壤隂隂桑陌連漠漠水田廣郡中忽無事方外還獨往日暮駐歸軒湖山有佳賞宣城傳逸韻千載誰此響送包何東逰水國嘗獨往送君還念兹湖山逺近色昏旦煙霞時子好謝公跡常吟孤嶼詩果乘扁舟去若與白鷗期野趣及春好客逰欣此辭入雲投館僻采碧過帆遲江上日回首琴中勞别思春鴻刷歸翼一寄杜蘅枝酬陶六辭秩歸舊居見簡靜節昔髙尚令孫嗣清徽舊廬雲峰下獻歲車騎歸去俗因解綬憶山得采薇田疇春事起里巷相尋稀淵明醉乘興閒門秪掩扉花禽驚曙月鄰女上鳴機畢娶願巳果飬恬志寧違吾當掛朝服同爾緝荷衣奉使採箭簳竹谷中晨興赴嶺孤客倦夜坐聞猿乘早發背溪巳斜漢登棧尚􅋊月重峰轉森爽幽步更超越雲木聳鶴巢風蘿掃虎穴人群徒自逺世役終難歇入山非買山采竹異采蕨誰見子牟意悁勞書魏闕同嚴逸人東溪泛舟子陵江海心高跡此閒放漁舟在溪水曽是敦夙尚朝霽收雲物垂綸獨清曠寒花古岸傍唳鶴晴砂上紛吾好真逸不逺來相訪巳接方外逰仍陪郢中唱歡言盡佳酌高興延秋望日暮浩歌還紅霞亂青嶂過沈氏山居雞鳴孤煙起靜者能卜築喬木出雲心間門掩山腹貧交喜相見把臂歡不足空宴言永日清耳目泉聲冷樽爼荷氣香童僕往往仙犬鳴樵人度深竹酒酣出谷口世網何羇束始願今不從區區折腰祿贈柏巖老人日與糜鹿群賢哉買山叟龐眉忽相見避世一何久林栖占崖曲舒事佳春後瓠葉覆荆扉栗苞垂甕牖獨歌還獨酌不耕亦不耦磽田隔雲溪多雨長稂莠煙霞得情性身世同芻狗寄謝營道人天真此翁有送薛判官起蜀橫吹聲轉悲羽觴酣欲别舉目叩關逺離心不可說邊陲勞帝念日下降才傑路極巴水長天銜劒峰缺單車動夙夜越境正炎節星橋過客稀火片蒸雲熱隂符能制勝千里在坐决始見儒者雄長纓繫餘孽詔許昌崔明府拜𥙷闕儒者久營道詔書方問賢至精一耀世高步誰同年何樹可棲鳯高梧枝拂天脫身鳬舄裏載筆虎圍前日月傳軒后衣冠真列仙則知驪龍珠不祕清泠泉才子貴難見郢歌空復傳惜哉效嚬客心想勞嬋姢仲春晚尋覆釜山蝴蝶弄和風飛花不知晚王孫尋芳草步步忘路逺况我愛青山涉趣皆逰踐縈回必中路隂晦陽復顯古岸生新泉霞峯映雪巘交枝花色異竒石雲根淺碧洞志忘歸紫芝行可搴方嗤嵇叔夜林卧方沉湎贈鄰東鄭少府一聞白雪唱願見清陽久誰為結綬來得陪趨府後小邑藍溪上卑棲愜所偶忘言復連墻片月亦携手草色同春徑鶯聲共高柳美景百花時平生一盞酒聖朝法天地以我為芻狗秩滿歸白雲期君訪谷口謝張法曹萬頃小山暇景見憶樂道隨去處飬和解朝簪茅堂近丹闕佳致一何深退食不趨府忘機還在林清風亂流上永日小山隂解籜雨中竹將雛花際禽物華對幽寂絃酌兼詠吟自昔仰高步及兹勞所欽郢歌叨繼組知已復知音罷章陵令山居過中峰道者二首寧辭園令秩不改淵明調解印無與言見山始一笑幽人還絶境誰道苦奔峭隨雲剩渡溪出門更垂釣吾廬青霞裏窗樹玄猿嘯微月清風來方知散髮妙丘壑趣如此暮年始棲偃賴遇無心雲不笑歸來晚鳴鳩拂紅枝初服傍清畎昨日山僧來猶嫌嘉遁淺託君紫陽家路滅心更逺睇雲創其居抱犢上絶巘杏田溪一曲霞徑峰幾轉跋石揖飛泉謝公應在眼願言携手去採藥長不返登覆釜山遇道人二首晨策趣無涯名山深轉秀三休變覆景萬轉迷宇宙攀崖到天窗入洞窮玉溜側徑蹲怪石飛蘿擲驚狖花間錬藥人雞犬和乳竇散髮便迎客采芝仍滿袖郭璞賦逰仙始願今可就真氣重嶂裏知君嘉遁幽山階壓丹穴藥井通洑流道者帶經出洞中擕我逰欲驂白霓去且為紫芝留勿憶武陵事别家疑數秋尋華山雲臺觀道士秋日西山明勝趣引孤策桃源數曲盡洞口兩岸拆還從罔象來忽得仙靈宅霓裳誰之子霞酌能止客殘陽在翠微携手更登歷林行拂煙雨溪望亂金碧飛鳥下天窗裊松際雲壁稍尋玄蹤逺宛入寥天寂願言葛仙翁終年錬玉液海上卧疾寄王臨離客窮海隂蕭辰歸思結一隨浮雲滯幾怨黃鵠别妙年即沉痾生事多所闕劒中負明義枕上惜玄髮之子良史才華簪偶時哲相思千里道愁望飛鳥絶歲暮冰雪寒淮湖不可越百年去心慮孤影守薄劣獨餘慕侣情金石無休歇登玉山諸峯偶至悟真寺郭南雲水佳訟簡野情發紫芝每相引黃綬不能諜稍入石門幽始知靈境絶冥搜未寸晷仙經俄九折蟠木蓋石梁崩崖露雲穴數峯拔崑嶠秀色與空徹玉氣交晴虹桂花留曙月半巖採珉者一點如片雪真賞無前程竒觀寧暫輟更聞東林磬可聽不可說興中尋覺花寂爾諸象滅長安客舍贈李行父明府藏器偶時少知人自古難遂令丹穴鳯晚食金琅玕誰謂兵戈際鳴琴方一彈理煩善用簡濟猛能兼寬夙夜念黎庶寢興非宴安洪波未靜壑何樹不驚鸞鳬舄傍亰輦氓心縣灌壇髙槐暗苦雨長劍生秋寒旅食還時客飢年亦盡歡親勞擕斗水往往救泥蟠但恐酬明義蹉跎芳歲䦨美楊侍御清文見示伯牙道喪來絃絶無人續誰知絶唱後更有難和曲層峰與清流逸勢競奔蹙清文不出戶仿像皆在目霧雪看滿懷蘭荃坐盈掬孤光碧潭月一片崑崙玉初見歌陽春韶光變枯木再見吟白雪便覺雲肅肅則知造化源方寸能展縮斯文不易遇清爽心豈足願言書諸紳可以為佩服山居新種花藥與道士同逰賦詩自樂魚鳥性寧求農牧資淺深愛巖壑疏鑿盡幽奇雨花相助好鶯鳴春草時種蘭入山翠引葛上花枝風露折紅紫緣溪復映池新泉香杜若片石隱江籬宛謂武陵洞濳應造化移杖策擕煙客滿䄂撥芳𬎼蝴蝶舞留我仙雞閒傍籬但令黃精熟不慮韶光遲笑指雲蘿徑樵人那得知初黃綬赴藍田縣作蟠木無匠伯終年棄山樊苦心非良知安得入君門忽忝英逹顧寧窺造化恩螢光起腐草雲翼騰沉鯤片石世何用良工心所存一叨尉京甸三省慙黎元賢尹止趨府僕夫儼歸軒眼中縣胥色耳裏蒼生言居人散山水即境真桃源鹿聚入田徑雞鳴隔嶺村餐和俗久清到邑政空論且嘉訟庭寂前階滿芳蓀歸義寺題震上人壁入谷逢雨花香緑引幽步招提繞泉石萬轉同一趣向背森碧峯淺深羅古樹堯皇未登極此地曽隱霧祕䜟得神謀因髙思虎路太陽忽臨照物象俄光煦梵王宫始開長者金先布白水入禪境碭山通覺路往往無心雲猶起潜龍處仍聞七祖後佛子繼調御溪馬投慧燈山蟬飽甘露不作解纓客寧知捨筏喻身世巳悟空歸途復何去送李四擢第歸覲省當年貴得意文事各爭名獨唱陽春曲唯君金玉聲懸黎寶中出高價世難掩鴻羽不低飛龍津徒自險直矜鸚鵡賦不貴芳桂枝少俊蔡雍許長鳴唐舉知梁城下熊軾朱㦸何暐耀才子欲歸寧棠花巳含笑門高知慶大子孝覺親榮獨攬還珠美寧唯問絹情離筵不盡醉慘𬒮一何早馬蹄西别輕樹色東看好行塵忽不見惆悵青門道卧病李員外題扉而去僻陋病者居蒿萊行徑失誰知簮􅌧貴能問幽憂疾珂聲未駐門蘭氣先入室沉痾不冠帶安得候蓬蓽清陽去莫尋離念頃來侵雀栖高窗靜日出修桐隂枕上憶君子悄悄唯苦心送李大夫赴廣州一賢間氣生麟趾鳯凰羽何意人之望未為王者輔出鎮忽推才盛哉文且武南越寄維城雄雄擁甲兵鼓門通幕府天井入軍營厥俗多豪侈古來難致禮唯君飮氷心可酌貪泉水忠臣感聖君徇義不邀勳龍鏡逃山魅霜嵐破嶂雲征途凡幾轉魏闕終在眼向郡海潮迎指鄉關樹逺按節化甌閩下車佳政新應令尉他俗還作上皇人支離交俊哲弱冠至華髮昔許霄漢期今嗟鵬鷃别圖南不可御惆悵守薄劣錢考功集卷第二
