front:
  text: 錢考功集卷第八
  hash: sha256:2347dd96884f72a9cb767356ce7180feac08f89b6556a5bc17d777da9f6ba602
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0037_SBCK_008-1a}
body:
  text: 七言律詩同程九早入中書漢家賢相重英竒蟠木何材也見知不意雲霄能自致空驚鵷鷺忽相隨臘雪𥘉明栢子殿春光欲上萬年枝獨慙皇鑒明如日未厭螢光向玉墀仲春宴王補闕城東山池王孫興至幽尋好芳草春深景氣和藥院愛隨流水入山齋喜與白雲過猶嫌巢鶴窺人逺不猒叢花對客多醉來倚玉無餘事目送歸鴻笑復歌夜宿靈臺寺寄郎士元西日橫山含碧空東方吐月滿禪宫朝瞻雙頂青冥上夜宿諸天色界中石潭倒洑蓮花水塔院空聞松栢風萬里故人能尚爾知君視聽我心同題郎士元半日吳村别業兼呈李長官半日吳村帶晚霞閑門高桞亂飛鵶橫雲嶺外千重樹流水聲中一兩家愁人昨夜相思苦閏月今年春意賖自歎梅生頭似雪却憐潘令縣如花猷川雪後送粲上人還京時因避世卧疾連歩青溪㡬萬重有時共立在孤峰齋到盂空食麥雪經傳金字坐雲松呻吟獨卧猷川水振錫先聞長樂鍾廻望群山携手處離心一一涕無從和李員外扈駕幸温泉宫未央月曉度踈鍾鳯輦時廵出九重雪霽山門迎端日雲𨳩水殿候飛龍䡖寒不入宫中樹佳氣常薫仗外峯遥羡枚皋扈僊蹕偏承霄漢渥恩濃長信怨長信螢來一葉秋蛾眉淚盡九重幽鳷鵲觀前明月度芙蓉闕下絳河流鴛衾久别難爲夢鳯管遥聞更起愁誰念昭陽夜歌舞君王玉輦正淹留送河南陸少府雲間陸生美且竒銀章朱綬映金羈自料抱才將致逺寍嗟趨府暫牽卑東城社日催巢燕上苑秋聲散御梨朝夕詔書還栢署行看飛隼集高枝送李評事赴潭州使幕湖南逺去有餘情蘋葉𥘉齊白芷生謾說簡書催物役遥知心賞緩王程興過山寺先雲到嘯引江㠶帶月行幕下由來貴無事佇聞談笑靜黎甿送李九貶南陽玉柱金罍醉不歡雲山驛道向東看鴻聲斷續暮天逺柳影蕭踈秋日寒霜降幽林霑蕙若弦驚翰苑失鴛鸞秋來廻首君門阻馬上應歌行路難送裴頔侍御使蜀柱史纔年四十強鬚髯玄髪美清陽朝天繡服乗恩貴出使星軺滿路光錦水繁華添麗藻峨眉明月引飛觴多才自有雲霄望計日應追鴛鷺行送韋信愛子歸覲維舟解䌫到斜暉春水東流北鴈飛才子學詩趨露冕棠花含笑待班衣稍聞江樹啼猿近轉覺山林過客稀借問還珠盈合浦何如鯉也入庭闈送興平王少府逰梁舊室相逢情更親攀懽甚少愴離頻黃綬罷來多逺客青山何處不愁人日斜宫樹聞蟬蛻雨過關城見月新梁國遺風重詞賦諸侯應念馬卿貧送張員外出牧岳州鳯凰銜詔與何人善政多才寵冦恂臺下鴛鸞爭送逺岳陽雲樹待行春自吟黄閣知音在不厭􅊮䄡出守頻應笑馮唐衰且拙世情相見白頭新送孫十尉温縣飛花落絮滿河橋千里傷心送客遥不惜芸香染黃綬惟憐鴻羽下青霄雲衢有志終驤首吏道無媒且折腰急管繁絃催一醉頽陽不駐引征鑣送鍾評事應宏詞下第東歸芳歲歸人嗟轉蓬含情回首㶚陵東蛾眉不入秦䑓鏡鷁羽還驚宋國風世事悠揚春夢裏年光寂寞旅愁中勸君稍盡離筵酒千里佳期難再逢送嚴維尉河南蕙葉青青花亂開少年趨府下蓬莱甘泉未厭楊雄賦吏道何榮賈誼才征陌獨悲飛蓋逺離筵只惜暝鍾催欲知别後相思處願植瓊枝向栢臺送馬員外拜官覲省二十爲師事漢文鵷雛驥子自爲群筆精已許臺中妙劒術還令世上聞歸覲屢驚槐里月出師常笑棘門軍莫言來徃朝天逺看取鳴鞘入斷雲送冷朝陽擢第後歸金陵莱子晝歸今始好潘園景色夏偏濃夕陽流水吟詩去明月青山出竹逢兄弟相歡初讓果鄕人争賀舊登龍佳期少别俄千里雲樹遥看歷㡬重九日宴浙江西亭詩人九日憐芳菊筵啓高齋宴浙江漁浦浪花搖素壁西興樹色入秋窓木奴向熟懸金實桑落新開㵼玉釭四子醉時争講習笑論黄覇舊爲邦和晴雪早朝紫微晴雪帶恩光繞仗偏隨鵷鷺行長信月留寧避曉冝春花滿不飛香獨看積素凝清禁巳覺䡖寒讓太陽題柱盛名兼絶唱風流誰繼漢田郎避暑納凉木槿花開畏日長時揺輕扇倚繩牀初晴草蔓縁新笋頻雨苔衣染舊墻十旬河朔應虚醉八柱天台好納凉無事始知偏靜勝深垂紗帳詠滄浪早朝鍾傳清禁纔應徹漏報仙闈儼已開雙闕薄煙籠菡蓞九成初日照蓬萊朝時但向丹墀拜仗下疑從碧落廻聖代逍遥更何事願將巴曲賛康哉題焦道士石壁三峯花畔碧堂縣錦里真人此得仙玉體纔飛西蜀雨霓裳欲向大羅天彩雲不散焼丹竈白鹿時藏種玉田幸入桃源因去世方期丹訣一延年題延州聖僧穴定力無涯不可稱未知何代坐禪僧黙黙山門宵閉月熒熒石室晝燃燈四時樹長書經葉萬歲嵓懸柱杖藤昔日捨身縁救鴿今時出見有飛鷹樂逰園晴望上中書李侍郎爽氣朝來萬里清慿高一望九愁輕不知鳯沼霖𥘉霽但覺堯天日轉明四野山河通逺色千家砧杵共秋聲遥想青雲丞相府何時開閣引書生幽居春暮書懷自哂鄙夫多野性貧居數畒半臨湍溪雲雜雨來茆屋山雀將雛到藥欄仙籙滿牀閑不厭隂符在篋老羞看更憐童子冝春服花裏尋師指杏壇謁許由廟故向箕山訪許由林泉物外自清幽松上掛瓢枝㡬變石間洗耳水空流緑苔唯見遮三徑青史空傳謝九州緬想古人増歎息䬃然雲樹滿巖秋過張成侍御宅丞相幕中題鳯人文章心事每相親從軍誰謂仲宣樂入室方知顔子貧杯裏紫茶香代酒琴中緑水靜留賔欲知别後相思意唯願瓊枝入夢頻酬考功楊員外見贈佳句上林諫獵知才薄尺組承恩愧命牽潢潦難滋滄海潤螢光空盡太陽前虚名濫接登龍士野性寜忘種黍田相國無私人守朴何辭老去上皇年寄永嘉王十二永嘉風景入新年才子詩成定可憐夢裏還鄕不相見天涯憶戴復誰傳花傾曉露垂如淚鶯拂逰絲斷若絃願得廻風吹海鴈飛書一宿到君邊七盤路阻冦聞李端公先到南楚日暮窮途淚滿襟雲天南望羡飛禽阮膓暗與孤魂斷江水遥連別恨深明月旣能通憶夢青山何用隔同心秦楚眼看成絶國相思一寄白頭吟酬趙給事相尋不遇留贈誰意顔生窮巷裏能勞馬跡破春苔忽看童子掃花處始愧夕郎題鳯來斜景適隨詩興盡好風纔送珮聲廻豈無鷄黍期他日惜此殘春阻緑杯山中酬楊補闕見過日暖風恬種藥時紅泉翠壁薜蘿垂幽溪鹿過苔還靜深樹雲來鳥不知青瑣同心多逸興春山載酒逺相隨却慙身外牽纓冕未勝杯前倒接䍦同王鋗起居程浩郎中韓翃舎人題安國寺用上人院慧眼沙門真逺公經行宴坐有儒風香縁不絶簮𥚑㑹禪想寜妨藻思通曙後爐煙生不㓕晴來階色並歸空狂夫入室無餘事唯與天花一笑同尋司勛李郎中不遇知已知音同舎郎如何咫尺阻清陽每恨蒹葭倚芳樹多慙新燕入華堂重花不隔陳蕃榻脩竹能深夫子墻唯有早朝趨鳯闕朝時憐羽接鴛行贈張南史紫泥何日到滄洲笑向東陽沈隱侯黛色晴峯雲外出縠文江水縣前流使臣自欲論公道才子非關猒薄逰溪畔秋蘭雖可佩知君不得少停舟暇日覽舊詩因以題詠逍遥心地得關關偶被功名涴我閑有壽亦將歸象外無詩兼不戀人間何窮黙識輕洪範未喪斯文勝大還筐篋靜開難似此蘂珠春色海中山漢武出獵漢家無事樂時邕羽獵年年出九重玉帛不朝金闕路旌旗長繞綵霞峯且貪原獸輕黃屋寜畏漁人犯白龍薄暮方歸長樂觀垂楊㡬處緑煙濃宴曹王宅賢王駟馬退朝𥘉小苑三春帶雨餘林沼葱蘢多貴氣樓臺隱映接天居仙鷄引敵穿紅藥宫燕銜泥落綺䟽自歎平生相識願何如今日厠應徐重贈趙給事乆飛鴛掖出時髦耻負平生稽古勞玉樹滿庭家轉貴雲衢獨歩位初高能迂騶馭尋蝸舎不惜瑤華報木桃應念濳郎守貧病常悲休沐對蓬蒿贈闕下裴舍人二月黄鶯飛上林春城紫禁曉隂隂長樂鍾聲花外盡龍池桞色雨中深陽和不散窮途恨霄漢常懸捧日心獻賦十年猶未遇羞將短髪對華簪登劉賔客高齋能以功成踈寵位不將心賞負雲霞林間客散孫弘閣城上山宜綺季家蝴蝶晴連池岸草黄鸝晚出桞園花日陪鯉也趨文苑誰道門生隔絳紗哭􅉝霽流水辭山花别枝隨風一去絶還期昨夜故人泉下宿今朝白髪鏡中垂音徽寂寂空成夢容範朝朝無見時旦暮餘生㡬息在不應存殁未嘗悲和慕容法曹尋漁者寄城中故人孤煙一點緑溪湄漁父幽居即舊基飢鷺不驚收釣處閑麛應乳負暄時茅齋對雪開罇好稚子焚枯飯客遲勝事宛然懷抱裏頃來新得謝公詩錢考功集卷第八
