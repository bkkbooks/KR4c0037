front:
  text: 錢考功集卷第六
  hash: sha256:196cb272a76d9afe0479a223ca84f0a345bd2443f48971066c990d101d51a37a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0037_SBCK_006-1a}
body:
  text: 五言排律送集賢崔八叔承恩括圖書雨露滿儒服天心知子虚還勞五經笥更訪百家書贈别傾文􅁐光華比使車曉雲隨客散寒􅀣出􅀜踈相見應朝夕歸期在玉除送張五員外東歸楚州纓珮不爲美人群寧免辭杳然黃鵠去未􅀒白雲期此别清興盡髙秋臨水時好山枉帆僻浪跡到家遲他日詔書下梁鴻安可追閑居􅀉包何去名即棲遁何必歸滄浪種藥幽不淺杜門喧自􅁯林眠多曉夢鴉散驚􅀄陽片雪幽雲至廻風隣果香佳期碧天末惆悵紫蘭房津梁寺尋李侍御禪林絶過客柱史正焚香馴鴿不猜隼慈雲能護霜騘聲隔暗竹吏事散空廊霄漢期鴛鷺狐狸避憲章遶堦春色至屈草待君芳山園秋晚􅀉杜黃裳少府惆悵佳期阻林園秋景閑終朝碧雲外唯見暮禽還泉石思携手煙霞不閉􅀜杖䔧仍把菊對卷也看山望望離心起非君誰解顔東谿社野人致酒萬重雲樹下數畒子平居野院羅泉石荆扉背里閭早冬耕鑿暇弋鴈復烹魚靜掃寒花徑唯邀傲吏車晚來􅅏客好小雪下山初憶山中􅀉舊友數歳白雲裏與君同採􅅔􅀣深煙不散溪靜鷺忘飛更憶東巖趣殘陽破翠微脫巾花下醉洗藥月前歸風景今還好如何此興違東皋早春􅀉郎四校書禄微頼學稼歳起歸衡茆窮逹戀明主耕桑亦近郊夜來霽山雪陽氣動林梢萌蕙暖初吐春鳩鳴欲巢蓬萊時入夢知子憶貧交玉山東溪題李叟屋壁霞景巳斜照煙溪方􅊕投山家歸路僻轍跡亂泉流野老采􅅔暇蝸廬招客幽麏麚突荒院鸕鵲歩閒疇偶此愜真性令人輕宦逰温泉宫禮見新豐佳氣滿聖主在温泉雲暖龍行處山明日馭前順風求至道側席問遺賢靈雪瑤墀降晨霞綵懸滄溟不讓水庇賤也朝天逰襄陽泉石晚歸逰目隨山勝廻橈愛浦長徃來幽不淺昏旦興難忘木末看歸翼蓮西失夕陽人聲指閭井野􅃐惜林塘稍近垂楊路菱舟擁岸香夏日陪史郎中宴杜郎中果園何事重逢迎春醪晚更清林端花自老池上月初明路入仙郎次烏連柱史名竹隂踈柰苑山翠傍蕪城引滿不辭醉風來待曙更南溪春耕荷簑趨南逕戴勝鳴條枚溪雨有餘潤土膏寜厭開溝塍落花盡耒耜度雲廻誰道耦耕倦仍兼勝賞催日長農有暇悔不帶經來省試湘靈鼓瑟善鼓雲和瑟常聞帝子靈馮夷空自舞楚客不堪􅃪苦調淒金石清音入杳􅄀蒼梧來怨慕白芷動芳馨流水傳瀟浦悲風過洞庭曲終人不見江上數峰青觀法駕自鳯翔廻􅍴槍一掃㓕閶闔九重開海晏鯨鯢盡天旋日月來聖情蘇品物龍馭闢雲雷暗漏移僊仗朝陽出帝臺周慙散馬出禹讓濬川廻欲識封人願南山舉酒杯題玉山村叟壁谷口好泉石居人能陸沉牛羊下山小煙火隔雲深一徑入溪色數家連竹隂藏虹辭晚雨驚隼落殘禽渉趣皆流目將歸羡在林􅁍思黄綬事􅇳負紫芝心縣中池竹言懷官小志巳足時清免􅀒薪卑棲且得地榮耀不􅀜身自愛賞心處叢篁流水濵荷香度髙枕山色滿南隣道在即爲樂機忘寧厭貧却愁丹鳯詔來訪􅃮園人山園栖隱守靜信推分灌園樂在兹且忘堯舜力寧顧尚書期晚景采蘭暇空林散帙時卷荷藏露滳黃口觸􅆉絲三徑與囂逺一瓢常自怡情人半雲外風月詎相思送王諌議任東都居守車徒鳯掖東去去洛陽宫蹔以青蒲隔還看􅂵禁同經過乗雨露瀟灑出鴛鴻官署名臺下雲山舊􅁐中暮天􅀟闕靜秋月九重空且喜成周地詩人播國風送鄭書記决勝無遺策辭天似請纓出身唯徇死報國且能兵受命麟麒殿參謀驃􅀐營短簫催别酒斜日駐前旌義勇千夫敵風沙萬里行㡬年丹闕下侯印錫書生送族姪赴任林下不成興仲容微禄牽客程千里逺別念一㠶懸欲歎卑棲去其如勝趣偏雲山深郡郭花木凈潮田坐嘯帷應下離居月復圓此時知小阮相憶緑罇前長安落第作始願今如此前途復若何無媒獻詞賦生事日蹉跎不遇張華識空悲寗戚歌故山歸夢逺新歳客愁多刷羽思喬木豋龍恨失波散才非世用廻首謝雲蘿酬長孫繹藍溪􅀉杏愛君藍水上種杏近成田拂逕清隂合臨流彩實懸清香和􅀫雨佳色出晴煙懿此傾筐贈相知懷橘年芳馨來滿袖瓊􅅼願酬篇把玩情何極雲林若眼前藥堂秋暮隱來未得道􅀊去愧雲松茅屋空山暮荷衣白露濃唯憐石苔色不染世人蹤潭靜宜􅀌鶴山深絶逺鍾有時丹竈上數􅀧綵霞重勉事壷公術仙期待赤龍􅂘常徴君萬化一朝盡窮泉悲此君如何丹竈術能誤紫芝焚不遂蒼生望空􅅏封禪文逺年隨逝水真氣盡浮雲山閉龍虵蟄林寒麋鹿群傷心載酒地仙菊爲誰薫送鮑中丞赴太原軍營年壯才仍美時來道易行寵兼三獨任威肅貳師營將略過南仲天心􅀉北亰雲旂臨塞色龍笛出􅀜聲漢月随霜去􅁁塵計日清漸知王事好文武用書生奉送劉相公江淮催轉運國用資戎事臣勞爲主憂將徴任土貢更發濟川舟擁傳星還去過池鳯不􅅏唯高飲水節稍淺別家愁落葉淮邊雨􅀌山海上秋遥知謝公興微月在江樓送李秀才落第逰荆楚羽翠雖成夢遷鶯尚後群名逃郄詵策興發謝玄文昬旦扁舟去江山㡬路分江潮吞海日歸鴈出湖雲詩思應須苦猨聲莫厭聞離居見新月那得不思君奉陪郭常侍宴滻川山池掖垣擕愛客勝地賞年光向竹過賓館尋山到妓堂歌聲掩金谷舞態出平陽地滿􅆪􅅂影花添蘭麝香鶯啼春未老酒冷日猶長安石風流事須歸問省郎冦中送張司馬歸洛戎狄冦周日衣冠適洛年客亭新驛騎􅀜路舊人煙吾道將東矣秋風更䬃然雲愁百戰地􅀣隔兩鄕天旅思蓬飄陌驚魂鴈怯弦今朝一尊酒莫惜醉離筵奉和宣城張太守南亭秋夕懷友池館蟪蛄聲梧桐秋露晴月臨朱㦸靜河近畫樓明捲幔浮凉入聞鍾永夜清片雲懸曙斗數鴈過秋城羽扇􅀭風暇瑤琴悵别情江山飛麗藻謝眺讓前名過山人所居因􅀉諸遺補空谷春雲滿愚公晦跡深一隨玄豹隱㡬換緑蘿隂絶徑人稀到芳蓀我獨尋厨煙住峭壁酒氣出重林蝴蝶晴還舞黃鸝晚暫吟所思青􅃈客瑤草􅀉幽心過鳴皋隱者磻石老紅蘚徴君卧㡬年飛泉出林下一徑過崖巓鷄犬逐人靜雲霞宜地偏終朝數峰勝不逺一壷前仲月霽春雨香風生藥田丹溪不可别瓊草色芊芊送楊錥歸隱悔作掃門事還吟招隱詩今年芳草色不失故山期遥想白雲裏采苓春日遲溪花藏石徑巖翠帶茆茨九轉莫飛去三廻良在茲還嗤茂陵客貧病老明時酬劉起居卧病見寄承顔看彩服不覺别丹墀味道能忘病過庭更學詩繚垣多畫㦸逺岫入書帷竹靜携琴處林香讓果時聲同叨眷早交淡在年衰更枉兼金贈難爲繼組詞陪南省諸公宴殿中李監宅將門高勝霍相子寵過韋宦貴攀龍後心傾待士時壷觴開雅宴鴛鷺眷相隨舞退燕􅁎曲歌徴謝眺詩晚鍾過竹靜醉客出花遲莫惜留餘興良辰不可追山齋讀書􅀉時校書杜叟日愛蘅茆下閑觀山海圖幽人自守朴窮谷也名愚隔嶺和溪雨新泉到戸樞叢蘭齊稚子蟠木老濳夫憶戴差過剡逰仙慣入壼濠梁時一訪莊叟亦吾徒晚歸藍田舊居雲捲東皋下歸來省故蹊泉移憐石在林長覺原低􅃇里情難盡前山賞未迷引藤看古木嘗酒呪春鷄興與時髦背年將野老齊才微夕陽退應得遂霞棲太子李舎人城東别業與二三文友逃暑下馬失炎暑重門深緑篁宫臣禮嘉客林表開蘭堂茲夕興難盡澄罍照墨塲東陵晚來好目極趣何長鳥道掛踈雨人家殘夕陽城隅擁歸􅀐􅅏醉戀瓊芳寄􅀽州李嘉祐員外誰謂江山阻心親夢想偏容輝常在目離别任經年郡國通流水雲霞共逺天行春鸎㡬囀遲客月頻圓鴈有還鄕羽人無訪戴船願徴黄覇入相見玉堦前禁闈翫雪􅀉薛左丞玄雲低禁􅁐飛雪滿神州虚白生䑓榭寒光入冕旒粉凝宫壁浄乳結洞門幽細遶廻風轉輕隨落羽浮怒濤堆砌石新月孕簾鈎爲報詩人道豐年頌聖猷春暮過石􅀛谷題温處士林園隱几無名老何年此陸沉丘園自得性婚嫁不嬰心􅀊計因山薄霞棲在谷深設􅆯連草色曬藥背松隂觸興雲生岫隨耕鳥下林搘頥􅀏來客頭上有朝簮􅀫畢侍御宅交情頻更好子有古人風晤語清霜裏平生苦節同心惟二仲合室乃一瓢空落葉􅀉秋菊愁雲低夜鴻薄寒燈影外殘漏雨聲中明發南昌去廻看御史騘中書遇雨濟旱惟宸慮爲霖即上台雲銜七曜起雨拂九門來綸閣飛絲度龍渠激霤廻色翻池上藻香裛􅂦前杯湘燕皆舒翼沙鱗豈曝腮尺波應萬假虞海載沿洄適楚次徐城去家隨旅鴈㡬日到南荆行邁改郷邑苦辛淹晦明畏途在滛雨未暮息趨程窮木對秋館寒鵶愁古城迷津坐爲客對酒黙含情感激念知巳匣中孤劍鳴經李􅀩頴陽舊居同心而早世天道亦何論獨有山陽宅平生永不諼青溪引白鳥流涕弔芳蓀蔓草入空室叢篁深毀垣舊逰還在眼神理更忘言唯見東山月人亡不去門贈漢陽隱者當年不出世知子飡霞人樂道復安土遺榮長隱身衡茅古林曲秔稻清江濵桂棹爲漁暇荷衣禦暑新欵顔在行役幽興惜今晨分首天涯去再來芳杜春巨魚縱大壑巨魚縱大壑遂性似乗時奮躍風生鬛騰凌浪鼓鰭龍攄回地軸鯤化想天池方映吞舟意光殊在藻嬉傾危嗟暮燕隱晦誚泥􅀛喻士逢明主才猷得所施錢考功集卷第六
