body:
  text: 錢仲文集巻八唐錢起撰五言六韻近體十一首七韻六首八韻十五首九韻一首十韻二首十二韻三首送李九歸河北文武資人望謀猷簡聖情南州初卧皷東土復維城寄重分符去威仍出閫行斗牛移八座日月送雙旌别戀瞻天起仁風應物生佇聞収組練鏘玉㑹承明送丁著作佐台郡多年金馬客名遂動歸輪佐郡紫書下過門朱綬新揚舲望海嶽入境背風塵水驛偏乘月梅園别受春帶徑臨府吏鱠鯉待鄉人始見美高士逍遥在搢紳送王使君赴太原行營太白明無象皇威未戢戈諸侯持節鉞千里控山河漢驛雙旌度胡沙七騎過驚烽連鴈起牧馬入雲多不賣盧龍塞能消瀚海波湏傳出師頌一作表莫奏式微歌送王使君移鎮淮南共許徐方牧能臨河内人郡移棠轉茂車至鹿還馴吏事嘉師旅鴛行惜搢紳别心傾祖席愁望盡征輪紫誥徴黄晚蒼生借㓂頻願言青鎻拜早及上林春李四勸為尉氏尉李七勉為開封尉惟伯與仲有令譽因美之美政惟兄弟時人數俊賢皇枝雙玉樹吏道二梅仙自理堯唐俗唯將禮讓傳采蘭花蕚聚就日鴈行聫黄綬俄三載青雲未九遷廟堂為宰制幾日試龍泉春夜宴任六昆季宅際晚緑烟起入門芳樹深不才叨下客喜宴齒諸簮夜月仍携妓清風更在林彩毫揮露色銀燭動花隂自接通家好應知待士心向隅逢故識兹夕願披襟閑居酬張起居見贈在林非避世守拙自離羣弱羽謝風水窮愁依典墳良知不遐棄新詠獨相聞能使幽興苦坐忘清景曛前山帶喬木暮鳥聫歸雲向夕野人思難忘騎省文奉和王相公秋日戲贈元校書才妙心仍逺名踈跡可追清秋聞禮暇新雨到山時勝事唯愁盡幽㝷不厭遲㺯雲憐鶴去隔水許僧期賢相敦高躅雕龍憶所思芙蓉洗清露願比謝公詩過楊駙馬亭子衣冠在漢庭臺榭接天成彩鳯翻簫曲祥鱣入舘名歌鍾芳月曙林嶂碧雲生亂水歸潭浄高花映竹明退朝追宴樂開閤一作沉轄醉簪纓長袖留嘉客栖烏下禁城山下别杜少府把手意難盡前山日漸低情人那忍别宿鳥尚同棲寸晷戀言笑佳期欲阻睽離雲愁出岫去水咽分溪莊叟幾虚説楊朱空自迷傷心獨歸路秋草更萋萋晚出青門望終南别業能清謝朓思暫下承明廬逺山新水下寒臯微雨餘更憐歸鳥去宛到卧龍居笑指叢林上閑雲自巻舒寧心鳴鳯日却意釣璜初處貴有餘興伊周位不如送嚴士良侍奉詹事南遊䟽傅獨知止曾參善愛親江山侍行邁長㓜出囂塵握手想千古此心能幾人風光滿長陌草色傍征輪日夕望荆楚鸎鳴芳杜新漁煙月下淺花嶼水中春㸃翰遥相憶含情向白蘋題秘書王迪城北池亭子喬來魏闕明主賜衣簪從宦辭人事同塵即道心還追大隠跡寄此鳯城隂昨夜新煙雨池臺清且深伏泉通粉壁迸笋出花林晚沐常多暇春一作香醪時獨斟西南漢宫月復對緑窻琹一作吟過王舍人宅入門花栁暗知是近臣居大隠心何逺高風物自踈翛然静者事宛得上皇餘鷄犬偷仙藥兒童授道書清吟送客後微月上城初彩筆有新詠文星垂太虚承恩金殿宿應薦馬相如過瑞龍觀道士不知誰氏子鍊魄家洞天鶴待成丹日人㝷種杏田靈山含道氣物性皆自然白鹿顧瑞草驪龍蟠玉泉得兹象外􅃐便割區中縁石竇采雲母霞堂陪列仙主人善止客柯爛忘歸年送沈沖天檏非外假至人常宴如心期邈霄漢詞律響瓊琚舉酒常歎惜無人達子虚夜光失隋掌驥騄伏鹽車考室晉山下歸田秦嵗初寒雲隨路合落照下城餘千里還同術無勞怨索居和韋侍御寓直對雨名貫四科首班宜二妙齊如何厭白簡未得步金閨寓直晦秋雨吟餘聞逺鷄漏聲過旦冷雲色向窻低誰謂霄漢近翻嗟心事暌蘭滋人未握霜曉鶚還棲佇見田郎字親勞御筆題奉和聖制登朝元閣六合紆𤣥覽重軒啓上清石林飛棟出霞頂泰堦平拂曙鑾輿上晞陽瑞雪晴翠微囬日馭丹巘駐天行御氣升銀漢垂衣俯錦城山通玉苑逈河抱紫闗明感物乾文動凝神道化成周王陟喬岳列辟讓英聲奉和杜相公移長興宅奉呈元相公守貴常思儉平津此意深能卑丞相宅何謝故人心種蕙初抽帶移篁不改隂院梅朝助鼎池鳯夕歸林覺路經中得滄洲夢裏㝷道高仍濟代恩重豈投簪報國誰知已推賢共作霖興來文雅振清韻擲雙金送任先生任唐山丞再命果良願幾年勤説詩上公頻握髪才子共垂帷琢玉成良器出門偏愴離腰章佐墨綬耀錦到茅茨樹老見家日潮平歸縣時衣催蓮女織頌聴海人詞鴻鵠志應在荃蘭香未衰金門定囬首雲路有佳期送外甥懐素上人歸鄉侍奉釋子吾家寶神清慧有餘能翻梵王字妙盡伯英書逺鶴無前侣孤雲寄太虚往來輕世界醉裏得真如飛錫離鄉乆寧親喜臘初故池殘雪滿寒栁霽煙踈壽酒還嘗藥晨餐不薦魚遥知禪誦外健筆賦閑居送張中丞赴桂州出守求人瘼推賢動聖情紫臺初下詔皂盖始専城寵借飛霜簡威加却月營雲衢降五馬林水引雙旌夙仰敦詩禮嘗聞偃甲兵戍樓雲外静訟閣竹間清化佇還珠美心將片玉貞㓂恂朝望重計日謁承明送王相公赴范陽翊聖衘恩重頻年按節行安危皆報國文武不縁名受脤仍調鼎為霖更洗兵幕開丞相閣旗總貳師營料敵知無戰安邊自一作示有征代雲横馬首燕鴈拂笳聲去鎮闗河静歸看日月明欲知瞻戀一作望切遲暮一書生送蔣尚書居守東都鳯輦幸秦乆周人徯帝情若非君敏徳誰鎮洛陽城前席命才彦舉朝推令名綸言動北斗職事守東京鄭履下天去蘧輪滿路聲出闗秋樹直對闕逺山明肅肅保釐處水流宫苑清長安日西笑朝夕衮衣迎送李兵曹赴河中能荷鐘鼎業不矜紈綺榮侯門三事後儒服一書生昔志學文史立身為士英驪珠難隠曜臯鶴㑹長鳴休命且隨牒候時常振纓寒蟬思闗栁匹馬向蒲城秋日黯將暮黄河如欲清黎人思坐嘯知子樹佳聲罷官後酬元校書見贈心期悵已阻交道復何如自我辭丹闕惟君到故廬忘機貧負米憶戴出無車一本作未忘金馬詔猶負茂陵書隣犬吠初服家人愁斗儲秋堂入閑夜雲月思離居窮巷聞砧冷荒枝應鵲踈宦名隨落葉生事感枯魚流水仍揮手知音未棄余同鄔戴闗中旅寓文士皆求遇今人誰至公靈臺一寄宿楊栁再春風更惜忘形友頻年失志同羽毛一作衣齊燕雀心事阻鴛鴻留滯羡歸養飛鳴恨觸籠橘懐鄉夢裏書去客愁中殘雪迷歸鴈韶光棄㫁蓬呑悲問唐舉何路出屯䝉新豐主人明代少知已夜光頻暗投迍邅終薄命動息盡窮愁自欲歸飛鷁當為不繫舟雙垂素絲淚幾弊皂貂裘暮鳥栖幽樹孤雲出舊丘蛩悲衣褐夕雨暗轉蓬秋客裏馮諼劍歌中寗戚牛主人能縱酒一醉且忘憂夕遊覆釡山道士觀因登𤣥元廟冥捜過物表洞府次溪傍已入瀛洲逺誰言仙路長孤煙出深竹道侣正焚香鳴磬愛山静步虚宜夜凉仍同象帝廟更上紫霞岡霽月懸琪樹明星映碧堂傾思丹竈術願采玉芝芳倘把浮丘袂乘雲别舊鄉陪郭常侍令公東亭宴集盛業山河列重名劍履榮珥貂為相子開閣引時英美景池臺色佳期宴賞情詞人載筆至仙妓出花迎暗竹朱輪轉迴塘玉珮鳴舞衫招戯蝶歌扇隔啼鶯飲徳心皆醉披雲興轉清不愁懽樂盡積慶在和羮栢崖老人號無名先生男削髪女黄冠自以雲泉獨樂命予賦詩古也憂婚嫁君能樂性腸一作道塲長男棲月宇少女炫霓裳問爾飡霞處春山芝桂旁鶴前飛九轉壺裏駐三光與我開龍嶠披雲静藥堂胡麻兼藻緑石髓隔花香帝力言何有椿年喜漸長窅然高象外寧不傲羲皇贈李十六半面喜投分數年欽盛名常思夢顔色誰憶訪柴荆忽聴欵扉嚮欣然倒屣迎蓬蒿駐騶馭鷄犬傍簪纓酌水即嘉宴新知甚故情僕夫視日色棲鳥催車聲自爾宴言後至今門舘清何當更乘興林下已苔生裴僕射東亭鳯扆任匡濟雲溪難退還致君超列辟得道在榮班朱㦸繚垣下高齋芳樹間隔花開逺水廢巷愛晴山晚沐值清興知音同解顔藉蘭開賜酒留客下重闗仙犬逐人净朝車映竹閑則知真隠逸未必謝區寰軒后三朝顧赤松何足攀中書王舍人輞川舊居幾年家絶壑滿逕種芳蘭帶石買松貴通溪漲水寛誦經連谷嚮吹律减雲寒誰謂桃源裏天書問考槃一從解蕙帶三入偶蟬冠今夕復何夕歸休㝷舊歡片雲隔蒼翠春雨半林湍藤長穿松盖花繁壓藥欄景深青眼下興絶采毫端笑向同來客登龍此地難送襄陽盧判官奏開河事千里趨魏闕一言簡聖聰河流引闗外國用贍秦中有詔許其策隨山興此功連雲積石阻計日安波通飛棹轉年榖利人勝嵗豐言歸漢陽路拜首蓬萊宫紫殿賜衣出青門酣酌同晚陽過微雨秋水見新鴻坐惜去車逺愁看離舘空因思郢川守南楚滿清風奉送户部李郎中充晉國副節度出塞徳佐調梅用忠輸擊虜年子房推廟略漢主記兵權受命榮中禁分麾鎮左賢風生黒山道星下紫微天始願文經國俄看武定邊鬼方堯日逺幕府代雲連汗馬將行矣盧龍已肅然闗防驅使節花月眷離筵自忝知音遇而今感義偏泪聞横吹落心逐去旌懸帝念夔能政時湏説濟川勞還應即爾朝暮玉墀前奉和中書常舍人晚秋集賢院即事寄徐薛二侍御文星垂太虚辭伯綜羣書彩筆下鴛掖褒衣來石渠典墳探奥㫖造化覩權輿述聖魯宣父通經漢仲舒窓明冝縹帶地肅近丹除清晝刪詩暇高秋作賦初露盤侵漢聳宫栁度鵶踈静對連雲閣晴聞過闕車舊僚云出矣晚嵗復何如海嶠瞻歸路江城夢直廬含毫思兩鳯望逺寄雙魚定笑巴歌拙還叅麗曲餘和范郎中宿直中書曉翫清池贈南省同僚兩垣遺補青𤨏留才子春池静禁林自矜仙島勝宛在掖垣深引𣲖彤庭裏含虚玉砌隂漲來知聖澤清處見天心蘭氣飄紅岸文星動碧潯鳯棲長近日虬卧欲為霖席寵雖高位流謙乃素襟焚香春一作殘漏盡假寐曉鶯吟丹地宜清沘一作切朝陽復照臨司言兼逸趣鼓興接一作属知音六義驚一作先摛藻三臺嚮擲金為憐風水外落羽此漂沉一作鱗羽失飛沉錢仲文集巻八
