body:
  text: 錢仲文集巻九唐錢起撰七言四韻近體四十五首同程九早入中書漢家賢相重英竒蟠木何材也見知不意雲霄能自致空驚鵷鷺忽相隨臘雪初明栢子殿春光欲上萬年枝獨慚皇鑒明如日未厭螢光向玉墀仲春宴王補闕城東小池王孫興至幽㝷好芳草春深景氣和藥院愛隨流水入山齋喜與白雲過猶嫌巢鶴窺人逺不厭叢花對客多醉來倚玉無餘事目送歸鴻笑復歌夜宿靈臺寺寄郎士元西日横山含碧空東方吐月滿禪宫朝瞻雙頂青冥上夜宿諸天色界中石潭倒獻蓮花水塔院空聞松栢風萬里故人能尚爾知君視聴我心同題郎士元半日吳村别業兼呈李長官半日吳村帶晚霞閑門髙栁亂飛鵶横雲嶺外千重樹流水聲中一兩家愁人昨夜相思苦閏月今年春意賖自嘆梅生頭似雪却怜潘令縣如花猷川雪後送僧粲臨還京時避世卧疾連步青溪幾萬重有時共立在孤峰齋到盂空飡麥雪經傳金字坐雲松呻吟獨卧猷川水振錫先聞長樂鐘囬望羣山携手處離心一一涕無從和李員外扈駕幸温泉宫未央月曉度踈鐘鳯輦時巡出九重雪霽山門迎瑞日雲開水殿候飛龍輕寒不入宫中樹佳氣常薫仗外峰遥羡枚臯扈仙蹕偏承霄漢渥恩濃長信怨長信螢來一葉秋蛾眉淚盡九重幽鳷鵲觀前明月度芙蓉闕下綘河流鴛衾乆别難為夢鳯管遥聞更起愁誰分朝陽夜歌舞君王玉輦正淹留送河南陸少府雲間陸生美且竒銀章朱綬映金覊自料抱材將致逺寧嗟趨府暫牽卑東城社日催巢燕上苑秋聲散御梨朝夕詔書還栢署行看飛隼集高枝送李評事赴潭州使幕湖南逺去有餘情蘋葉初齊白芷生謾説簡書催物役遥知心賞緩王程興過山寺先雲到嘯引江帆帶月行幕下由來貴無事佇聞談笑靜黎甿送李九貶南陽玉柱金罍醉不歡雲山驛道向東看鴻聲斷續暮天逺栁影蕭踈秋日寒霜降幽林霑蕙若弦驚翰苑失鴛鸞秋來囬首君門阻馬上應歌行路難送裴頔侍御使蜀柱史纔年四十强鬚髯𤣥髪美清揚朝天繡服承恩貴出使星軺滿路光錦水繁華添麗藻峨眉明月引飛觴多才自有雲霄望計日應追鴛鷺行送韋信愛子歸覲離舟解䌫到斜暉春水東流燕北飛才子學詩趨露冕棠花含笑待斑衣稍聞江樹啼猿近轉覺山林過客稀借問還珠盈合浦何如鯉也入庭闈送興平王少府遊梁舊識相逢情更親攀歡甚少愴離頻黄綬罷來多逺客青山何處不愁人日斜官樹聞蟬蜕雨過闗城見月新梁國遺風重詞賦諸侯應念馬卿貧送張員外出牧岳州鳯凰啣詔與何人善政多才寵㓂恂臺下鴛鸞爭送逺岳陽雲樹待行春自怜黄閣知音在不厭彤幨出守頻應笑馮唐衰且拙世情相見白頭新送孫十尉温縣飛花落絮滿河橋千里傷心送客遥不惜芸香染黄綬惟怜鴻羽下青霄雲衢有志終驤首吏道無媒且折腰急管繁絃催一醉頺陽不駐引征鑣送鍾評事應宏詞下第東歸芳嵗歸人嗟轉蓬含情囬首㶚陵東蛾眉不入秦臺鏡鷁羽還驚宋國風世事悠揚春夢裏年光寂寞旅愁中勸君稍盡離筵酒千里佳期難再同送嚴維尉河南蕙葉青青花亂開少年趨府下蓬萊甘泉未厭揚雄賦吏道何勞賈誼才征陌獨愁飛葢逺離筵只惜暝鐘催欲知别後相思處願植瓊枝向栢臺送馬員外拜官覲省二十為郎事漢文鴛鶵驥子自為羣筆精已許臺中妙劍術還令世上聞歸覲屢經槐里月出師常笑棘門軍莫言來往朝天逺看取鳴鞘入斷雲送冷朝陽擢第後歸金陵覲省萊子晝歸今始好潘園景色夏偏濃夕陽流水吟詩去明月青山出竹逢兄弟相歡初讓果鄉人爭賀舊登龍佳期少别俄千里雲樹愁看過幾重九日宴浙江西亭詩人九日憐芳菊筵客髙齋宴浙江漁浦浪花揺素壁西陵樹色入秋窻木奴向熱懸金實桑落新開㵼玉缸四子醉時争講習笑論黄覇舊為邦和王員外晴雪早朝紫微晴雪帶恩光繞仗偏隨鴛鷺行長信月留寧避曉冝春花滿不飛香獨看積素凝清禁已覺輕寒讓太陽題柱盛名兼絶唱風流誰繼漢田郎避暑納凉木槿花開畏日長時揺輕扇倚繩床初晴草蔓縁新笱頻雨苔衣染舊墻十旬河朔應虛醉八柱天台好納凉無事始然知静勝深垂紗帳詠滄浪早夏楚狂身世恨情多似病如憂正是魔花蕚敗春多寂寞葉隂迎夏已清和鸝黄好鳥揺深一作紅樹細白佳人著紫羅軍旅閲詩裁不得可怜風景遣如何題嵩陽焦道士石壁三峰花畔碧堂懸錦里真人此得仙玉體纔飛西蜀雨霓裳欲向大羅天彩雲不散燒丹竈白鹿時藏種玉田幸入桃源因去世方期丹訣一延年題延州聖僧穴定力無涯不可稱未知何代坐禪僧黙黙山門霄閉月熒熒石壁晝燃燈四時樹長書經葉萬嵗嵓懸拄杖藤昔日捨身縁救鴿今時出見有飛鷹樂遊原晴望上中書李侍郎爽氣朝來萬里清憑高一望九愁輕不知鳯沼霖初霽但覺堯天日轉明四野山河通逺色千家砧杵共秋聲遥想青雲丞相府何時開閤引書生幽居春暮書懐自哂鄙夫多野性貧居數畆半臨湍谿雲雜雨來茅屋山雀將雛到藥欄仙籙滿床閑不厭隂符在篋老羞看更憐童子冝春服花裏㝷師指杏壇謁許由廟故向箕山訪許由林泉物外自清幽松上掛瓢枝幾變石間洗耳水空流緑苔唯見遮三徑青史空傳謝九州緬想古人增嘆惜䬃然雲樹滿巖秋過張成侍御宅丞相幕中題鳯人文章心事每相親從軍誰謂仲宣樂入室方知顔子貧盃裏紫茶香代酒琴中緑水静留賔欲知别後相思意唯願瓊枝入夢頻酬考功楊員外見贈佳句黄巻讀來今已老白頭受屈不曽言上林諫獵知才薄尺組承恩愧命牽潢潦難滋滄海潤螢光空盡太陽前虚名濫接登龍士野性寧忘種黍田相國無私人守朴何辭老去上皇年寄永嘉王十二永嘉風景入新年才子詩成定可憐夢􅂻還鄉不相見天涯憶戴復誰傳花傾曉露垂如淚鶯拂遊絲斷若絃願得囬風吹海鴈飛書一宿到君邊七盤嶺阻㓂聞李端公先到南楚日暮窮途淚滿襟雲天南望羡飛禽阮腸暗與孤鴻㫁江水遥連别恨深明月既能通憶夢青山何用隔同心秦楚眼看成絶國相思一寄白頭吟酬趙給事相㝷不遇留贈誰憶顔生窮巷裏能勞馬跡破春苔忽看童子掃花處始愧夕郎題鳯來斜景適隨詩興盡好風纔送珮聲囬豈無雞黍期他日惜此殘春阻緑盃山中酬楊補闕見過日煖風恬種藥時紅泉翠壁薜蘿垂幽溪鹿過苔還静深樹雲來鳥不知青瑣同心多逸興春山載酒逺相隨却慚身外牽纓冕未勝杯前倒接䍦同王錥起居程浩郎中韓翃舍人題安國寺用上人院慧眼沙門真逺公經行宴坐有儒風香縁不絶簪裾㑹禪想寧妨藻思通曙後爐烟生不滅晴來堦色並歸空狂夫入室無餘事唯與天花一笑同尋司勲李郎中不遇知已知音同舍郎如何咫尺阻清揚每恨蒹葭傍芳樹多慚新燕入華堂重花不隔陳蕃榻脩竹能深夫子墻唯有早朝趨鳯閣朝時怜羽接鴛行贈張南史紫泥何日到滄洲笑向東陽沈隠侯黛色晴峰雲外出縠文江水縣前流使臣自欲論公道才子非闗厭薄遊溪畔秋蘭雖可佩知君不得少停舟縠江蘭溪之别名也暇日覽舊詩因以題詠逍遥心地得闗闗偶被功名涴一作凂我閑有壽亦將歸象外無詩兼不戀人間何窮黙識輕洪範未䘮斯文勝大還筐篋静開難似此蘂珠春色海中山色一作雪漢武出獵漢家無事樂時邕羽獵年年出九重玉帛不朝金闕路旌旗長繞綵霞峰且貪原獸輕黄屋寧畏漁人犯白龍薄暮方歸長樂觀垂楊幾處緑烟濃宴曹王宅賢王駟馬退朝初小苑三春帶雨餘林沼葱蘢多貴氣樓臺隠映接天居仙鷄引敵穿紅藥宫燕䘖泥落綺疏自嘆平生相識願何如今日厠應徐重贈趙給事乆飛鴛掖出時髦耻負平生稽古勞玉樹滿庭家轉貴雲衢獨步位初高能迂騶馭尋蝸舍不惜瑶華報木桃應念潜郎守貧病常悲休沐對蓬蒿贈闕下裴舍人二月黄鶯飛上林春城紫禁曉隂隂長樂鐘聲花外盡龍池栁色雨中深陽和不散窮途恨霄漢長懸捧日心獻賦十年猶未遇羞將白髪對華簮登劉賔客高齋時公初退相能以功成踈寵位不將心賞負雲霞林間客散孫𢎞閣城上山宜綺季家蝴蝶晴連池岸草黄鸝晚出栁園花日陪鯉也趨文苑誰道門生隔綘紗哭辛霽流水辭山花别枝隨風一去絶還期昨夜故人泉下宿今朝白髪鏡中垂音徽寂寂空成夢容範朝朝無見時旦暮餘生幾息在不應存沒未嘗悲和慕容法曹尋漁者寄城中故人孤烟一㸃緑溪湄漁父幽居即舊基飢鷺不驚収釣處閉麛應乳負暄時茅齋對雪開樽好稚子焚枯飯客遲勝事宛然懐抱裏頃來新得謝公詩錢仲文集巻九
