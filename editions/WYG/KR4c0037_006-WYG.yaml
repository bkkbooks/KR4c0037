body:
  text: 送集賢崔八叔承恩括圖書雨露滿儒服天心知子虛還勞五經笥更訪百家書贈别傾文苑光華壯使車晚雲隨客散寒樹出關疎相見應朝夕歸期在玉除送張五員外東歸楚州纓珮不為美人羣寧免辭杳然黄鵠去未負白雲期此别清興盡髙秋臨水時好山枉帆僻浪跡到家遲他日詔書下梁鴻安可追閒居寄包何去名即棲遁何必歸滄浪種藥幽不淺杜門喧自忘林眠多曉夢鵶散驚初陽片雪幽雲至迴風鄰果香佳期碧天末惆悵紫蘭芳津梁寺尋李侍御禪林絶過客柱史正焚香馴鴿不猜隼慈雲能䕶霜驄聲隔暗竹吏事散空廊霄漢期鴛鷺狐狸避憲章遶階春色至屈草待君芳山園秋晩寄杜黄裳少府惆悵佳期阻園林秋景閒終朝碧雲外唯見暮禽還泉石思攜手烟霞不閉關杖藜仍把菊對巻也看山望望離心起非君誰解顔東溪杜野人致酒萬重雲樹下數畝子平居野院羅泉石荆扉背里閭早冬耕鑿暇弋雁復烹魚靜掃寒花徑唯邀傲吏車晩來留客好小雪下山初憶山中寄舊友數嵗白雲裏與君同采薇樹深烟不散溪靜鷺忘飛更憶東巖趣殘陽破翠㣲脱巾花下醉洗藥月前歸風景今還好如何與世違東臯早春寄郎四校書禄㣲賴學稼嵗起歸衡茅窮達戀明主耕桑亦近郊夜來霽山雪陽氣動林梢蘭蕙煖初吐春鳩鳴欲巢蓬萊時入夢知子憶貧交玉山東溪題李叟屋壁霞景已斜照烟溪方暝投山家歸路僻轍跡亂泉流野老採薇暇蝸廬招客幽麏麚突荒院鸕鵲步閒疇偶此愜真性令人輕宦遊溫泉宫禮見新豐佳氣滿聖主在溫泉雲燰龍行處山明日馭前順風求至道側席問遺賢靈雪瑶墀降晨霞綵仗懸滄溟不讓水疵賤也朝天遊襄陽泉石晩歸遊目隨山勝迴橈愛浦長往來幽不淺昏旦興難忘木末看歸翼蓮西失夕陽人聲指閭井野趣惜林塘稍近垂楊路菱舟擁岸香夏日陪史郎中宴杜郎中果園何事重逢迎春醪晩更清林端花自老池上月初明路入仙郎次烏連柱史名竹陰疎柰院山翠傍蕪城引滿不辭醉風來待曙更南溪春耕荷蓑趣南逕戴勝鳴條枚溪雨有餘潤土膏寧厭開溝塍落花盡耒耜度雲迴誰道耦耕倦仍兼勝賞催日長農有暇悔不帶經來錢仲文集巻六欽定四庫全書錢仲文集巻七唐錢起撰五言六韻近體三十五首省試湘靈皷瑟善皷一作拊雲和瑟常聞帝子靈馮夷空自舞楚客不堪聴苦調凄金石清音入杳冥蒼梧來一作成怨慕白芷動芳馨流水傳瀟浦悲風過洞庭曲終人不見江上數峰青觀法駕自鳯翔逥欃槍一掃滅閶闔九重開海晏鯨鯢盡天旋日月來聖情蘇品物龍御一作馭闢雲雷曉漏移仙仗朝陽出帝臺周慚㪚馬出禹讓濬川迴欲識封人願南山舉酒杯題玉山村叟壁谷口好泉石居人能陸沉牛羊下山小烟火隔雲深一逕入溪色數家連竹隂藏虹辭晚雨驚隼落殘禽渉趣皆流目將歸羡在林却思黄綬事辜負紫芝心縣中池竹言懐官小志已足時清免負薪卑棲且得地榮耀不闗身自愛賞心處叢篁流水濵荷香度高枕春色滿南隣道在即為樂機忘寧厭貧却愁丹鳯詔來訪漆園人山園棲隠守静信推分灌園樂在兹且忘堯舜力寧顧尚書期晚景採蘭暇空林散帙時巻荷藏露滴黄口觸虫絲三徑與囂逺一瓢常自怡情人半雲外風月詎相思送王諫議任東都居守車徒鳯掖東去去洛陽宫暫以青蒲隔還看紫禁同經過乘雨露瀟洒出鴛鴻官署名臺下雲山舊苑中暮天雙闕静秋月九重空且喜成周地詩人播國風送鄭書記决勝無遺策辭天便請纓出身唯殉死報國且能兵受命麒麟殿叅謀驃騎營短簫催别酒斜日駐前旌義勇千夫敵風沙萬里行幾年丹闕下侯印錫書生送族姪赴任林下不成興仲容微祿牽客程千里逺别念一一作片帆懸欲嘆卑棲去其如勝趣偏雲山深郡郭花木浄潮田坐嘯帷應下離居月復圓此時知小阮相憶綠罇前長安落第作始願今如此前途復若何無媒獻詞賦生事日蹉跎不遇張華識空悲寗戚歌故山歸夢逺新嵗客愁多刷羽思喬木登龍恨失波散才非世用囬首謝雲羅酬長孫繹藍溪寄杏愛君藍水上種杏近成田拂逕清隂合臨流綵實懸清香和宿雨佳色出晴烟懿此傾筐贈相知懐橘年芳馨來滿袖瓊玖願詶篇把玩情何極雲林若眼前藥堂秋暮隠來未得道嵗去愧雲松茅屋空山暮荷衣白露濃唯憐石苔色不染世人蹤潭静冝孤鶴山深絶逺鐘有時丹竈上數㸃綵霞重勉事壺公術仙期待赤龍哭常徴君萬化一朝盡窮泉悲此君如何丹竈術能悞紫芝焚不遂蒼生望空留封禪文逺年隨逝水真氣盡浮雲山閉龍蛇蟄林寒麋鹿羣傷心載酒地仙菊為誰薫送鮑中丞赴太原軍營年壯才仍美時來道易行寵兼三獨任威肅貳師營將略過南仲天心寄北京雲旂臨塞色龍笛出闗聲漢月隨霜去邉塵計日清漸知王事好文武用書生奉送劉相公江淮催轉運國用資戎事臣勞為主憂將徴任土貢更發濟川舟擁傳星還去過池鳯不留唯高飲氷節稍淺别家愁落葉淮邉雨孤山海上秋遥知謝公興微月在江樓送李秀才落第遊荆楚翠羽雖一作難成夢遷鶯尚後羣名逃郄詵䇿興發謝𤣥文昏旦扁舟去江山幾路分上潮呑海日歸雁出湖雲詩思應須苦猿聲莫厭聞離居見新月那得不思君奉陪郭常侍宴滻川山池掖垣携愛客勝地賞年光向竹過賔舘尋山到妓堂歌聲掩金谷舞態出平陽地滿簪裾影花添蘭麝香鶯啼春未老酒冷日猶長安石風流事湏歸問一作騎省郎㓂中送張司馬歸洛戎狄㓂周日衣冠適洛年客亭新驛騎歸路舊人烟吾道將東矣秋風更颯然雲愁百戰地樹隔兩鄉天旅思蓬飄陌驚魂雁怯弦今朝一樽酒莫惜醉離筵奉和宣城張太守南亭秋夕懐友池館蟪蛄聲梧桐秋露晴月臨朱㦸静河近畫樓明捲幔浮凉入聞鐘永夜清片雲懸曙斗數雁過秋城羽扇揚風暇瑶琴悵一作寄别情江山飛麗藻謝朓讓前名過山人所居因寄諸遺補空谷春雲滿愚公晦跡深一隨𤣥豹隠幾換緑蘿隂絶徑人稀到芳蓀我獨尋厨烟住峭壁酒氣出重林蝴蝶晴還舞黄鸝晚暫吟所思青𤨏客瑶草寄幽心過鳴臯隠者磻石老紅鮮徴君卧幾年飛一作百泉出林下仄徑過一作窮崖巔鷄犬逐人静雲霞宜地偏終朝數峰勝不逺一壺前仲月霽春雨香風生藥田丹溪不可别瓊草色芊芊送楊錥歸隠悔作掃門事還吟招隠詩今年芳草色不失故山期遥想白雲裏采苓春日遲溪花藏石徑巖翠帶茅茨九轉莫飛去三迴良在兹還嗤茂陵客貧病老明時酬劉起居卧病見寄承顔看彩服不覺别丹墀味道能忘病過庭更學詩繚垣多畫㦸逺岫入書帷竹静携琴處林香讓果時聲同叨眷早交淡在年衰更枉兼金贈難為繼組詞陪南省諸公宴殿中李監宅將門高勝霍相子寵過韋宦貴攀龍後心傾待士時壺觴開雅宴鴛鷺眷相隨舞退燕姬曲歌徴謝朓詩晚鍾過竹静醉客出花遲莫惜留餘興良辰不可追山齋讀書寄時校書杜叟日愛蘅芳下閑觀山海圖幽人自守朴窮谷也名愚倒嶺和溪雨新泉到户樞叢蘭齊稚子蟠木老潜夫憶戴差過剡遊仙慣入壺濠梁時一訪莊叟亦吾徒晚歸藍田舊居雲巻東臯下歸來省故蹊泉移憐石在林長覺原低舊里情難盡前山賞未迷引藤看古木嘗酒呪春鷄興與時髦背年將野老齊才微甘引退應得遂霞棲太子李舍人城東别業與二三文友逃暑下馬失炎暑重門深緑篁宫臣禮嘉客林表開蘭堂兹夕興難盡澄罍照墨塲東陵晚來好目極趣何長鳥道掛踈雨人家殘夕陽城隅擁歸騎留醉戀瓊芳寄袁州李嘉祐員外誰謂江山阻心親夢想偏容輝常在目離别任經年郡國通流水雲霞共逺天行春鶯幾囀遲客月頻圓鴈有歸鄉羽人無訪戴船願徴黄覇入相見玉堦前禁闈翫雪寄薛左丞𤣥雲低禁苑飛雪滿神州虚白生臺榭寒光入冕旒粉凝宫壁静乳結洞門幽細繞逥風轉輕隨落羽浮怒濤堆砌石新月孕簾鈎為報詩人道豐年誦聖猷春暮過石龜谷題温處士林園隠几無名老間氣作垂白無名者何年此陸沉丘園自間氣作應得性婚嫁不嬰心嵗計因山薄霞棲在谷深設罝間氣作盧連草色晒藥背松隂觸興雲生岫隨耕鳥下林搘頤笑來客頭上有朝簪宿畢侍御宅交情頻更好子有古人風晤語清霜裏平生苦節同心惟二仲合室乃一瓢空落葉寄秋菊愁雲低夜鴻薄寒燈影外殘漏雨聲中明發南昌去逥看御史驄中書遇雨濟旱惟宸慮為霖即上台雲衘七曜起雨拂九門來綸閣飛絲度龍渠激溜逥色翻池上藻香裛鼎前梅湘燕皆舒翼沙鱗豈曝腮尺波應為假虞海載沿洄適楚次徐城去家隨旅鴈幾日到南荆行邁改鄉邑苦辛淹晦明畏途在滛雨未暮息趨程窮木對秋舘寒鵶愁古城迷津坐為客對酒黙含情感激念知已匣中孤劍鳴經李䝉潁陽舊居同心而早世天道亦何論獨有山陽宅平生永不諼青溪引白鳥流涕弔芳蓀蔓草入空室叢篁深毁垣舊遊還在眼神理更忘言唯見東山月人亡不去門贈漢陽隠者當年不出世知子飡霞人樂道復安土遺榮長隠身衡茅古林曲秔稻清江濵桂棹為漁暇荷衣禦暑新欵顔行在役幽興惜今晨分首天涯去再來芳杜春巨魚縱大壑巨魚縱大壑遂性似乘時奮躍風生鬛騰凌浪皷鰭龍攄囬地軸鯤化想天池方快呑舟意尤殊在藻嬉傾危嗟幕燕隠晦誚泥龜喻士逢明主才猷得所施錢仲文集巻七
