body:
  text: 錢仲文集巻四唐錢起撰五言四韻近體五十首奉和聖製登㑹昌山應制睿想入希夷真遊到具茨玉鑾登嶂逺雲輅出花遲泉壑凝神處陽和布澤時六龍多順動四海正雍熙省中對雪寄元判官拾遺昆季萬㸃瑤臺雪飛來錦帳前瓊枝應比淨鶴髮敢爭先散影成花月流光透竹煙今朝謝家興幾處郢歌傳山齋獨坐喜𤣥上人夕至舍下虎溪徑煙霞入暝開柴門兼竹靜山月與僧來心瑩蓮花水言忘緑茗杯前峯曙更好斜漢欲西迴秋夜寄張韋二主簿凉夜褰簾好輕雲過月初碧空河色淺紅葉雨聲虚道阻天難問機忘世易踈不知雙翠鳯棲棘復何如歸故山路逢隱居者握手雲棲路澘然恨幾重誰知緑林盜長占彩霞峯心死池塘草聲悲石徑松無因芳杜月琴酒更相逢落第劉拾遺相送東歸不醉百花酒傷心千里歸獨收和氏玉還採舊山薇出處離心盡榮枯㑹面稀預愁芳草色一徑入衡闈和劉七讀書夜雨深館靜苦心黄巻前雲陰留墨沼螢影傍華編夢鳥富青藻通經仍妙年何愁丹穴鳳不飲玉池泉早下江寧暮天㣲雨散凉吹片帆輕雲物髙秋節山川孤客情霜蘋留楚水寒鴈别呉城宿浦有歸夢愁猿莫夜鳴登復州南樓孤樹延春日他山捲曙霞客心湖上鴈歸思日邊花行李迷方久歸期涉嵗賖故人雲路隔何處寄瑤華江陵晦日陪諸官泛舟節物堪為樂江湖有主人舟行深更好山趣久彌新罇酒平生意烟花異國春城南無夜月長袖莫留賓縣城秋夕山城日易夕愁生先掩扉俸薄不沽酒家貧忘授衣露重蕙花落月冷莎雞飛効拙慚無補雲林嘆再歸秋夜梁七兵曹同宿二首一笑不可得同心相見稀摘菱頻貰酒待月未扄扉星影低驚鵲蟲聲傍旅衣卑棲嵗已晩共羨鴈南飛好欲棄呉道今宵又遇君老夫相勸酒稚子待題文月下誰家笛城頭幾片雲如何此幽興明日重離羣和萬年成少府寓直赤縣新秋夜文人藻思催鐘聲自仙掖月色近霜臺一葉兼螢度孤雲帶雁來明朝紫書下應問長卿才春夜過長孫繹别業佳期難再得清夜此雲林帶竹新泉冷穿花片月深含毫凝逸思酌水話幽心不覺星河轉山枝驚曙禽題溫處士山居誰知白雲裏别有緑蘿春苔繞溪邊徑花侵洞裏人逸妻看種藥稚子伴垂綸潁上逃堯者何如養此真題陳季壁郢人何苦調飲水仍布衾烟火晝不起蓬蒿春欲深前庭少喬木鄰舍聞新禽雖有徵賢詔終傷不遇心贈鄰居齊六司倉沉冥衆所遺咫尺絶佳期始覺衡門下翛然太古時雞聲共隣巷燭影隔茅茨坐惜牛羊逕芳蓀白露滋送征雁秋空萬里淨嘹唳獨南征風急翻霜冷雲開見月驚塞長怯去翼影滅有餘聲悵望遙天外鄉愁滿目生宴鬱林觀張道士房滅跡人間世忘歸象外情竹壇秋月冷山殿夜鐘清仙侣披雲集霞杯達曙傾同歡不可再朝暮赤龍迎秋夕與梁鍠文宴客到衡門下林香蕙草時好風能自至明月不須期秋日翻荷影晴光脆柳枝留歡美清夜寧覺曉鍾遲南薫作㣲官是底物許日廢言詩哭空寂寺𤣥上人五句一作古松韻舊榻悽然雙樹下垂淚逺公房燈續生前火爐添沒後香陰階明片雪寒竹嚮空廊寂滅應為樂塵心徒自傷題精舍寺勝景不易遇入門神頓清房房占山色處處分泉聲詩思竹間得道心松下生何時來此地擺落世間情開元觀遇張侍御碧落忘歸處佳期不厭逢晩凉生玉井新暑避煙松欲醉流霞酌還醒度竹鍾更憐琪樹下歴歴見遥峯和人秋歸終南山别業舊居三顧後晩節重幽尋野逕到門盡山窻連竹陰昔年鶯出谷今日鳳歸林物外凌雲操誰能繼此心故相國苗公挽歌霸陵誰寵𦵏漢主念蕭何盛業留青史浮榮逐逝波隴雲仍作雨薤露已成歌悽愴平津閣秋風弔客過酧劉員外雨中見寄苦雨滴蘭砌秋風生葛衣潢汚三逕絶碪杵四隣稀分與𤣥豹隱不為湘燕飛慙君角巾折猶肯問衡闈賦得歸雲送李山人歸華山秀色横千里歸雲積幾重欲依毛女岫初巻少夷峯葢影隨征馬衣香拂卧龍秖應函谷上真氣日溶溶過裴長官新亭茅屋多新意芳林昨試移野人知石路戲鳥認花枝慢水縈蓬户閒雲掛竹籬到家成一醉歸馬不能騎寄郢州郎士元使君龍節知無事江城不掩扉詩傳過客逺書到故人稀坐嘯看潮起行春送雁歸望舒三五夜思盡謝元暉過長孫宅與郎上人茶㑹偶與息心侣忘歸才子家𤣥談兼藻思緑茗代榴花岸幘看雲巻含毫任景斜松喬若逢此不復醉流霞下第題長安客舍不遂青雲望愁看黄鳥飛梨花度寒食客子未春衣世事隨時變交情與我違空餘主人栁相見却依依陪考功王員外城東池亭宴無雙錦帳郎絶境有林塘鶴靜疎羣羽蓮開失衆芳晴山看不厭流水趣何長日晩催歸騎鍾聲下夕陽過孫員外藍田山居不知香署客謝病翠㣲間去幄蘭將老辭車雉亦閒近山雲出洞當户竹連山對酒溪霞晩家人採蕨還秋園晩沐黄巻在窮巷歸來生道心五株衰栁下三徑小園深倒薤翻成字寒花不假林龎眉謝羣彦獨酌且閒吟窮秋對雨晦日連苦雨動息更邅迴生事萍無定愁心雲不開翟門悲暝雀黒竈上寒苔始信宣城守乗流畏曝腮裴迪南門秋夜對月夜來詩酒興月滿謝公樓一作月上影閉重門靜寒生獨樹秋鶴一作鵲驚隨葉散螢逺入煙流今夕遙天末清光一作暉幾處愁和蜀縣段明府秋城望歸期製錦蜀江靜飛鳬漢闕遙一兹風靡草再視露盈條旅望多愁思秋天更泬寥河陽傳麗藻清韻入歌謡晩歸藍田酬王維給事贈别卑棲却得性毎與白雲歸徇禄仍懷橘看山免採薇一作别山如昨日春露已霑衣采蕨頻盈手看花空厭歸暮禽先去馬新月待開扉霄漢時回首知音青鎻闈再得畢侍御書聞巴中卧病芳信來相續同心逺更親數重雲外樹不隔眼中人夢寐花驄色相思黄鳥春一作蕙草更聞公幹病一夜二毛新宿新里館愁人待曉雞秋雨暗凄凄度燭螢時滅傳書雁漸低客來知計誤夢裏泣津迷無以逃悲思寒螿處處啼一本有五韻從迷字下云毎食皆彈鋏歸山柰杖藜叔牙先得路何日救沉泥谷口書齋寄楊補闕泉壑帶茅茨雲霞生薜帷竹憐新雨後山愛夕陽時閒鷺棲常早秋花落更遲家童掃蘿逕昨與故人期衡門春夜不厭晴林下㣲風度葛巾寧唯北窻月一作客自謂上皇人叢篠輕新暑孤花占晩春寄言莊叟蝶與爾得天真題呉通微主人食貧無盡日有願幾時諧一作不知青雲器良願幾時諧長嘯秋光晚誰知志士懷朝烟不起竈寒葉欲連階飲水仍留我孤燈㸃一作吟詩靜夜齋晩次宿預館鄉心不可問秋氣又相逢飄泊方千里離悲復幾重迴雲隨去雁寒露滴鳴蛩延頸遥天末如聞故國鍾藍上茅茨期王維補闕山中人不見雲去夕陽過淺瀨寒魚少叢蘭秋蝶多老年疎世事幽性樂天和酒熟思才子溪頭望玉珂春夜寓直養性慣雲臥為郎如鳥棲不知仙閣峻惟覺玉繩低帳喜香煙曖詩慚賜筆題未央春漏促殘夢謝晨雞新昌里言懷性拙偶從宦心閒多掩扉雖看北堂草不忘舊山薇花月霽來好雲泉堪夢歸如何建章漏催著早朝衣秋夜寄袁中丞王員外一夕盈千念方知别者勞衰榮難㑹面魂夢一作喜暫同袍片月臨階早清河度雁髙應憐蔣生逕秋露滿蓬蒿九日閒居寄登髙數子初服棲窮巷重陽憶舊逰門閒謝病日心醉授衣秋酒盡寒花笑庭空暝雀愁今朝落㡌客㡬處管絃留錢仲文集巻四欽定四庫全書錢仲文集巻五唐錢起撰五言四韻近體五十首晩入宣城界斜日片帆陰春風孤客心山來指樵路岸去惜花林海氣蒸雲黒潮聲隔雨深鄉愁不可道浦宿聴猿吟靜夜酬通上人問疾東林生早凉髙枕逺公房大士看心後中宵清漏長驚蟬出暗柳㣲月隱迴廊何事沉痾久含毫問藥王奉陪使君十四叔晩憩大雲門寺野寺千家外閒行晩暫過炎氛臨水盡夕照傍林多境對知心妄人安覺政和繩牀搖麈尾佳趣滿滄波省中春暮酬嵩陽焦道士見招朝花飛暝林對酒傷春心流年催素髮不覺映華簪垂老遇知己一作明代詶恩看寸陰如何紫芝客一作多慚紫陽客相憶白雲深酬苗發員外宿龍池寺見寄寧知待漏客清夜此從容一作在雲松暫别迎車雉還隨䕶法龍香烟輕上月林嶺一作栖鴿靜聞鐘郢曲傳甘露塵心洗幾重貞懿皇后挽詞淑麗詩傳美徽章禮飾哀有恩加象服無日祀髙禖曉月孤秋殿寒山出夜臺通靈深眷想青鳥獨飛來嵗初歸舊山欲知愚谷好久别與春還鸎煖初歸樹雲晴却戀山石田耕種少野客性一作舊情閒求仲應難見殘陽且掩關鑾駕避狄嵗别韓雲卿白髮壯心死愁看國步移關山慘無色親愛忽驚離影絶龍分劍聲哀鳥戀枝茫茫雲海外相憶不相知詠白油㡌送客薄質慚加首愁陰幸庇身巻舒無定日行止必依人已沐脂膏惠寧辭雨露頻雖同客衣色不染洛陽塵藍上採石芥寄前李明府淵明遺愛處山芥緑芳初翫此春陰色猶滋夜雨餘隔溪烟葉小覆石雪花舒采采還相贈瑤華信不如送贇法師往上都逺近化人天王城指日邊宰君迎説法童子伴隨縁到處花為雨行時杖出泉今宵松月下門閉想安禪送沈少府還江寧逺宦碧雲外此行佳興牽湖山入閭井鷗鳥傍神仙斜日背鄉樹春潮迎客船江樓新興發應與政聲傳送虞説擢第東遊湖山不可厭東望有餘情片玉登科後孤舟任興行月中嚴子瀨花際楚王城嵗暮雲臯鶴聞天更一鳴送少㣲師西行隨縁忽西去何日返東林世路寧嗟别空門久息心人烟一飯少山雪獨行深天外猿啼處誰聞清梵音送昆山孫少府徇禄近滄海乗流看碧霄誰知仙吏去宛與世塵遥遠帆背歸鳥孤舟抵上潮懸知訟庭靜窻竹日蕭蕭送屈突司馬充安西書記制勝三軍勁澄清萬里餘星飛龎統驥箭發魯連書海月低雲斾江霞入錦車遥知太阿劍計日斬鯨魚送時暹避難適荆南三嘆把離袂七哀深我情雲天愁逺别豺虎擁前程駐馬戀携手隔河聞哭聲相思昏若夢泪眼幾時明送邊補闕省覲東去有餘意春風生賜衣鳳凰銜詔下才子採蘭歸㪷酒百花裏情人一笑稀别離須計日相望在彤闈
