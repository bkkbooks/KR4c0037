争静宿凉灣月應無失侣聲其四十五輕雲未撲霜樹杪橘初黄信是知名物微風過水香其四十六土曠深耕少江平逺釣多平生皆棄本金革竟如何其四十七海月非常物等閑不可尋披沙應有地淺處定無金其四十八風晚冷颼颼蘆花已白頭舊來紅葉寺堪憶玉京秋其四十九渺渺望天涯清漣浸赤霞難逢星漢使烏鵲日乘槎其五十風好來無陣雲開去有踪釣歌無逺近應喜罷艨艟其五十一吳疆連楚甸楚俗異吳鄉謾把罇中物無人啄􅈉黄其五十二岸綠野烟逺江紅斜照微撑開小魚艇應到月明歸其五十三雨餘江始漲漾漾見流薪曾嘆溝中木斯言憶故人其五十四垂露曉猶濃清風不易逢渉江雖已晚高樹攀芙蓉其五十五乘舟維夏口煙野獨行時不見頭陀寺空懐㓜婦碑其五十六晚泊武昌岸津亭踈栁風數株曾手植好事憶陶公其五十七舟航依浦定星斗滿江寒若比隂霾日何方夜未闌其五十八近戍離金落孤岑望火門唯將知命意瀟洒向乾坤其五十九叢菊生隄上此花長後時有人還採掇何必有春期其六十景夕殘霞落秋寒細雨晴短纓何用濯舟在月中行其六十一堤壊漏江水地坳成野塘晚荷人不折留取作秋香其六十二失宦終何路攄懐亦自寛襞牋嘲白鷺無意喻梟鸞其六十三樓空人不歸雲似去時衣黄鶴無心下長應笑令威其六十四白帝朝驚浪陽臺暮應雲等閑生險易世路祗如君其六十五櫓一作蘆慢生輕浪帆虚帶白雲客船雖狹小容得庾將軍其六十六静看秋江水風微浪漸平人間馳競處塵土自波成其六十七風借帆方疾風囬棹却遲較量人世事不校一毫􅁵其六十八咫尺愁風雨匡廬不可登秪疑香霧窟猶有六朝僧其六十九江草何多思冬青尚滿洲誰能驚鵩鳥作賦為沙鷗其七十幸有煙波興寧辭筆硯勞縁情無怨刺却似反離騷其七十一沙上獨行時吟高到楚詞難得垂岸蓼盈把當江蘺其七十二秋寒鷹隼徤逐雀下雲空知是江湖客無心擊塞鴻其七十三幽懐念煙水長恨隔龍沙今日滕王閣分明見落霞其七十四江流何渺渺懐古獨依依漁父非賢者蘆中但有磯其七十五逺謫嵗時晏暮江風雨寒仍愁繫舟處驚夢近長灘錢仲文集巻十
