body:
  text: 送李明府去官謗言三至後直道歎何如今日藍溪水無人助一作朂夜魚赴章陵詶李卿贈别一官叨下秩九棘謝知音芳草文園路春愁滿别心逢俠者燕趙悲歌士相逢劇孟嘉寸心言不盡前路日將斜郎員外見尋不遇軒騎來相訪漁樵悔晚歸更怜垂露跡花裏㸃墻衣過李一作吕侍御宅不見承明客愁聞長樂鐘一作翰墨成千古恩榮謝九重馬卿何早世漢主欲登封宿洞口舘或作耿緯詩野竹通溪冷秋泉入户鳴亂來人不到芳草上堦生九日寄姪箊箕等采菊偏相憶傳香寄便風今朝竹林下莫使桂罇空梨花艶静如籠月香寒未逐風桃花徒照地終被笑妖紅題崔逸人山亭藥徑深紅蘚山窻滿翠微羡君花下酒蝴蝶夢中飛藍田溪雜詠二十二首望山登春臺目盡趣難極晚景下平阡花際霞峰色右登臺静宜樵隠度逺與車馬隔有時行樂來喜遇歸山客右板橋片霞照仙井泉底桃花紅那知幽石下不與武陵通右石井引蔓出雲樹垂絲覆巢鶴幽人對酒時苔上閑花落右古藤池上静難厭雲間欲去晚忽背夕陽飛乘興清風逺右晚歸鷺幾轉到青山數重度流水秦人入雲去知向桃源裏右洞仙謡春畦生百藥花葉香初霽好客似風光偏來入叢蕙右藥圃静與溪色連幽宜松雨滴誰知古石上不染世人跡右石上苔逺岫見如近千里一窻裏坐來石上雲乍謂壺中起右窓裏山暗歸草堂静半入花園去有時載酒來不與清風遇右竹間路幽鳥清漣上興來看不足新篁壓水低昨夜鴛鴦宿右竹嶼穿雲來自逺激砌流偏駛能資庭户幽更引海禽至右砌下泉乍依菱蔓聚盡向蘆花滅更喜好風來數片翻晴雪右戯鷗風送出山鐘雲霞度水淺欲知聲盡處鳥滅寥天逺右逺山鐘永日興難忘掇芳春陂曲新晴花枝下愛此苔水緑右東陂一作憶皇子陂臨池構杏梁待客歸烟塘水上褰簾好蓮開杜若香右池上亭有意蓮葉間瞥然下高樹擘波得潜魚一㸃翠光去右銜魚翠鳥幽石生芙蓉百花慚美色逺笑越溪女聞芳不可識右石蓮花亂石跳素波寒聲聞幾處颼颼暝風引散出空林去右潺溪聲雖因朔風至不向瑶臺側唯助苦寒松偏明後凋色右松下雪田鶴望碧霄無風亦自舉單飛後片雲早晚及前侣右田鶴家住鳯城南門臨古陂曲時憐上林鴈半入池塘宿右題南陂送崔山人歸山東山殘雨挂斜暉野客巢由指翠微别酒稍酣乗興去知君不羡白雲歸題禮上人壁畫山水連山畫出映禪扉粉壁香筵滿翠微坐來爐氣縈空散共指晴雲向嶺歸送歐陽子還江華郡江華勝事接湘濱千里湖山入興新才子思歸催去棹汀花且為駐殘春暮春歸故山草堂谷口春殘黄鳥稀辛夷花盡杏花飛始憐幽竹山忩下不改清隂待我歸訪李卿不遇畫㦸朱樓映晚霞髙梧寒柳度飛鴉門前不見歸軒至城上愁看落日斜與趙莒荼讌竹下忘言對紫茶全勝羽客醉流霞塵心洗盡興難盡一樹蟬聲片影斜故王維右丞堂前芍藥花開悽然感懐芍藥花開出舊欄春衫掩泪再來看主人不在花長在更勝青松守歲寒送張㕘及第還家大學三年聞琢玉東堂一舉早成名借問還家何處好玉人含笑下機迎夜泊鸚鵡洲月照溪邊一罩蓬夜聞清唱有微風小樓深巷敲方響水國人家在處同歸鴈瀟湘何事等閑囬水碧沙明兩岸苔二十五絃彈夜月不勝清怨却飛來春郊水遶氷渠漸有聲氣融煙塢晚來明東風好作陽和使逢草逢花報發生晚歸嚴明府題門降士林霑蕙草寒强驚翰苑失鴛鸞秋中回首君門阻馬上應歌行路難秋夜送趙冽歸襄陽斗酒忘言良夜深紅萱露滴鵲驚林欲知别後思今夕漢水東流是寸心送符别駕還郡驥足駸駸吳越關屏星復與紫書還巳知從事元無事城上愁看海上山同王負外隴城絶句三軍版築脱金刀黎庶翻慚將士勞不憶新城連嶂起唯驚畫角入雲髙過故洛城故城門前春日斜故城門裏無人家市朝欲認不知處漠漠野田空草花校獵曲長楊殺氣連雲飛漢主秋畋正掩圍重門日宴紅塵出數騎胡人獵獸歸晚過横霸寄張藍田亂水東流落照時黄花滿徑客行遲林端忽見南山色馬上還吟陶令詩九日田舍今日無家野興偏東籬黄菊映秋田浮雲暝鳥飛將盡始達青山新月前題張藍田訟堂角巾髙枕向晴山訟簡庭空不用關秋風忩下琴書静夜一作落景門前人吏閑稍覺淵明歸思逺東臯月出片雲還分送李明府去官謗言三至後直道歎何如今日藍溪水無人助一作朂夜魚赴章陵詶李卿贈别一官叨下秩九棘謝知音芳草文園路春愁滿别心逢俠者燕趙悲歌士相逢劇孟嘉寸心言不盡前路日將斜郎員外見尋不遇軒騎來相訪漁樵悔晚歸更怜垂露跡花裏㸃墻衣過李一作吕侍御宅不見承明客愁聞長樂鐘一作翰墨成千古恩榮謝九重馬卿何早世漢主欲登封宿洞口舘或作耿緯詩野竹通溪冷秋泉入户鳴亂來人不到芳草上堦生九日寄姪箊箕等采菊偏相憶傳香寄便風今朝竹林下莫使桂罇空梨花艶静如籠月香寒未逐風桃花徒照地終被笑妖紅題崔逸人山亭藥徑深紅蘚山窻滿翠微羡君花下酒蝴蝶夢中飛藍田溪雜詠二十二首望山登春臺目盡趣難極晚景下平阡花際霞峰色右登臺静宜樵隠度逺與車馬隔有時行樂來喜遇歸山客右板橋片霞照仙井泉底桃花紅那知幽石下不與武陵通右石井引蔓出雲樹垂絲覆巢鶴幽人對酒時苔上閑花落右古藤池上静難厭雲間欲去晚忽背夕陽飛乘興清風逺右晚歸鷺幾轉到青山數重度流水秦人入雲去知向桃源裏右洞仙謡春畦生百藥花葉香初霽好客似風光偏來入叢蕙右藥圃静與溪色連幽宜松雨滴誰知古石上不染世人跡右石上苔逺岫見如近千里一窻裏坐來石上雲乍謂壺中起右窓裏山暗歸草堂静半入花園去有時載酒來不與清風遇右竹間路幽鳥清漣上興來看不