body:
  text: 五言七韻往體九首八韻十一首長韻十二首送崔校書從軍鴈門太守能愛賢麟閣書生亦投筆寧唯玉劍報知已更有龍韜佐師律别馬連嘶出御溝家人㡬夜望刀頭燕南春草傷心色薊北黄雲滿眼愁聞道輕生能擊虜何嗟少壯不封侯送張將軍征西長安少年唯好武金殿承恩爭破虜沙塲烽火隔天山鐵騎征西㡬嵗還戰處黒雲霾瀚海愁中明月度陽闗玉笛聲悲離酌晚金方路極行人逺計日霜戈盡敵歸囘首戎城空落暉始笑子卿心計失徒看海上節旄稀送脩武元少府寸禄榮色養此行寧歎惜自今黄綬采蘭時不厭丹墀芳草色百戰荒城復井田㡬家春樹帶人烟黎甿乆厭蓬飄苦遲爾西南惠月傳送崔十三東遊千里有同心十年一㑹面當杯緩筝柱倐忽催離宴丹鳯城頭噪晚鴉行人馬首夕陽斜㶚上春風留别袂闗東新月宿誰家官栁依依兩鄉色誰能此别不相憶送鄔三落第還鄉郢客文章絶世稀常嗟時命與心違十年失路誰知已千里思親獨逺歸雲帆春水將何適日愛東南暮山碧闗中新月對離樽江上殘花待歸客名宦無媒自古遲窮途此别不堪悲荷衣垂釣且安命金馬招賢㑹有時送馬明府赴江陵陶令南行心自永江天極目澄秋景萬室遥方犬不鳴雙鳬下處人皆靜清風髙興得湖山門栁蕭條雙翟閑黄花滿把應相憶落日登樓北望還送畢侍御謫居崇蘭香死玉簮折志士吞聲甘徇節忠藎不為明主知悲來莫向時人説滄浪之水見心清楚客辭天淚滿纓百鳥喧喧噪一鶚上林髙枝亦難托寧嗟人世棄虞翻且喜江山得康樂自憐黄綬老嬰身妻子朝來勸隠淪桃花洞裏舉家去此别相思復㡬春送禇大落第東歸離琴彈苦調美人􅃤向隅頃來荷䇿干明主還復扁舟歸五湖漢家側席明揚乆豈意遺賢在林藪玉堂金馬隔青雲墨客儒生皆白首昨夢芳洲采白蘋歸期且喜故園春稚子只思陶令至文君不厭馬卿貧剡中風月乆相憶池上舊遊應再得酒熟寧孤芳杜春詩成不枉青山色念此那能不羡歸長楊諌獵事皆違他日東流一乗興知君為我掃荆扉送傅管記赴蜀軍終童之死誰繼出燕頷儒生今俊逸主將早知鸚鵡賦飛書許載蛟龍筆峨眉玉壘指霞標鳥沒天低幕府遥巴山雨色藏征斾漢水􅆐聲咽短簫賜璧腰金應可料才略縱横年且妙無人不重樂毅賢何敵能當魯連嘯日暮黄雲千里昬壯心輕别不銷魂勸君用却龍泉劍莫負平生國士恩送張少府愁雲破斜照别酌勸行子蓬驚馬首風鴈拂天邊水寸晷如三嵗離心在萬里行路難君不見明星映空月太陽朝升光盡歇君不見凋零委路蓬長風飄舉入雲中由來人事何嘗定且莫驕奢笑賤窮盧龍塞行送韋掌記雨雪紛紛黒山外行人共指盧龍塞萬里飛沙咽皷􅎏三軍殺氣凝旌斾陳琳書記本翩翩料敵張兵奪酒泉聖主好文兼好武封侯莫比漢皇年效古秋夜長秋漢飛玉霜北風掃荷香含情紡織孤燈盡拭淚相思寒漏長簷前碧雲靜如水月弔棲烏啼鳥起誰家少婦事鴛機錦幕雲屏深掩扉白玉窻中聞落葉應憐寒女獨無衣卧病李員外題扉而去僻陋病者居蒿萊行逕失誰知簮紱貴能問幽憂疾珂聲未駐門蘭氣先入室沉痾不冠帶安得候蓬蓽清揚去莫尋離念頃來侵雀栖髙忩靜日出脩桐陰枕上憶君子悄悄唯苦心詶王維春夜竹亭贈别山月隨客來主人興不淺今宵竹林下誰覺花源逺惆悵曙鶯啼孤雲逺絶巘山中寄時校書蓬萊紫氣温如玉唯予知爾陽春曲别來㡬日芳蓀緑百花酒滿不見君青山一望心斷續送李四擢第歸覲省當年貴得意文字各爭名齊唱陽春曲唯君金玉聲懸黎寳中出髙價世難掩鴻羽不低飛龍津徒自險直矜鸚鵡賦不貴芳桂枝少俊蔡邕許長鳴唐舉知梁城下熊軾朱㦸何暐耀才子欲歸寧裳花已含笑髙門知慶大子孝覺親榮獨攬還珠美寧唯問絹情離筵不盡醉撡袂一何早馬蹄西别輕樹色東看好行塵忽不見惆悵青門道哭曹鈞苦節推白首憐君負此生忠藎名空在家貧道不行朝來相憶訪蓬蓽只謂淵明猶卧疾忽見江南弔鶴來始知天下文星失嘗恨知音千古稀那堪夫子九泉歸一聲隣笛殘陽裏酹酒空堂淚滿衣錢仲文集巻一欽定四庫全書錢仲文集巻二唐錢起撰五言往體四韻五首五韻十首六韻二十四首東陽郡齋中詣南山招韋十霽來海半山隠映城上起中峰落照時殘雪翠微裏同心乆為别孤興那對此良㑹何遲遲清揚瞻則邇清泥驛迎獻王侍郎候舘掃清晝使車出明光森森入郭樹一道引飛霜仰視驄花白多慚綬色黄鷦鷯無羽翼願假憲烏翔沐陽古渡作日落問津處雲霞殘碧空牧牛避田燒退鷁隨潮風迴首故鄉逺臨流此路窮翩翩青冥去羡彼髙飛鴻卧疾答劉道士白露蠶已絲空林日凄清􅋁􅋁晝扉掩獨卧秋忩明寳字比仙藥羽人寄柴荆長吟想風馭怳若升蓬瀛夢尋西山凖上人别處秋泉聲至今猶在耳何嘗夢魂去不見雪山子新月隔林時千峰翠微裏言念心更寂跡滅雲自起長安旅宿九秋旅夜長萬感何時歇蕙花漸寒暮心事猶楚越直躬邅世道咫步隔天闕每聞長樂鐘載泣靈臺月明旦北門外歸途堪白􅄠過桐栢山秋風過楚山山靜秋聲晚賞心無定極仙步亦清逺返照雲竇空寒流石苔淺羽人昔已去靈跡欣方踐投策謝歸途世縁從此遣李士曹㕔對雨春雨暗重城訟庭深更寂終朝人吏少滿院煙雲集濕鳥壓花枝新苔冝砌石掾曹冨文史清興對詞客愛爾蕙蘭叢芳香飽時澤登勝果寺南樓雨中望嚴協律微雨侵晚陽連山半藏碧林端陟香榭雲外遲來客孤村凝片烟去水生逺白但佳川原趣不覺城池夕更喜眼中人清光漸咫尺冬夜題旅舘退飛憶林藪樂業羡黎庶四海盡窮途一枝無宿處嚴冬北風急中夜哀鴻去孤燭思何深寒窓坐難曙勞歌待明發惆悵盈百慮自終南山晚歸采苓日往還得性非樵隠白水到初濶青山辭尚近絶境勝無倪歸途興不盡沮溺時返顧牛羊自相引逍遥不外求塵慮從兹泯早渡伊川見舊作鵾鷄鳴早霜秋水寒旅涉漁人昔隣舍相見具舟楫出浦興未盡向山心更愜村落通白雲茅茨隠紅葉東臯滿時稼歸客欣復業夕發箭塲巖下作行役不遑安在幽機轉發山谷無明晦溪霞自興沒朝櫛杉下風夕飲石上月懿爾青雲士垂纓朝鳯闕寧知採竹人每食慚薇蕨同李五夕次香山精舍訪憲上人彼岸聞山鐘仙舟過苔水松門入幽映石逕趨迤􅆔初月開草堂逺公方覯止忘言在閑夜凝念得微理泠泠功徳池相與滌心耳雨中望海上懷欎林觀中道侣山觀海頭雨懸森動烟樹只疑蒼茫裏欎鳥欲飛去大塊怒天吳驚潮蕩雲路羣真儼盈想一葦不可渡惆悵赤城期願假輕鴻馭廣徳初鑾駕出闕後登髙愁望二首長安不可望望處愁邊起輦轂混戎夷山河空表裏黄雲壓城闕斜照移烽壘漢幟逺成霞胡馬來如蟻不知涿鹿戰早晚蚩尤死渴日候河清沉憂催暮齒二愁看秦川色慘慘雲景晦乾坤暫運行品物遺覆載黄塵漲戎馬紫氣隨龍斾掩泣指闗東日月妖氛外臣心寄逺水朝海去如帶周徳更休明天衢佇開泰過曹鈞隠居荃蕙有奇性馨香道為人不居衆芳下寧老空林春之子秉髙節攻文還守真素書寸陰盡流水怨情一作聲新濟濟振纓客煙霄各致身誰當舉𤣥宴不使作良臣獨往覆釡山寄郎士元賞心無逺近芳月好登望勝事引幽人山下復山上將尋洞中藥復愛湖外嶂古壁苔入雲陰溪樹穿浪誰言世縁絶更惜知音曠鶯啼緑蘿春迴首還惆悵送王季友赴洪州幕下列郡皆用武南征所從誰諸侯重才略見子如瓊枝撫劍感知已出門方逺辭煙汲帶幕府海日生紅旗問我何功徳負恩留玉墀銷魂把别袂愧爾酬明時客舍贈鄭賁結交意不薄匪席言莫違世義隨波乆人生知已稀先鳴誓相逹未遇還相依一望金門詔三看黄鳥飛暝投同旅食朝出易儒衣嵇向林廬接携手行將歸山中春仲寄汝上王恒潁川沈冲隠者守恬泊春山日深凈誰知蟠木材得性無人境座隅泉出洞竹上雲起嶺飢狖入山厨飲虹過藥井前溪堪放逸仲月好風景遊目來逺思摘芳寄汝潁南中春意入仕無知言遊方隨世道平生願開濟遇物干懷抱已阻青雲期甘同㪚樗老客遊南海曲坐見韶陽蚤舊國别佳人他鄉思芳草惜無鴻鵠翅安得凌蒼昊東陵藥堂寄張道士木落蒼山空當軒秋水色清旦振衣坐永吟意何極願言金丹夀一假鸞鳯翼日夕開真經言忘心更默𤣥都有仙子採草早相識煙露難再期焚香空歎息苦雨憶皇甫冉涼雨門巷深窮居成習靜獨吟愁霖雨更使秋思永疲疴苦昏墊日夕開軒屏草木森已悲衾幬清且冷如何遊宦客江海隨泛梗延首長相思憂襟孰能整寄任山人天階崇黼黻世路有趨競獨抱中孚爻誰知苦寒詠行潦難朝海㪚材空遇聖豈無鳴鳯時其如問津命所思青山郭再夢緑蘿逕林泉春可遊羡爾得其性登秦嶺半巖遇雨屏翳忽騰氣浮陽慘無暉千峰挂飛雨百尺揺翠微震電閃雲逕奔流翻石磯倚巖假松葢臨水羡荷衣不得采苓去空思乗月歸且憐東臯上水色侵荆扉水色一作黍色杪秋南山西峰題凖上人蘭若向山看霽色步步豁幽性返照亂流明寒空千嶂淨石門有餘好霞殘月欲映上詣逺公廬孤峰懸一逕雲裏隔忩火松下聞山磬客到兩忘言猿心與禪定田園雨後贈隣人安排常任性偃卧晚開户樵客荷蓑歸向來春山雨殘雲虹未落返景霞初吐時鳥鳴村墟新泉遶林圃堯年尚恬泊隣里成太古室爾人遂遥相思怨芳杜天門谷題孫逸人石壁崖石亂流處竹深斜照歸主人卧磻石心耳滌清暉春雷近作解空谷半芳菲雲棟綵虹宿藥圃蝴蝶飛惡嚻慕嘉遁㡬夜瞻少微相見竟何説忘情同息機藍溪休沐寄趙八給事蟲鳴歸舊里田野秋農閑即事敦風尚衡門方再闗夕陽入東籬爽氣髙前山霜蕙後時老巢禽知暝還侍臣黄樞寵鳴玉青雲間肯想觀魚處寒泉照髪斑送輞川至南山寄谷口王十六山色不厭逺我行隨處深蹟幽青蘿逕思絶孤霞岑獨鶴引過浦鳴猿呼入林褰裳百泉裏一步一清心王子在何處隔雲雞犬音折麻定延佇乗月期招尋藍田溪與漁者宿獨遊屢忘歸况此隠淪處濯􅄠清泠泉月明不能去更憐垂綸叟靜若沙上鷺一論白雲心千里蒼洲趣蘆中夜火盡浦口秋山曙歎息分枝禽何時更相遇淮上别范大悲風隕涼葉送歸怨南楚窮年將别離寸晷申宴語長淮流不盡征棹忽復舉碧落半愁雲黄鶴時顧侣遊宦且未逹前途各脩阻分􅃑一相嗟良辰更何許雜居夜雨奉寄李京兆永夜不可度蛩吟秋雨滴寂寞想章臺始歎雲泥隔雷聲匪君車猶時過我廬電影非君燭猶能明我目如何瓊樹枝夢裡看不足望望佳期阻愁生寒草緑歎畢少府以持法無隠見繫用法本禁邪盡心翻自極畢公在囹圄世事何糺纆翠鳯呈其瑞虞羅寄殺翼囚中千念時窓外百花色落景閉圎扉春蟲網叢棘古人不念文紛淚莫沾臆小園招隠支離鮮兄弟形影如手足但遂飲氷節甘辭代耕禄斑衣在林巷始覺無羈束交柯低户陰閑鳥將雛宿窮通世情阻日夜苔徑緑誰言北郭貧能分晏嬰粟過温逸人舊居返真難合道懷舊仍無弔浮俗漸澆漓斯人誰繼妙聲容在心耳寧覺阻言笑𤣥堂閉㡬春拱木齊雲嶠鶴傳居士舞猿得蘇門嘯酹酒片陽微空山想埋照縣内水亭晨興聴訟晨光起宿露池上判黎甿借問秋泉色如何拙宦情磨鉛辱利用策蹇愁前程昨夜明月滿中心如鵲驚負恩時易失多病績難成坐惜寒塘晚霜風吹杜蘅錢仲文集巻二欽定四庫全書錢仲文集巻三唐錢起撰五言七韻往體九首八韻十一首長韻十二首海畔秋思匡濟難道合去留隨興牽偶為謝客事不顧平子田魏闕賁翹楚此身長棄捐箕裘空在念拙詘誰推賢無用即明代養痾仍壯年日夕望佳期帝鄉路㡬千秋風晨夜起零落愁芳荃太子李舍人城東别業一作李祭酒别業俯視川林前帶雷岫南山轉羣木昏曉擁山翠小澤近龍居清蒼常雨氣君家北原上千金買勝事丹闕退朝迴白雲迎賞至新晴村落外處處煙景異片水明㫁岸餘霞入古寺東臯指歸翼目盡有餘意谷口新居寄同省朋故種黍傍煙溪榛蕪兼沮洳亦知生計薄所貴隱身處橡栗石上材莓苔水中路蕭然授衣日得此還山趣汲井愛秋泉結茅因古樹閑雲與幽鳥對我不能去寄謝鴛鷺羣狎鷗拙所慕京兆尹㕔前甘棠樹降甘露内史用堯意理京宣惠慈氣和祥則降孰謂天難知濟旱露為兆有如塤應箎豈無夭桃樹洒此甘棠枝玉色與人淨珠光臨筆垂協風與之俱物性皆熙熙何必鳳池上方看作霖時秋夜作萬計各無成寸心日悠漫浮生竟何窮巧厯不能算流落四海間辛勤百年半商歌向秋月哀韻兼浩歎寤寐怨佳期美人隔霄漢寒雲度窮水别業繞垂幔窻中問談雞長夜何時旦觀村人牧山田六府且未盈三農爭務作貧民乏井税塉土皆墾鑿禾黍入寒雲茫茫半山郭秋來積霖雨霜降方銍穫中田聚黎甿反景空村落顧慚不耕者微禄同衞鶴庶追周任言敢負謝生諾裴侍郎湘川迴以青竹筒相遺因而贈之楚竹青玉潤從來湘水陰緘書取直節君子知虚心入用隨憲簡積文不受金體將丹鳳直色映秋霜深寧肯假伶倫謬為龍鳯吟唯將翰院客昔秘瑶華音長跪捧嘉貺嵗寒慚所欽東城初陷與薛員外王補闕暝投南山佛寺日􅉴石門裏松聲山寺寒香雲空靜影定水無驚湍洗足解塵纓忽覺天形寛清鐘揚虚谷㣲月深重巒噫我朝露世翻浮與波瀾行運遘憂患何縁親盤桓庶將鏡中象盡作無生觀奉和張荆州巡農晚望太清霽雲雷陽春陶物象明牧行春令仁風助昇長時和俗勤業播植農厥壤陰陰桑陌連漠漠水田廣郡中忽無事方外還獨往日暮駐歸軒湖山有佳賞宣城傳逸韻千載誰此響送包何東逰水國嘗獨往送君還念兹湖山逺近色昏旦煙霞時子好謝公跡常吟孤嶼詩果乗扁舟去若與白鷗期野趣及春好客遊欣此辭入雲投館僻采碧過帆遲江上日回首琴中勞别思春鴻刷歸翼一寄杜蘅枝酬陶六辭秩歸舊居見東靖節昔髙尚令孫嗣清徽舊廬雲峯下獻嵗車騎歸去俗因解綬憶山得採薇田疇春事起里巷相尋稀淵明醉乗興閑門秖掩扉花禽驚曙月隣女上鳴機畢娶願已果養恬志寧違吾當掛朝服同爾緝荷衣奉使採箭簳竹谷中晨興赴嶺孤客倦夜坐聞猿乗早發背溪已斜漢登棧尚殘月重峯轉森爽幽步更超越雲木聳鶴巢風蘿掃虎穴人羣徒自逺世役終難歇入山非買山采竹異采蕨誰見子牟意悁勞書魏闕同嚴逸人東溪泛舟子陵江海心髙跡此閒放漁舟在溪水曾是敦風尚朝霽收雲物垂綸獨清曠寒花古岸傍唳鶴晴沙上紛吾好貞逸不逺來相訪已接方外遠仍陪郢中唱歡言盡佳酌髙興延秋望日暮浩歌還紅霞亂青嶂過沈氏山居雞鳴孤煙起靜者能卜築喬木出雲心閒門掩山腹貧交喜相見把臂歡不足空林留宴言永日清耳目泉聲冷樽爼荷氣香童僕往往仙犬鳴樵人度深竹酒酣出谷口世網何羈束始願今不從區區折腰禄贈栢巖老人日與麋鹿羣賢哉買山叟龎眉忽相見避世一何久林栖古崖曲野事佳春後瓠葉覆荆扉栗苞垂甕牖獨歌還獨酌不耕亦不耦磽田隔雲溪多雨長稂莠煙霞得情性身世同芻狗寄謝營道人天真此翁有送薛判官赴蜀横笛聲轉悲羽觴酣欲别舉目叩關逺離心不可説邊陲勞帝念日下降才傑路極巴水長天銜劍峰缺單車動夙夜越境正炎節星橋過客稀火井蒸雲熱陰符能制勝千里在坐决始見儒者雄長纓繫餘孽詔許昌崔明府拜補闕儒者久營道詔書方問賢至精一耀世髙步誰同年何樹可棲鳳髙梧枝拂天脱身鳬舄裏載筆虎闈前日月傳軒后衣冠真列仙則知驪龍珠不秘清泠泉才子貴難見郢歌空復傳惜哉效顰客心想勞嬋娟仲春晚尋覆釡山蝴蝶弄和風飛花不知晩王孫尋芳草步步忘路逺況我愛青山涉趣皆遊踐縈迴必中路陰晦陽復顯古岸生新泉霞峰映雪巘交枝花色異奇石雲根淺碧洞志忘歸紫芝行可搴方嗤嵇叔夜林臥方沈湎贈東隣鄭少府一聞白雪唱願見清揚久誰謂結綬來得陪趨府後小邑藍溪上卑棲愜所偶妄言復連墻片月亦携手草色同春逕鶯聲共髙栁美景百花時平生一盃酒聖朝法天地以我為芻狗秩滿歸白雲期君訪谷口謝張法曹萬頃小山假景見憶樂道隨去處養和解朝簪茅堂近丹闕佳致亦何深退食不趨府忘機還在林清風亂流上永日小山陰解籜雨中竹將雛花際禽物華對幽寂絃酌兼詠吟自昔仰髙步及兹勞所欽郢歌叨繼組知己復知音罷章陵令山居過中峰道者寧辭園令秩不改淵明調解印無與言見山始一笑幽人還絶境誰道苦奔峭隨雲剰渡溪出門更垂釣吾廬青霞裏窻樹𤣥猿嘯㣲月清風來方知散髮妙又丘壑趣如此暮年始棲偃賴遇無心雲不笑歸來晩鳴鳩拂紅枝初服傍清畎昨日山僧來猶嫌嘉遁淺託君紫陽家路滅心更逺梯雲創其居抱犢上絶巘杏田溪一曲霞境峰幾轉路石掛飛泉謝公應在眼願言携手去採藥長不返登覆釜山遇道人二首晨䇿趣無涯名山深轉秀三休變覆景萬轉迷宇宙攀崖到天忩入洞窮玉溜側逕蹲怪石飛蘿擲驚􅎜花間鍊藥人雞犬咊乳竇散髮便迎客采芝仍滿袖郭璞賦遊仙始願今可就又真氣重嶂裏知君嘉遁幽山階壓丹穴藥井通伏流道者帶經出洞中携我逰欲驂白蜺去且為紫芝留忽憶武陵事别家疑數秋尋華山雲臺觀道士秋日西山明勝趣引孤䇿桃源數曲盡洞口兩岸折還從罔象來忽得仙靈宅霓裳誰之子霞酌能止客殘陽在翠㣲携手更登歴林行拂煙雨溪望亂金碧飛鳥下天窻褭松際雲壁稍尋𤣥蹤逺宛入寥天寂願言葛仙翁終年鍊玉液海上臥病寄王臨離客窮海陰蕭辰歸思結一隨浮雲滯幾怨黄鵠别妙年即沉痾生事多所闕劍中負明義枕上惜𤣥髪之子良史才華簪偶時哲相思千里道愁望飛鳥絶嵗暮氷雪寒淮湖不可越百年去心慮孤影守薄劣獨餘慕侣情金石無休歇登玉山諸峰偶至悟真寺郭南雲水佳訟簡野情發紫芝每相引黄綬不能諜稍入石門幽始知靈境絶冥搜未寸晷仙逕俄九折蟠木葢石梁崩岸露雲穴數峰拔崑崙秀色與空澈玉氣交晴虹桂花留曙月半巖採珉者一㸃如片雪真賞無前程竒觀寧暫輟更聞東林磬可聽不可説興中尋覺化寂爾諸象滅長安客舍贈李行父明府藏器待時少知人自古難遂令丹穴鳳晩食金琅玕誰謂兵戈際鳴琴方一彈理煩善用簡濟猛能兼寛夙夜念黎庶寢興非宴安洪波未靜壑何樹不驚鸞鳬舄傍京輦甿心懸灌壇髙槐暗苦雨長劍生秋寒旅食還時客飢年亦盡歡親勞攜斗水往往救泥蟠但恐酬明義蹉跎芳嵗䦨美楊侍御清文見示伯牙道䘮來絃絶無人續誰知絶唱後更有難和曲層峯與清流逸勢競奔蹙清文不出户仿像皆在目霧雪看滿懐蘭荃坐盈掬孤光碧潭月一片崑崙玉初見歌陽春韶光變枯木再見吟白雪便覺雲肅肅則知造化源方寸能展縮斯文不易遇清爽心豈足願言書諸紳可以為佩服山居新種花藥與道士同遊賦詩自樂魚鳥性寧求農牧資淺深愛巖壑疏鑿盡幽奇雨花相助好鶯鳴春草時種蘭入山翠引葛上花枝風露拆紅紫縁溪復映池新泉香杜若片石引江蘺宛謂武陵洞潛應造化移杖䇿􅂝烟客滿袖掇芳蕤蝴蝶舞留我仙雞閑傍籬但令黄精熟不慮韶光遲笑指雲蘿逕樵人那得知初黄綬赴藍田縣作蟠木無匠伯終年棄山樊苦心非良知安得入君門忽忝英達顧寧窺造化恩螢光起腐草雲翼騰沉鯤片石世可用良工心所存一叨尉京甸三省漸黎元賢尹正趨府僕夫儼歸軒眼中縣胥色耳裏蒼生言居人散山水即景真桃源鹿聚入田逕雞鳴隔嶺村飡和俗久清到邑政空論且嘉訟庭寂前階滿芳蓀歸義寺題震上人壁寺即神堯皇帝讀書之所龍飛後創為精舍入谷逢雨花香緑引幽步招提饒泉石萬轉同一趣向背森碧峰淺深羅古樹堯皇未登極此地曽隱霧秘讖得神謀因髙思虎路太陽忽臨照物象俄光煦􅆊王宫始開長者金先布白水入禪境碭山通覺路往往無心雲猶起潛龍處仍聞七祖後佛子繼調御溪鳥投慧燈山蟬飽甘露不作解纓客寧知捨筏喻身世已悟空歸途復何去錢仲文集巻
