front:
  text: 錢考功集卷第十
  hash: sha256:807978582a21947b8e85f87e04d2ec213bd860803af0598b6b301af056ed385d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0037_SBCK_010-1a}
body:
  text: 五言絶句送李明府去官謗言三至後直道歎何如今日藍溪水無人助夜漁赴章陵酬李卿贈别一官叨下秩九棘謝知音芳草文園路春愁滿别心逢俠者燕趙悲歌士相逢劇孟家寸心言不盡前路日將斜喜郎員外見尋不遇軒騎來相訪漁樵悔晚歸更憐垂露跡花裏點墻衣過故李侍御宅不見承明客愁聞長樂鍾馬卿何早世漢主欲登封宿洞口館野竹通溪冷秋泉入戶鳴亂來人不到芳草上階生九日寄姪簇箕等採菊偏相憶傳香寄便風今朝竹林下莫使桂尊空梨花艷靜如籠月香寒未逐風桃花徒照地終𬒳笑妖紅題崔逸人山亭藥徑深紅蘚山窗滿翠微羡君花下醉蝴蝶夢中飛登臺望山登春臺目盡趣難極晚景下平阡花際霞峯色板橋靜宜樵隱度逺與車馬隔有時行藥來喜遇歸山客石井片霞照仙井泉底桃花紅那知幽石下不與武陵通古藤引蔓出雲樹垂綸覆巢鶴幽人對酒時苔上間花落晚歸鷺池上靜難猒雲間欲去晚忽背夕陽飛乘興清風逺洞仙謡幾轉到青山數重度流水秦人入雲去知向桃源裏藥圃春畦生百藥花葉香初霽好客似光風偏來入叢蕙石上苔淨與溪色連幽冝松雨滳誰知古石上不染世人跡窗裏山逺岫見如近千里一窗裏坐來石上雲乍謂壷中起竹間路暗歸草堂靜半入花源去有時載酒來不與清風遇竹嶼幽鳥清連上興來看不足新篁壓水低昨夜鴛鴦宿砌下泉穿雲來自逺激砌流偏駛能資庭戶幽更引海禽至戲鷗乍依菱蔓聚盡向蘆花滅更喜好風來數片翻晴雪逺山鍾風送出山鍾雲霞度水淺欲知聲盡處鳥滅寥天逺東陂永日興難忘掇芳春陂曲新晴花枝下愛此苔水緑池上亭臨池構杏梁待客歸煙塘水上褰簾好蓮開杜若香銜魚翠鳥有意蓮葉間瞥然下高樹擘波得濳魚一點翠光去石蓮花幽石生芙蓉百花慙美色逺笑越溪女聞芳不可識潺溪聲亂石跳素波寒聲聞幾處颼颼暝風引散出空林去松下雪雖因朔風至不向瑤臺側唯助苦寒松偏明後凋色田鶴田鶴望碧霄無風亦自舉單飛後片雪早晚及前侶南陂家住鳯城南門臨古陂曲時憐上林鴈半入池塘宿七言絶句送崔山人歸山東山􅋊雨掛斜暉野客巢由指翠微别酒稍酣乘興去知君不羡白雲歸題禮上人壁畫山水連山畫出映禪扉粉壁香煙滿翠微坐來爐氣縈空散共指晴雲向嶺歸送歐陽子還江華郡江華勝事接湘濵千里湖山入興新才子思歸催去棹汀花且為駐殘春暮春歸故山草堂谷口殘春黃鳥稀辛夷花盡杏花飛始憐幽竹山窗下不改清隂待我歸訪李卿不遇畫㦸朱樓映晚霞高門寒桞度飛鴉門前不見歸軒至城上愁看落日斜與趙莒茶宴竹下忘言對紫茶全勝羽客醉流霞塵心洗盡興難盡一樹蟬聲片景斜故王維右丞堂前芍藥花開悽然感懷芍藥花開出舊䦨春衫掩淚再來看主人不在花長在更勝青松守歲寒送張參及第還家太學三年聞琢玉東堂一舉早成名借問還家何處好玉人含笑下機迎夜泊鸚鵡洲月照溪邊一罩蓬夜聞清唱有微風小樓深巷𫾣方響水國人家在處同春郊水繞氷渠漸有聲氣融煙塢晚來明東風好作陽和使逢草逢花報發生歸鴈瀟湘何事等間回水碧沙明兩岸苔二十五弦彈夜月不勝清怨却飛來晚歸嚴明府題門降士林霑蕙草寒弦驚翰苑失鴛鸞秋中回首君門阻馬上應歌行路難秋夜送趙洌歸襄陽斗酒忘言良夜深紅萱露滳鵲驚林欲知别後思今夕漢水東流是寸心送符別駕還郡驥足駸駸吳越間屏星復與紫書還巳知從事元無事城上愁看海上山同王員外隴城絶句三軍版築脫金刀黎庶翻慙將士勞不意新城連嶂起唯驚畫角入雲高過故洛城故城門前春日斜故城門裏無人家市朝欲認不知處漠漠野田空草花校獵曲長楊殺氣連雲飛漢主秋畋正掩圍重門日晏紅塵出數騎胡人獵獸歸晚過橫灞寄張藍田亂水東流落照時黃花滿徑客行遲林端忽見南山色馬上還吟陶令詩九日田舍今日吾家野興偏東籬黃菊映秋田浮雲暝鳥飛將盡始逹青山新月前錢考功集卷第十終
