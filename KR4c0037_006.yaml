front:
  text: 錢考功集卷第六
  hash: sha256:196cb272a76d9afe0479a223ca84f0a345bd2443f48971066c990d101d51a37a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0037_SBCK_006-1a}
body:
  text: 五言排律送集賢崔八叔承恩括圖書雨露滿儒服天心知子虛還勞五經笥更訪百家書贈别傾文苑光華比使車曉雲隨客散寒樹出關踈相見應朝夕歸期在玉除送張五員外東歸楚州纓珮不為美人群寧免辭杳然黃鵠去未負白雲期此别清興盡髙秋臨水時好山枉帆僻浪跡到家遲他日詔書下梁鴻安可追間居寄包何去名即棲遁何必歸滄浪種藥幽不淺杜門喧自忘林眠多曉夢鴉散驚𥘉陽片雪幽雲至回風鄰果香佳期碧天末惆悵紫蘭房津梁寺尋李侍御禪林絶過客柱史正焚香馴鴿不猜隼慈雲能護霜驄聲隔暗竹吏事散空廊霄漢期鴛鷺狐狸避憲章繞階春色至屈草待君芳山園秋晚寄杜黃裳少府惆悵佳期阻林園秋景間終朝碧雲外唯見暮禽還泉石思携手煙霞不閉關杖䔧仍把菊對卷也看山望望離心起非君誰解顔東溪社野人致酒萬重雲樹下數畒子平居野院羅泉石荆扉背里閭早冬耕鑿暇弋鴈復烹魚靜掃寒花徑唯邀傲吏車晚來留客好小雪下山初憶山中寄舊友數歲白雲裏與君同採薇樹深煙不散溪靜鷺忘飛更憶東巖趣殘陽破翠微脫巾花下醉洗藥月前歸風景今還好如何此興違東皋早春寄郎四校書祿微賴學稼歲起歸衡茆窮逹戀明主耕桑亦近郊夜來霽山雪陽氣動林梢萌蕙暖初吐春鳩鳴欲巢蓬萊時入夢知子憶貧交玉山東溪題李叟屋壁霞景巳斜照煙溪方暝投山家歸路僻轍跡亂泉流野老采薇暇蝸廬招客幽麏麚突荒院鸕鵲步閒疇偶此愜真性令人輕宦逰溫泉宫禮見新豐佳氣滿聖主在溫泉雲暖龍行處山明日馭前順風求至道側席問遺賢靈雪瑤墀降晨霞綵懸滄溟不讓水庇賤也朝天逰襄陽泉石晚歸逰目隨山勝回橈愛浦長往來幽不淺昏旦興難忘木末看歸翼蓮西失夕陽人聲指閭井野趣惜林塘稍近垂楊路菱舟擁岸香夏日陪史郎中宴杜郎中果園何事重逢迎春醪晚更清林端花自老池上月初明路入仙郎次烏連柱史名竹隂踈奈苑山翠傍蕪城引滿不辭醉風來待曙更南溪春耕荷簑趨南徑戴勝鳴條枚溪雨有餘潤土膏寧厭開溝塍落花盡耒耜度雲回誰道耦耕倦仍兼勝賞催日長農有暇悔不帶經來省試湘靈鼓瑟善鼓雲和瑟常聞帝子靈馮夷空自舞楚客不堪聽苦調淒金石清音入杳冥蒼梧來怨慕白芷動芳馨流水傳瀟浦悲風過洞庭曲終人不見江上數峰青觀法駕自鳯翔回攙槍一掃滅閶闔九重開海晏鯨鯢盡天旋日月來聖情蘇品物龍馭闢雲雷暗漏移仙仗朝陽出帝臺周慙散馬出禹讓濬川回欲識封人願南山舉酒杯題玉山村叟壁谷口好泉石居人能陸沉牛羊下山小煙火隔雲深一徑入溪色數家連竹隂藏虹辭晚雨驚隼落殘禽涉趣皆流目將歸羡在林却思黃綬事辜負紫芝心縣中池竹言懷官小志巳足時清免負薪卑棲且得地榮耀不關身自愛賞心處叢篁流水濵荷香度髙枕山色滿南鄰道在即為樂機忘寧厭貧却愁丹鳯詔來訪􅃮園人山園栖隱守靜信推分灌園樂在兹且忘堯舜力寧顧尚書期晚景采蘭暇空林散帙時卷荷藏露滳黃口觸蟲絲三徑與囂逺一瓢常自怡情人半雲外風月詎相思送王諌議任東都居守車徒鳯掖東去去洛陽宫暫以青蒲隔還看𬗋禁同經過乘雨露瀟灑出鴛鴻官署名臺下雲山舊苑中暮天雙闕靜秋月九重空且喜成周地詩人播國風送鄭書記决勝無遺策辭天似請纓出身唯徇死報國且能兵受命麟麒殿參謀驃騎營短簫催别酒斜日駐前旌義勇千夫敵風沙萬里行幾年丹闕下侯印錫書生送族姪赴任林下不成興仲容微祿牽客程千里逺別念一帆懸欲歎卑棲去其如勝趣偏雲山深郡郭花木淨潮田坐嘯帷應下離居月復圓此時知小阮相憶緑樽前長安落第作始願今如此前途復若何無媒獻詞賦生事日蹉跎不遇張華識空悲寧戚歌故山歸夢逺新歲客愁多刷羽思喬木登龍恨失波散才非世用回首謝雲蘿酬長孫繹藍溪寄杏愛君藍水上種杏近成田拂徑清隂合臨流彩實懸清香和宿雨佳色出晴煙懿此傾筐贈相知懷橘年芳馨來滿袖瓊玖願酬篇把玩情何極雲林若眼前藥堂秋暮隱來未得道歲去愧雲松茅屋空山暮荷衣白露濃唯憐石苔色不染世人蹤潭靜宜孤鶴山深絶逺鍾有時丹竈上數點綵霞重勉事壷公術仙期待赤龍哭常徴君萬化一朝盡窮泉悲此君如何丹竈術能誤紫芝焚不遂蒼生望空留封禪文逺年隨逝水真氣盡浮雲山閉龍蛇蟄林寒麋鹿群傷心載酒地仙菊為誰薰送鮑中丞赴太原軍營年壯才仍美時來道易行寵兼三獨任威肅二師營將略過南仲天心寄北亰雲旗臨塞色龍笛出關聲漢月隨霜去邊塵計日清漸知王事好文武用書生奉送劉相公江淮催轉運國用資戎事臣勞為主憂將徴任土貢更發濟川舟擁傳星還去過池鳯不留唯高飲水節稍淺別家愁落葉淮邊雨孤山海上秋遙知謝公興微月在江樓送李秀才落第逰荆楚羽翠雖成夢遷鶯尚後群名逃郤詵策興發謝玄文昏旦扁舟去江山幾路分江潮吞海日歸鴈出湖雲詩思應須苦猿聲莫厭聞離居見新月那得不思君奉陪郭常侍宴滻川山池掖垣擕愛客勝地賞年光向竹過賓館尋山到妓堂歌聲掩金谷舞態出平陽地滿簪𥚑影花添蘭麝香鶯啼春未老酒冷日猶長安石風流事須歸問省郎冦中送張司馬歸洛戎狄冦周日衣冠適洛年客亭新驛騎關路舊人煙吾道將東矣秋風更颯然雲愁百戰地樹隔兩鄉天旅思蓬飄陌驚魂鴈怯弦今朝一尊酒莫惜醉離筵奉和宣城張太守南亭秋夕懷友池館蟪蛄聲梧桐秋露晴月臨朱㦸靜河近畫樓明捲幔浮凉入聞鍾永夜清片雲懸曙斗數鴈過秋城羽扇揚風暇瑤琴悵别情江山飛麗藻謝眺讓前名過山人所居因寄諸遺補空谷春雲滿愚公晦跡深一隨玄豹隱幾換緑蘿隂絶徑人稀到芳蓀我獨尋厨煙住峭壁酒氣出重林蝴蝶晴還舞黃鸝晚暫吟所思青瑣客瑤草寄幽心過鳴皋隱者磻石老紅蘚徴君卧幾年飛泉出林下一徑過崖巔雞犬逐人靜雲霞宜地偏終朝數峰勝不逺一壷前仲月霽春雨香風生藥田丹溪不可别瓊草色芊芊送楊錥歸隱悔作掃門事還吟招隱詩今年芳草色不失故山期遙想白雲裏采苓春日遲溪花藏石徑巖翠帶茆茨九轉莫飛去三回良在茲還嗤茂陵客貧病老明時酬劉起居卧病見寄承顔看彩服不覺别丹墀味道能忘病過庭更學詩繚垣多畫㦸逺岫入書帷竹靜携琴處林香讓果時聲同叨眷早交淡在年衰更枉兼金贈難為繼組詞陪南省諸公宴殿中李監宅將門高勝霍相子寵過韋宦貴攀龍後心傾待士時壷觴開雅宴鴛鷺眷相隨舞退燕姬曲歌徴謝眺詩晚鍾過竹靜醉客出花遲莫惜留餘興良辰不可追山齊讀書寄時校書杜叟日愛蘅茆下間觀山海圖幽人自守朴窮谷也名愚隔嶺和溪雨新泉到戶樞叢蘭齊稚子蟠木老濳夫憶戴差過剡逰仙慣入壼濠梁時一訪莊叟亦吾徒晚歸藍田舊居雲捲東皋下歸來省故蹊泉移憐石在林長覺原低舊里情難盡前山賞未迷引藤看古木嘗酒呪春雞興與時髦背年將野老齊才微夕陽退應得遂霞棲太子李舍人城東别業與二三文友逃暑下馬失炎暑重門深緑篁宫臣禮嘉客林表開蘭堂茲夕興難盡澄罍照墨場東陵晚來好目極趣何長鳥道掛踈雨人家殘夕陽城隅擁歸騎留醉戀瓊芳寄袁州李嘉祐員外誰謂江山阻心親夢想偏容輝常在目離别任經年郡國通流水雲霞共逺天行春鶯幾囀遲客月頻圓鴈有還鄉羽人無訪戴船願徴黃霸入相見玉階前禁闈玩雪寄薛左丞玄雲低禁苑飛雪滿神州虛白生臺榭寒光入冕旒粉凝宫壁淨乳結洞門幽細繞回風轉輕隨落羽浮怒濤堆砌石新月孕簾鈎為報詩人道豐年頌聖猷春暮過石龜谷題溫處士林園隱几無名老何年此陸沉丘園自得性婚嫁不嬰心歲計因山薄霞棲在谷深設罝連草色曬藥背松隂觸興雲生岫隨耕鳥下林搘頥笑來客頭上有朝簮宿畢侍御宅交情頻更好子有古人風晤語清霜裏平生苦節同心惟二仲合室乃一瓢空落葉寄秋菊愁雲低夜鴻薄寒燈影外殘漏雨聲中明發南昌去回看御史驄中書遇雨濟旱惟宸慮為霖即上台雲銜七曜起雨拂九門來綸閣飛絲度龍渠激霤回色翻池上藻香裛鼎前杯湘燕皆舒翼沙鱗豈曝腮尺波應萬假虞海載沿洄適楚次徐城去家隨旅鴈幾日到南荆行邁改鄉邑苦辛淹晦明畏途在淫雨未暮息趨程窮木對秋館寒鴉愁古城迷津坐為客對酒默含情感激念知巳匣中孤劍鳴經李蒙頴陽舊居同心而早世天道亦何論獨有山陽宅平生永不諼青溪引白鳥流涕弔芳蓀蔓草入空室叢篁深毀垣舊逰還在眼神理更忘言唯見東山月人亡不去門贈漢陽隱者當年不出世知子餐霞人樂道復安土遺榮長隱身衡茅古林曲粳稻清江濵桂棹為漁暇荷衣禦暑新欵顔在行役幽興惜今晨分首天涯去再來芳杜春巨魚縱大壑巨魚縱大壑遂性似乘時奮躍風生鬛騰凌浪鼓鰭龍攄回地軸鯤化想天池方映吞舟意光殊在藻嬉傾危嗟暮燕隱晦誚泥龜喻士逢明主才猷得所施錢考功集卷第六
